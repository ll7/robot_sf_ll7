schema_version: dwa-config-sensitivity.v1
issue: 5262
claim_boundary: >-
  CPU-only diagnostic sensitivity slice for the experimental DWA baseline. It does not
  change roster status, benchmark metric semantics, or the frozen v0.1 suite.
source_matrix: configs/scenarios/classic_interactions.yaml
scenario_ids:
  - classic_bottleneck_medium
  - classic_cross_trap_high
  - classic_t_intersection_low
seeds_per_scenario: 3
runner:
  algo: dwa
  base_algo_config: configs/algos/dwa_classic.yaml
  benchmark_profile: experimental
  horizon: 100
  dt: 0.1
  workers: 4
config_points:
  canonical:
    intent: Canonical configuration used for the 0/69 observation.
    overrides: {}
  mobility_and_goal:
    intent: Test whether higher reachable velocity/acceleration bounds plus moderate goal tolerance avoid timeouts.
    overrides:
      max_linear_speed: 1.6
      max_angular_speed: 1.8
      max_linear_acceleration: 1.6
      max_angular_acceleration: 2.5
      goal_tolerance: 0.5
  progress_weight_400:
    intent: Test a progress-prioritized objective with reduced heading and clearance preference.
    overrides:
      heading_weight: 0.2
      clearance_weight: 0.6
      velocity_weight: 0.2
      progress_weight: 4.0
