schema_version: experiment-record.v2
experiment_id: issue_3193_closed_loop_forecast_falsification
issue: 3193
issue_url: https://github.com/ll7/robot_sf_ll7/issues/3193
question: >
  When does better pedestrian forecasting actually improve Robot SF closed-loop local navigation
  under same-seed evaluation?
hypothesis: >
  Open-loop forecast improvements over constant velocity will not support paper-facing navigation
  claims unless at least one non-oracle forecast variant also improves closed-loop success, safety,
  progress, and false-positive stopping under the frozen same-seed protocol.
config:
