# Issue-791 combined promotion after the attention gate fix.
policy_id: ppo_expert_issue_791_attention_head_promotion_1m_env22
scenario_config: ../../../scenarios/classic_interactions_francis2023.yaml
num_envs: 22
worker_mode: subproc
seeds:
  - 123
randomize_seeds: true
total_timesteps: 1000000
best_checkpoint_metric: success_rate
feature_extractor: grid_socnav
feature_extractor_kwargs:
  grid_channels: [32, 64, 64]
  grid_kernel_sizes: [5, 3, 3]
  socnav_hidden_dims: [128, 128]
  dropout_rate: 0.1
  use_pedestrian_attention: true
  attn_d_model: 64
  attn_num_heads: 4
  attn_output_dim: 64
ppo_hyperparams:
  learning_rate: 7.5e-5
  batch_size: 256
  n_epochs: 4
  ent_coef: 0.008
  clip_range: 0.1
  target_kl: 0.02
env_overrides:
  observation_mode: socnav_struct
  use_occupancy_grid: true
  include_grid_in_observation: true
  predictive_foresight_enabled: true
  predictive_foresight_model_id: predictive_proxy_selected_v2_full
  predictive_foresight_device: cpu
  predictive_foresight_max_agents: 16
  predictive_foresight_horizon_steps: 8
  predictive_foresight_rollout_dt: 0.2
  predictive_foresight_near_distance: 0.7
  predictive_foresight_front_corridor_length: 3.0
  predictive_foresight_front_corridor_half_width: 1.0
  robot_config:
    type: differential_drive
    max_linear_speed: 3.0
    max_angular_speed: 1.0
    allow_backwards: true
  grid_config:
    resolution: 0.2
    width: 32.0
    height: 32.0
    channels: [obstacles, pedestrians, combined]
    use_ego_frame: true
    center_on_robot: true
  peds_have_obstacle_forces: true
  sim_config:
    prf_config:
      is_active: true
    max_peds_per_group: 3
env_factory_kwargs:
  reward_name: route_completion_v3
  asymmetric_critic: true
  reward_kwargs:
    weights:
      progress: 1.1
      living: -0.015
      collision: -15.0
      near_miss: -1.5
      ttc_risk: -1.2
      comfort: -0.5
      smoothness: -0.18
      timeout: -6.5
      stagnation: -0.8
      terminal_bonus: 20.0
  reward_curriculum:
    stages:
      - until_episodes: 4
        reward_kwargs:
          weights:
            progress: 1.1
            collision: -15.0
            timeout: -6.5
            terminal_bonus: 20.0
      - reward_kwargs:
          weights:
            progress: 1.1
            living: -0.015
            collision: -15.0
            near_miss: -1.5
            ttc_risk: -1.2
            comfort: -0.5
            smoothness: -0.18
            timeout: -6.5
            stagnation: -0.8
            terminal_bonus: 20.0
  peds_have_obstacle_forces: true
scenario_sampling:
  strategy: random
  profile_strategy: cycle
  weights:
    classic_cross_trap_medium: 3.0
    classic_cross_trap_high: 4.0
    classic_doorway_low: 3.0
    classic_doorway_high: 4.0
    classic_bottleneck_medium: 3.0
    classic_bottleneck_high: 3.5
    classic_realworld_double_bottleneck_high: 4.0
    classic_group_crossing_medium: 2.5
    classic_group_crossing_high: 3.0
    classic_merging_medium: 2.5
    classic_overtaking_medium: 2.5
    classic_head_on_corridor_medium: 2.0
    classic_t_intersection_medium: 2.0
convergence:
  success_rate: 0.9
  collision_rate: 0.05
  plateau_window: 32
evaluation:
  evaluation_episodes: 70
  hold_out_scenarios: []
  randomize_seeds: false
  scenario_config: ../../../scenarios/sets/ppo_full_maintained_eval_v1.yaml
  full_policy_analysis_on_new_best: false
  full_policy_analysis_videos: false
  step_schedule:
    - every_steps: 131072
tracking:
  tensorboard: false
  wandb:
    enabled: true
    project: robot_sf
    group: issue-791-attention-head
    job_type: expert-ppo-1m-promotion-env22
    tags:
      - issue-791
      - attention-head
      - ppo
      - promotion-1m-env22
