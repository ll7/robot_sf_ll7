# Usage:
# 1. Collect the expert dataset with:
#    uv run python scripts/training/collect_expert_trajectories.py \
#      --dataset-id issue_749_v3_expert_traj_200 \
#      --policy-id ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200 \
#      --training-config configs/training/ppo/expert_ppo_issue_576_br06_v10_predictive_foresight_success_priority_policy_analysis_select.yaml \
#      --episodes 200 \
#      --seeds 123 231 777 992 1337
# 2. Run BC pretraining with:
#    uv run --group imitation python scripts/training/pretrain_from_expert.py \
#      --config configs/training/ppo_imitation/issue_749_bc_pretrain_v3_expert_trajectories.yaml
# Note: this is the current executable imitation-pipeline surface. It is suitable for warm-start
# feasibility checks, but it is not yet equivalent to the full BR-06 v10 benchmark contract.
run_id: issue_749_bc_pretrain_v3_expert_trajectories
dataset_id: issue_749_v3_expert_traj_200
policy_output_id: ppo_expert_issue_749_bc_pretrained_v3
source_training_config: ../ppo/expert_ppo_issue_576_br06_v10_predictive_foresight_success_priority_policy_analysis_select.yaml
bc_epochs: 10
batch_size: 32
learning_rate: 0.0003
random_seeds:
  - 123
  - 231
  - 777
  - 992
  - 1337
