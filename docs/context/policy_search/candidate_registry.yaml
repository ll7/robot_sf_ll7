    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_fast_progress:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_fast_progress.yaml
    hypothesis: >
      Raising the manually specified speed envelope to the 3.0 m/s robot limit
