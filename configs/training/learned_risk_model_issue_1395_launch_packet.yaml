safety_policy:
  hard_guards_authoritative: true
  learned_output_role: auxiliary_cost_only
  required_diagnostics:
    - learned_risk_score
    - hard_guard_decision
    - auxiliary_cost_weight
    - selected_candidate_command
    - rejected_by_hard_guard
execution_boundary:
  full_training_in_this_issue: false
  submit_slurm_from_this_issue: false
  local_preflight_command: >
    uv run python scripts/validation/validate_learned_risk_launch_packet.py --config
    configs/training/learned_risk_model_issue_1395_launch_packet.yaml --json
  slurm_command_shape: >
    Submit a dedicated follow-up issue after this packet lands. The future command must use
    configs/training/learned_risk_model_issue_1395_launch_packet.yaml, materialized trace
    artifact URIs, and candidate diagnostics that expose learned_risk_score, hard_guard_decision,
    and auxiliary_cost_weight.
artifact_policy:
  raw_traces_in_git: false
  checkpoints_in_git: false
  required_before_training:
    - "Replace :pending baseline/trace/checkpoint artifact aliases with concrete durable URIs."
    - "Record SHA-256 checksums for any local compact fixtures or manifest snapshots."
    - "Keep hard guards authoritative; learned risk may only rank otherwise-safe commands."
