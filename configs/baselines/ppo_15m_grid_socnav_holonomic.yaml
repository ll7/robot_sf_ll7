# PPO baseline config for the strict holonomic camera-ready profile.
#
# This keeps the promoted BR-06 v3 PPO policy as the runtime model, but disables
# goal-seeking fallback so benchmark runs fail closed when the policy or model
# contract is not available.

model_path: output/model_cache/ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200/model.zip  # Source run: ll7/robot_sf/b60iopxt (see model/ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200/training_analysis.md).

# Device selection for SB3
device: auto
# Use deterministic=True for evaluation/benchmarking
deterministic: true

# Observation handling
obs_mode: dict

# Action formatting
action_space: unicycle
v_max: 2.0
omega_max: 1.0

# Benchmark mode must fail closed rather than masking missing policy behavior
# with a goal-seeking fallback.
fallback_to_goal: false
