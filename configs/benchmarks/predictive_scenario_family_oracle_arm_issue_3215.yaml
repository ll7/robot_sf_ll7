# Issue #3215 scenario-family promotion packet with an oracle forecast arm.
#
# This is a CPU-checkable launch packet, not a campaign result. It materializes the
# post-synthesis progression requested after the hard-case portfolio negative
# result: promote the single forecast-risk fixture into a scenario family and add
# an oracle future-trajectory arm so a later paired-seed campaign can separate
# planner limits, prediction limits, and scenario infeasibility.
#
# Canonical packet check:
# uv run python scripts/validation/build_issue_3215_scenario_family_oracle_packet.py \
#   --packet configs/benchmarks/predictive_scenario_family_oracle_arm_issue_3215.yaml \
#   --output-json docs/context/evidence/issue_3215_scenario_family_oracle_packet_2026-07-05/packet.json \
#   --output-md docs/context/evidence/issue_3215_scenario_family_oracle_packet_2026-07-05/README.md
schema_version: predictive_scenario_family_oracle_packet.v1
issue: 3215
evidence_tier: diagnostic-only
claim_boundary: >-
  Launch packet only. This packet does not run paired seeds, establish a
  benchmark result, promote a planner, or support paper/dissertation claims.
source_context:
  parent_issue: 3215
  prerequisite_synthesis: docs/context/evidence/issue_3215_hardcase_portfolio_synthesis_2026-06-21/README.md
  predecessor_helper: scripts/tools/predictive_tournament_readiness.py
  scenario_seed_manifest: configs/benchmarks/predictive_hard_seeds_v1.yaml
  forecast_risk_gate: configs/research/forecast_risk_coupling_issue_2916.yaml
scenario_family:
  name: predictive_hardcase_forecast_risk_oracle_family_v1
  base_scenario_set: configs/scenarios/sets/predictive_hardcase_portfolio_v1.yaml
  occlusion_geometries:
    - cross_trap_low
    - cross_trap_medium
    - cross_trap_high
  approach_angles_deg:
    - -35
    - 0
    - 35
  actor_speeds_mps:
    - 0.8
    - 1.2
    - 1.6
  time_to_arrival_offsets_s:
    - -1.0
    - 0.0
    - 1.0
  sensor_latency_ms:
    - 0
    - 150
  uncertainty_levels:
    - nominal
    - high
paired_seeds:
  seed_base: 41000
  count: 30
  pairing_contract: >-
    Every forecast arm must run the same scenario-factor rows with identical
    seed values so arm comparisons use paired common-random-number evidence.
forecast_arms:
  - id: none
    forecast_source: none
    role: control
    oracle_state_allowed: false
  - id: constant_velocity
    forecast_source: constant_velocity
    role: deployable_baseline
    oracle_state_allowed: false
  - id: interaction_aware
    forecast_source: interaction_aware_cv
    role: deployable_interaction_model
    oracle_state_allowed: false
  - id: oracle_future
    forecast_source: oracle_future_trajectory
    role: non_deployable_upper_bound
    oracle_state_allowed: true
    interpretation_boundary: >-
      Oracle rows are diagnostic upper bounds only. They must not be mixed with
      deployable rows as planner success evidence.
outcomes:
  primary:
    - collision_rate
    - near_miss_rate
  secondary:
    - false_positive_stop_rate
    - progress_loss
    - stop_timing
    - forecast_risk_calibration
stop_rules:
  continue_if: >-
    A deployable forecast arm lowers collision or near-miss outcomes versus the
    no-forecast control without unacceptable false-positive stopping or progress
    loss, and the oracle arm shows remaining prediction headroom.
  negative_if: >-
    Oracle and deployable arms both fail to reduce safety events on paired
    seeds, indicating planner/control or scenario infeasibility rather than a
    forecast-quality bottleneck.
  blocked_if:
    - scenario-family rows cannot be generated from tracked inputs
    - any arm lacks paired rows for the full seed schedule
    - collision or near-miss metrics are unavailable
    - oracle rows are accidentally treated as deployable evidence
out_of_scope:
  - full benchmark campaign run
  - Slurm or GPU submission
  - planner promotion
  - paper or dissertation claim edit
