    - collision
    - near_miss
    - low_progress
  missing_required_fields_behavior: fail_closed
  trace_fixture_paths:
    - docs/context/evidence/issue_1395_learned_risk_launch_packet_2026-05-24/trace_contract_fixture.jsonl
