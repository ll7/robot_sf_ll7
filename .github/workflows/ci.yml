name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  SDL_VIDEODRIVER: dummy
  MPLBACKEND: Agg
  PYGAME_HIDE_SUPPORT_PROMPT: "1"

jobs:
  fast-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.5.11"

      - name: Cache compiled extensions
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv/archive-v0
          key: uv-archive-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Cache test results
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            pytest-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: System packages for headless
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libglib2.0-0 libgl1 fonts-dejavu-core jq

      - name: Sync dependencies (locked)
        run: bash scripts/dev/ci_step_timer.sh "Sync dependencies (locked)" uv sync --all-extras --frozen

      - name: Migrate legacy artifacts into canonical root
        run: bash scripts/dev/ci_step_timer.sh "Migrate legacy artifacts into canonical root" uv run python scripts/tools/migrate_artifacts.py

      - name: Lint
        run: scripts/dev/ci_driver.sh lint

      - name: Type check
        run: scripts/dev/ci_driver.sh typecheck

      - name: Unit tests
        run: scripts/dev/ci_driver.sh test

      - name: Restore coverage baseline
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: output/coverage/.coverage-baseline.json
          key: coverage-baseline-${{ github.ref_name }}
          restore-keys: |
            coverage-baseline-main

      - name: Compare coverage with baseline
        continue-on-error: true
        run: |
          if [ -f output/coverage/.coverage-baseline.json ]; then
            echo "Baseline found, comparing coverage..."
            uv run python scripts/coverage/compare_coverage.py \
              --current output/coverage/coverage.json \
              --baseline output/coverage/.coverage-baseline.json \
              --format github \
              --threshold 1.0
          else
            echo "No baseline found, skipping comparison"
          fi

      - name: Update coverage baseline (main branch only)
        if: github.ref == 'refs/heads/main' && success()
        run: |
          mkdir -p output/coverage
          cp output/coverage/coverage.json output/coverage/.coverage-baseline.json
          echo "Coverage baseline updated for main branch"

      - name: Save coverage baseline (main branch only)
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: output/coverage/.coverage-baseline.json
          key: coverage-baseline-${{ github.ref_name }}-${{ github.sha }}

      - name: Upload coverage reports
        if: failure() || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-reports
          path: |
            output/coverage/coverage.json
            output/coverage/htmlcov/
            output/coverage/.coverage

  smoke-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.5.11"

      - name: Cache compiled extensions
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv/archive-v0
          key: uv-archive-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: System packages for headless
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libglib2.0-0 libgl1 fonts-dejavu-core jq

      - name: Sync dependencies (locked)
        run: bash scripts/dev/ci_step_timer.sh "Sync dependencies (locked)" uv sync --all-extras --frozen

      - name: Migrate legacy artifacts into canonical root
        run: bash scripts/dev/ci_step_timer.sh "Migrate legacy artifacts into canonical root" uv run python scripts/tools/migrate_artifacts.py

      - name: Validation smoke tests
        run: scripts/dev/ci_driver.sh smoke

      - name: Upload map verification manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: map-verification-manifest
          path: output/validation/map_verification.json
          if-no-files-found: warn

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-artifacts
          path: output/benchmarks/
          if-no-files-found: ignore

      - name: Upload recording artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: recording-artifacts
          path: output/recordings/
          if-no-files-found: ignore

      - name: Upload cold/warm perf smoke artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cold-warm-perf-smoke
          path: |
            output/benchmarks/perf/cold_warm_pr_smoke.json
            output/benchmarks/perf/cold_warm_pr_smoke.md
          if-no-files-found: warn

      - name: Upload smoke artifact on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-smoke-episodes
          path: output/benchmarks/ci_smoke/episodes.jsonl

      - name: Reproducibility check (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Running end-to-end reproducibility validation..."
          uv run python scripts/benchmark_repro_check.py

      - name: Upload reproducibility report
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reproducibility-report
          path: output/benchmarks/reproducibility_check.json

      - name: Enforce artifact root policy
        if: always()
        run: scripts/dev/ci_driver.sh artifact-policy

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - fast-feedback
      - smoke-artifacts
    if: always()
    steps:
      - name: Check split job results
        run: |
          if [[ "${{ needs.fast-feedback.result }}" != "success" ]]; then
            echo "fast-feedback finished with ${{ needs.fast-feedback.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.smoke-artifacts.result }}" != "success" ]]; then
            echo "smoke-artifacts finished with ${{ needs.smoke-artifacts.result }}" >&2
            exit 1
          fi
