scenarios:
  - name: empty_map_8_directions_east
    map_id: atomic_empty_frame_test
    route_overrides_file: ../route_overrides/issue_596/empty_goal_east.yaml
    simulation_config:
      max_episode_steps: 250
      ped_density: 0.0
    robot_config: {}
    metadata:
      archetype: empty_map_8_directions
      label: empty map east
      flow: none
      behavior: none
      density_advisory: zero_baseline_route_spawn
      primary_capability: frame_consistency
      target_failure_mode: coordinate_transform
      purpose: Verify open-space forward progress before obstacle handling is considered.
      expected_behavior: Move directly toward the east goal with no spurious curvature.
      expected_pass_criteria: Reach the east goal without collision or timeout.
      failure_modes: [open-space oscillation, directional bias, heading instability]
      determinism: deterministic
      plausibility:
