version: 1
updated_at: 2026-04-30
funnel_config: configs/policy_search/funnel.yaml
promotion_gates: configs/policy_search/promotion_gates.yaml

candidates:
  hybrid_rule_v0_minimal:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v0_minimal.yaml
    hypothesis: >
      A clean deterministic DWA-style hybrid-rule control variant with explicit
      safety filtering and score diagnostics should provide a transparent
      non-learning baseline for later social, ORCA, recovery, and ensemble
      mechanisms.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_teb_like_rollout:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_teb_like_rollout.yaml
    hypothesis: >
      Adding an occupancy-grid route-guide candidate to the safety-filtered DWA
      scorer should recover progress in static/corridor local minima without
      giving back the collision improvement from the static footprint filter.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v4_recovery_aware:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v4_recovery_aware.yaml
    hypothesis: >
      Adding a narrow static-deadlock recovery mode to the route-guided hybrid
      planner should convert some safe low-progress stalls into goal progress
      without weakening dynamic-agent fail-closed behavior.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_fast_progress:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_fast_progress.yaml
    hypothesis: >
      Raising the manually specified speed envelope to the 3.0 m/s robot limit
      used elsewhere in the repository should reduce low-progress timeouts on
      long route slices while preserving the v3 static and dynamic safety
      filters.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_dynamic_relaxed:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_dynamic_relaxed.yaml
    hypothesis: >
      Shortening only the hard dynamic collision horizon should reduce freezing
      in doorway and crossing scenes while retaining hard radius-based dynamic
      collision rejection, static footprint clearance, and route-guided progress.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_progress_2p4:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_progress_2p4.yaml
    hypothesis: >
      A moderate 2.4 m/s speed envelope with stronger progress pressure should
      recover long-route nominal-sanity timeouts without the near-miss and
      doorway regressions observed at 3.0 m/s.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_static_margin0:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0.yaml
    hypothesis: >
      Enforcing static hard clearance over the full rollout while using no extra
      static margin beyond the reported robot radius should preserve static
      safety without the doorway freezing caused by a 5 cm buffer in tight
      passages.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_static_margin0_waypoint2:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0_waypoint2.yaml
    hypothesis: >
      Switching from the active route waypoint at 2.0 m instead of 0.9 m may
      reduce route-local stalls in crossing and corridor scenes while keeping
      the selected v3 static safety settings.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_static_escape:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_static_escape.yaml
    hypothesis: >
      Allowing only slow, non-worsening commands when the robot is already
      inside the conservative occupancy-grid static clearance band may reduce
      static deadlock timeouts without weakening occupied-cell collision
      rejection.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_speed2p2:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_speed2p2.yaml
    hypothesis: >
      A mild 2.2 m/s speed envelope on top of the selected waypoint2 policy may
      recover long-route timeout cases without the safety regressions seen in
      the more aggressive 2.4 m/s progress-weight retune.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_commit:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_commit.yaml
    hypothesis: >
      Giving the route-guide candidate a small deterministic bonus only after
      weak 3 s progress may reduce local route stalls while leaving normal DWA
      behavior unchanged in progressing scenes.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_static_margin0_waypoint3:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0_waypoint3.yaml
    hypothesis: >
      A 3.0 m waypoint handoff distance may further reduce route-local stalls
      in long crossing/corridor scenes, but may be brittle around doorway
      waypoints.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_static_margin0_comfort:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0_comfort.yaml
    hypothesis: >
      Increasing dynamic clearance pressure and applying a lower speed cap out
      to 2.5 m should reduce doorway and crowd intrusive near misses without
      altering static safety.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_mild_comfort:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_mild_comfort.yaml
    hypothesis: >
      A mild dynamic-clearance increase on top of the waypoint2 candidate may
      reduce intrusive near misses without the static collision regression seen
      in the stronger comfort variant.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_progress:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_progress.yaml
    hypothesis: >
      Stronger manual progress and speed preference on top of waypoint2 may
      convert low-progress timeouts while preserving the same hard safety
      filters.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_lookahead8:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_lookahead8.yaml
    hypothesis: >
      Looking farther along the route-guide grid path may reduce long-route
      stalls in crossing, corridor, and Francis-style scenarios without changing
      safety margins or social comfort terms.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_lookahead6:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_lookahead6.yaml
    hypothesis: >
      A smaller route-guide lookahead increase may retain the nominal success
      gain suggested by 8 cells while avoiding its static-collision regression.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_lookahead8_inflation4:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_lookahead8_inflation4.yaml
    hypothesis: >
      The 8-cell route lookahead improved nominal success but caused one static
      collision; increasing only route-guide obstacle inflation may preserve the
      progress gain while steering away from the static hazard.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_lookahead8_static05:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_lookahead8_static05.yaml
    hypothesis: >
      The 8-cell route lookahead may become acceptable if paired with a 5 cm
      static hard margin, trading some doorway progress for collision-free
      behavior.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_lookahead8_static02:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_lookahead8_static02.yaml
    hypothesis: >
      A smaller 2 cm static hard margin may remove the 8-cell route-lookahead
      collision while retaining more of its success gain than the 5 cm margin.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_lookahead8_clearance1:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_lookahead8_clearance1.yaml
    hypothesis: >
      Stronger route-guide clearance penalty may keep the 8-cell lookahead
      progress gain while avoiding the static collision without globally
      tightening the hard static margin.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_dynamic_clearance:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_dynamic_clearance.yaml
    hypothesis: >
      Slightly stronger dynamic-clearance scoring may reduce intrusive near
      misses without the static-collision regression caused by speed-cap comfort
      variants.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_orca_sampler_v1:
    status: implemented
    family: hybrid_model_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_orca_sampler_v1.yaml
    hypothesis: >
      Keep ORCA-like safety behavior while allowing a short-horizon sampler to
      recover progress in constrained geometry.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice
      - full_matrix_if_promising

  mpc_clearance_sampler_v1:
    status: implemented
    family: model_predictive_control
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/mpc_clearance_sampler_v1.yaml
    hypothesis: >
      A deterministic NMPC-style rollout scorer should improve
      constrained-geometry progress without giving up clearance control.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  risk_guarded_ppo_v1:
    status: implemented
    family: guarded_learning_policy
    training_required: false
    promotion_gate: tier_c
    candidate_config_path: configs/policy_search/candidates/risk_guarded_ppo_v1.yaml
    hypothesis: >
      The existing PPO success signal can be preserved if unsafe short-horizon
      actions are vetoed and replaced with safer local controls.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  scenario_adaptive_orca_v1:
    status: implemented
    family: adaptive_classical
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/scenario_adaptive_orca_v1.yaml
    hypothesis: >
      Family-specific ORCA parameterization should reduce classic bottleneck
      risk without slowing Francis-style flowing interactions too aggressively.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  planner_selector_v1:
    status: implemented
    family: adaptive_ensemble
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/planner_selector_v1.yaml
    hypothesis: >
      Existing non-learning and predictive heads can be combined into a stronger
      selector without introducing any new training dependency.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  learned_risk_model_v1:
    status: slurm_handoff_required
    family: learned_auxiliary_cost
    training_required: true
    promotion_gate: tier_b
    slurm_handoff: docs/context/policy_search/SLURM/001_learned_risk_model_v1.md
    hypothesis: >
      A lightweight learned risk estimator should improve candidate ranking only
      when attached to a hard safety guard.
