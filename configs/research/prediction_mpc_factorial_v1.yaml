# Issue #5355 2x2 factorial campaign: prediction on/off x constraint-handling on/off
# on the prediction-MPC framework (option 1, maintainer-confirmed 2026-07-12).
#
# This is a DESIGN/PREREGISTRATION contract only. It enumerates the four
# factorial arms and paired seeds required before any causal-effect comparison
# can be run. It is not benchmark evidence, not a result, and not paper-facing
# evidence until the campaign is run and promoted through a compact evidence bundle.
schema_version: prediction-mpc-factorial.v1
issue: 5355
study_id: issue_5355_prediction_mpc_factorial_v1
status: preregistration

claim_boundary: >
  Factorial-design and provenance contract only. This config enumerates the fixed
  prediction on/off x constraint-handling on/off ablation cells and paired seeds
  required before any causal mechanism comparison can be run. It is not benchmark
  evidence, not a mechanism-effectiveness result, and not paper-facing evidence
  until the factorial campaign is run and promoted through a compact evidence bundle.

# Base planner framework: prediction-MPC with constant-velocity predictor.
# All four arms share this base; only the factorial toggles differ.
base_planner:
  algo: prediction_mpc
  algo_base_config: configs/algos/prediction_mpc_cv.yaml

# 2x2 factorial design.
# Factor A: trajectory prediction consumed by the planner — OFF / ON
# Factor B: hard pedestrian constraints versus a shared soft-clearance cost — OFF / ON
factorial_arms:
  - key: A0_B0
    label: "prediction_OFF_constraints_OFF"
    baseline: true
    factor_a_prediction: false
    factor_b_constraints: false
    algo_config: configs/algos/prediction_mpc_factorial_A0_B0.yaml
  - key: A0_B1
    label: "prediction_OFF_constraints_ON"
    baseline: false
    factor_a_prediction: false
    factor_b_constraints: true
    algo_config: configs/algos/prediction_mpc_factorial_A0_B1.yaml
  - key: A1_B0
    label: "prediction_ON_constraints_OFF"
    baseline: false
    factor_a_prediction: true
    factor_b_constraints: false
    algo_config: configs/algos/prediction_mpc_factorial_A1_B0.yaml
  - key: A1_B1
    label: "prediction_ON_constraints_ON"
    baseline: false
    factor_a_prediction: true
    factor_b_constraints: true
    algo_config: configs/algos/prediction_mpc_factorial_A1_B1.yaml

# Scenario matrix: all four arms share the same scenario distribution and
# seed sets so the only difference between arms is the factorial toggles.
scenario_matrix: configs/scenarios/classic_interactions_francis2023.yaml
scenario_matrix_sha256: d9e148e4b544b4c7e2b6ba98e599aef47046d114e0e25645f021946674cb9dc5
inference_contract:
  resampling_unit:
    method: "scenario-clustered hierarchical bootstrap"
    rationale: >-
      Treat scenarios as the outer resampling unit so that the factorial main effects
      and interaction effect reflect uncertainty about generalization to unseen
      scenarios, not only stochastic noise on the fixed scenarios. The paired seed
      budget ensures that each scenario-seed pair has four complete arm rows, and
      hierarchical aggregation uses scenario-level means before bootstrap resampling.
    bootstrap_confidence: 0.95
    resampling_order: "scenario → seed → episode"

  inference_population:
    type: "sampled_population"
    rationale: >-
      The factorial campaign is intended to assess whether prediction and constraint
      handling produce effects that generalize beyond the current scenario set.
      Treating scenarios as a sample from a broader population ensures the CIs
      capture between-scenario variability, which is the stronger and more
      conservative inference target consistent with the #5351 hierarchical paired
      analysis dependency.

  estimand:
    type: "paired_delta"
    description: >-
      The three preregistered contrasts (A main effect, B main effect, AB interaction)
      are each computed as paired episode-level deltas. Factor A delta is the mean
      difference between A-ON and A-OFF arms (averaged over B). Factor B delta is
      the mean difference between B-ON and B-OFF arms (averaged over A). The
      interaction delta is (A1-B1 minus A0-B1) minus (A1-B0 minus A0-B0).

  decision_rule:
    rule: >-
      CI-excludes-zero for each preregistered contrast on the primary metric, with
      Holm-Bonferroni adjustment across the three contrasts.
    threshold: >-
      Each contrast is evaluated at adjusted alpha (Holm procedure over k=3 tests).
      A contrast passes if its adjusted 95% CI excludes zero. A null or CI-straddling
      result is a binding outcome: it forces claim narrowing and does not authorize
      re-running with new seeds, re-tuning weights, or adding arms. The B-OFF
      functionality check must pass before any contrast is evaluated.

  primary_metrics:
    metrics:
      - collision_free_completion
      - near_miss_exposure_normalized
      - censored_time_to_goal
    ordered_by_importance: true

  multiplicity_handling:
    strategy: >-
      Holm-Bonferroni adjustment across the three preregistered contrasts to control
      family-wise error rate at alpha=0.05. The three contrasts are treated as equally
      important a priori; the Holm procedure steps down through ordered p-values to
      maintain power while controlling FWER.
    rationale: >-
      Three contrasts (A main, B main, AB interaction) at nominal alpha=0.05 would
      inflate family-wise error to ~14% without adjustment. Holm-Bonferroni is
      uniformly more powerful than Bonferroni while providing the same FWER control.
    adjustment_method: "holm_bonferroni"

seed_policy:
  mode: seed-set
  seed_set: paper_eval_s30
  seed_sets_path: configs/benchmarks/seed_sets_v1.yaml

# Primary endpoints (typed ledger). These match the issue specification.
primary_endpoints:
  - collision_free_completion
  - near_miss_exposure_normalized
  - censored_time_to_goal

# Preregistered contrasts (multiplicity-adjusted).
preregistered_contrasts:
  - name: A_main_effect
    description: "Main effect of trajectory prediction (A1 vs A0, averaged over B)"
    arms: [A0_B0, A0_B1, A1_B0, A1_B1]
    test: hierarchical_paired
  - name: B_main_effect
    description: "Main effect of constraint handling (B1 vs B0, averaged over A)"
    arms: [A0_B0, A0_B1, A1_B0, A1_B1]
    test: hierarchical_paired
  - name: AB_interaction
    description: "Interaction between prediction and constraint handling"
    arms: [A0_B0, A0_B1, A1_B0, A1_B1]
    test: hierarchical_paired

# Multiplicity policy: Holm-Bonferroni over the three preregistered contrasts.
multiplicity_policy:
  method: holm_bonferroni
  family_wise_alpha: 0.05
  contrast_count: 3

# Seed budget and pairing.
seed_budget:
  mode: paired
  pairing_key_fields: [scenario_id, seed]
  seed_set: paper_eval_s30
  seeds_per_arm: 30

# Stop rules.
stop_rules:
  continue_if: "all arms have complete paired episodes for all scenarios and seeds"
  negative_if: "any arm fails to produce collision-free episodes in >50% of scenarios"
  blocked_if: "missing paired episodes, provenance mismatch, or unresolvable fallback execution"

# Dependencies (all must be resolved before GPU submission).
# #5353 (matched-capability fairness contract) is RESOLVED as of issue #5483:
# the capability-matrix gating logic is merged and the dependency status is
# reconciled with the closed tracker state. #5351 (hierarchical paired analysis)
# remains OPEN and is the single remaining dependency blocker for the campaign.
dependencies:
  - issue: 5351
    description: "Hierarchical paired analysis with multiplicity"
    status: open
    blocking: "analysis machinery for preregistered contrasts"
  - issue: 5353
    description: "Matched-capability fairness contract"
    status: resolved
    blocking: "capability-matrix gating for cross-arm fairness"
