<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Real-world inspired station platform benchmark -->
<svg
  width="84"
  height="28"
  viewBox="0 0 84 28"
  version="1.1"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape">
  <!-- Decorative context so the map reads as a platform when viewed directly. -->
  <rect id="track_bed" x="0" y="0" width="84" height="9" fill="#30343a" />
  <rect id="safety_line" x="0" y="9" width="84" height="1.2" fill="#e2c044" />
  <rect id="door_1" x="12" y="2" width="6" height="3" fill="#b8c1c9" />
  <rect id="door_2" x="39" y="2" width="6" height="3" fill="#b8c1c9" />
  <rect id="door_3" x="66" y="2" width="6" height="3" fill="#b8c1c9" />
  <rect id="rail_1" x="2" y="7.2" width="80" height="0.4" fill="#8f959e" />
  <rect id="rail_2" x="2" y="8.1" width="80" height="0.4" fill="#8f959e" />

  <g inkscape:label="obstacles">
    <rect x="0" y="0" width="84" height="1" fill="#000000" inkscape:label="obstacle" />
    <rect x="0" y="27" width="84" height="1" fill="#000000" inkscape:label="obstacle" />
    <rect x="0" y="0" width="1" height="28" fill="#000000" inkscape:label="obstacle" />
    <rect x="83" y="0" width="1" height="28" fill="#000000" inkscape:label="obstacle" />

    <!-- Train body and track edge. -->
    <rect x="1" y="1" width="82" height="7" fill="#000000" inkscape:label="obstacle" />

    <!-- Platform columns aligned near the train doors. -->
    <rect x="21" y="11.2" width="1.2" height="4.2" fill="#000000" inkscape:label="obstacle" />
    <rect x="42" y="11.2" width="1.2" height="4.2" fill="#000000" inkscape:label="obstacle" />
    <rect x="63" y="11.2" width="1.2" height="4.2" fill="#000000" inkscape:label="obstacle" />

    <!-- Waiting furniture on the concourse side. -->
    <rect x="16" y="18.5" width="6" height="2.2" fill="#000000" inkscape:label="obstacle" />
    <rect x="47" y="18.5" width="6" height="2.2" fill="#000000" inkscape:label="obstacle" />

    <!-- Stair / kiosk cores constraining the lower concourse route. -->
    <rect x="31" y="17.5" width="7" height="5.0" fill="#000000" inkscape:label="obstacle" />
    <rect x="58" y="17.5" width="7" height="5.0" fill="#000000" inkscape:label="obstacle" />
  </g>

  <g inkscape:label="robot">
    <rect x="4" y="22" width="4" height="3.5" fill="#ffdf00" inkscape:label="robot_spawn_zone_0" />
    <rect x="76" y="22" width="4" height="3.5" fill="#ff6c00" inkscape:label="robot_goal_zone_0" />
    <path
      d="M 8 24 L 28 24 L 28 23 L 40 23 L 40 24 L 55 24 L 55 23 L 68 23 L 76 23"
      stroke="#0300d5"
      stroke-width="0.4"
      fill="none"
      inkscape:label="robot_route_0_0" />
  </g>

  <g inkscape:label="pedestrians">
    <rect x="3" y="10.6" width="4" height="8.2" fill="#23ff00" inkscape:label="ped_spawn_zone_0" />
    <rect x="77" y="10.6" width="4" height="8.2" fill="#107400" inkscape:label="ped_goal_zone_0" />

    <rect x="77" y="10.6" width="4" height="8.2" fill="#23ff00" inkscape:label="ped_spawn_zone_1" />
    <rect x="3" y="10.6" width="4" height="8.2" fill="#107400" inkscape:label="ped_goal_zone_1" />

    <path
      d="M 7 12.4 L 19 12.4 L 26 12.4 L 37 12.4 L 47 12.4 L 58 12.4 L 68 12.4 L 77 12.4"
      stroke="#c40202"
      stroke-width="0.4"
      fill="none"
      inkscape:label="ped_route_0_0" />
    <path
      d="M 77 15.9 L 69 15.9 L 60 15.9 L 49 15.9 L 38 15.9 L 27 15.9 L 18 15.9 L 7 15.9"
      stroke="#c40202"
      stroke-width="0.4"
      fill="none"
      inkscape:label="ped_route_1_1" />
  </g>

  <g inkscape:label="single_pedestrians">
    <circle cx="11" cy="21.5" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p1_start" />
    <circle cx="73" cy="21.5" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p1_goal" />

    <circle cx="18" cy="21.5" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p2_start" />
    <circle cx="68" cy="21.5" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p2_goal" />

    <circle cx="73" cy="21.0" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p3_start" />
    <circle cx="11" cy="21.0" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p3_goal" />

    <circle cx="68" cy="21.0" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p4_start" />
    <circle cx="18" cy="21.0" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p4_goal" />
  </g>
</svg>
