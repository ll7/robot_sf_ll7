# SAC gate training config v2 — benchmark-compatible absolute-velocity semantics.
#
# Key change vs v1: action_semantics: absolute
#   The training env now wraps each env.step(target_v, target_omega) call with:
#     delta = (target_v - current_v, target_omega - current_omega)
#   so the robot moves at the target velocity in one step.  This matches what
#   map_runner._policy_command_to_env_action does at benchmark evaluation time,
#   ensuring the trained checkpoint produces correct behaviour in benchmark runs.
#
# Usage:
#   uv run python scripts/training/train_sac_sb3.py \
#     --config configs/training/sac/gate_socnav_struct_v2.yaml

policy_id: sac_gate_socnav_struct_v2
scenario_config: ../../scenarios/classic_interactions.yaml
total_timesteps: 200000
seed: 42
action_semantics: absolute
relative_obs: true

output_dir: output/models/sac

sac_hyperparams:
  learning_rate: 3.0e-4
  buffer_size: 100000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  learning_starts: 1000

env_overrides:
  observation_mode: socnav_struct

env_factory_kwargs:
  reward_name: route_completion_v3
  reward_kwargs:
    weights:
      progress: 2.5
      living: -0.01
      collision: -5.0
      near_miss: -0.8
      ttc_risk: -0.6
      comfort: -0.4
      smoothness: -0.15
      terminal_bonus: 2.0

tracking:
  enabled: false
  project: robot_sf_sac
  run_name: sac_gate_socnav_struct_v2
  tags:
    - sac
    - gate
    - socnav-struct
    - absolute-velocity
    - issue-790
