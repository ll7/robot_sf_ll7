# --- Coverage floor decision (issue acceptance criterion) ---
coverage_floor:
  status: implemented
  implementation_issue: 5071
  effective_on: merge_to_main
  minimum_total_percent: 85.0
  metric: line_coverage
  measured_scope: >-
    All importable robot_sf package files measured by the unsharded full test suite's
    --cov=robot_sf report. Tests, scripts, examples, and fast-pysf are not part of this floor.
  enforcement: >-
    Blocking fast-feedback step on push-to-main and workflow_dispatch runs. Pull-request runs
    retain their four-shard fast-feedback topology and do not emit a partial coverage report.
  baseline_evidence:
    run_url: https://github.com/ll7/robot_sf_ll7/actions/runs/28936401950
    artifact_id: 8166279784
    commit_sha: 1d32698b4055fce6a5bc434441a8ae417c53b02a
    observed_total_percent: 88.84265916113439
    measured_files: 652
  rationale: >-
    The latest available successful hosted main report measured 88.84 percent. An 85 percent
    floor provides 3.84 percentage points of operational headroom while preventing a large
    absolute regression. The independent baseline-relative comparison remains advisory and
    unchanged so smaller trend regressions stay visible. The floor reuses the existing report,
    adding no test runtime and no compatibility-matrix dependency.

# --- Durable state ledger / issue-state surface for #5039 ---
state:
  status: ready
  blockers_remaining: []
  next_empirical_action: >-
    Promote compat-matrix through the required aggregate CI gate, then require its own four hosted
    cells to pass on the promotion PR before treating issue #5039 as resolved. The separately
    tracked absolute coverage-floor policy was completed in issue #5071.
  forbidden_actions_confirmed:
    compute_submit: false
    merge: false
    release: false
    delete: false
