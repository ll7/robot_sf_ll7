name: scenario_adaptive_hybrid_orca_v2_collision_guard
algo: hybrid_rule_local_planner
allow_testing_algorithms: true
base_config_path: configs/algos/hybrid_rule_v3_teb_like_rollout.yaml
params:
  max_linear_speed: 3.0
  max_linear_accel: 3.0
  static_clearance_escape_enabled: true
  static_clearance_escape_min_clearance: 1.0
  static_clearance_escape_max_speed: 0.3
  static_clearance_escape_tolerance: 0.05
  static_recenter_enabled: true
  static_recenter_weight: 0.7
  static_recenter_probe_speed: 0.3
scenario_overrides:
  classic_merging_low:
    static_clearance_escape_enabled: false
    static_recenter_enabled: false
  francis2023_perpendicular_traffic:
    very_slow_speed: 0.6
    static_clearance_escape_max_speed: 0.6
scenario_algo_overrides:
  francis2023_leave_group:
    algo: orca
    base_config_path: configs/algos/issue707_orca_tuned.yaml
    params:
      max_linear_speed: 1.15
      orca_time_horizon: 5.0
      orca_obstacle_margin: 0.14
      orca_symmetry_bias: 0.22
      orca_head_on_bias: 0.30
