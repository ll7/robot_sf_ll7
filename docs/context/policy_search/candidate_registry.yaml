version: 1
updated_at: 2026-07-04
freshness:
  policy: manual_registry_edit
  max_age_days: 90
  stale_action: update updated_at when candidate rows or routing contracts change
funnel_config: configs/policy_search/funnel.yaml
promotion_gates: configs/policy_search/promotion_gates.yaml

candidates:
  hybrid_rule_v0_minimal:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v0_minimal.yaml
    hypothesis: >
      A clean deterministic DWA-style hybrid-rule control variant with explicit
      safety filtering and score diagnostics should provide a transparent
      non-learning baseline for later social, ORCA, recovery, and ensemble
      mechanisms.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_teb_like_rollout:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_teb_like_rollout.yaml
    hypothesis: >
      Adding an occupancy-grid route-guide candidate to the safety-filtered DWA
      scorer should recover progress in static/corridor local minima without
      giving back the collision improvement from the static footprint filter.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v4_recovery_aware:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v4_recovery_aware.yaml
    hypothesis: >
      Adding a narrow static-deadlock recovery mode to the route-guided hybrid
      planner should convert some safe low-progress stalls into goal progress
      without weakening dynamic-agent fail-closed behavior.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_fast_progress:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_fast_progress.yaml
    hypothesis: >
      Raising the manually specified speed envelope to the 3.0 m/s robot limit
      used elsewhere in the repository should reduce low-progress timeouts on
      long route slices while preserving the v3 static and dynamic safety
      filters.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_fast_progress_static_escape:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_fast_progress_static_escape.yaml
    hypothesis: >
      Remaining fast-progress failures include static-clearance stalls where forward rollout is
      rejected but a short rotation can reopen a safe slow-forward heading. Reusing the slow
      static-escape gate, adding a scored static-recenter probe, and using a faster
      scenario-specific static-corridor creep should recover doorway, crossing, and long corridor
      stalls while preserving the hard static-collision gate.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_fast_progress_static_escape_continuous:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_fast_progress_static_escape_continuous.yaml
    hypothesis: >
      Environment-bound continuous static checks should let the fast-progress
      static-escape planner distinguish real obstacle contact from conservative
      occupancy-grid clearance bands, while the corridor-subgoal sequence
      primitive verifies turn-then-forward recovery maneuvers before selection.
      A larger hard dynamic safety margin preserves pedestrian safety after
      exact static clearance admits more motion through narrow route slices.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  issue_2170_static_escape_only:
    status: experimental_spike
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/issue_2170_static_escape_only.yaml
    hypothesis: >
      One-factor diagnostic row for #2104/#2174: enable static clearance escape on the fast-progress
      baseline while keeping recenter, corridor transit, corridor subgoal, and continuous static
      checks disabled.
    required_stages:
      - smoke

  issue_2170_static_recenter_only:
    status: experimental_spike
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/issue_2170_static_recenter_only.yaml
    hypothesis: >
      One-factor diagnostic row for #2104/#2174: enable static recenter scoring on the fast-progress
      baseline while keeping static escape, corridor transit, corridor subgoal, and continuous
      static checks disabled.
    required_stages:
      - smoke

  issue_2170_static_escape_recenter_no_transit:
    status: experimental_spike
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/issue_2170_static_escape_recenter_no_transit.yaml
    hypothesis: >
      One-factor diagnostic row for #2104/#2174: combine static escape and recenter without static
      corridor-transit terms so the recenter increment after escape can be compared separately.
    required_stages:
      - smoke

  issue_2170_continuous_static_checks_only:
    status: experimental_spike
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/issue_2170_continuous_static_checks_only.yaml
    hypothesis: >
      One-factor diagnostic row for #2104/#2174: add corridor subgoals and continuous static
      clearance checks on top of the grouped static baseline to isolate the continuous-check
      increment.
    required_stages:
      - smoke

  issue_2170_scenario_adaptive_orca_selector_only:
    status: experimental_spike
    family: scenario_adaptive_classical
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/issue_2170_scenario_adaptive_orca_selector_only.yaml
    hypothesis: >
      One-factor diagnostic row for #2104/#2174: apply only the static Francis leave-group tuned
      ORCA selector on the fast-progress baseline, without bundled static escape or recenter terms.
    required_stages:
      - smoke

  scenario_adaptive_hybrid_orca_v1:
    status: implemented
    family: scenario_adaptive_classical
    training_required: false
    promotion_gate: tier_b
    benchmark_track: policy_search_full_matrix
    candidate_config_path: configs/policy_search/candidates/scenario_adaptive_hybrid_orca_v1.yaml
    hypothesis: >
      The retained fast-progress static-recenter hybrid candidate is strongest on most current
      full-matrix scenarios, while tuned ORCA cleanly resolves the remaining Francis leave-group
      hard-radius deadlock. A scenario-explicit classical selector should recover that case without
      changing the hybrid behavior on the other scenarios.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice
      - full_matrix

  scenario_adaptive_hybrid_orca_v2_collision_guard:
    status: implemented
    family: scenario_adaptive_classical
    training_required: false
    promotion_gate: tier_b
    benchmark_track: policy_search_h500_leader_collision_slice
    candidate_config_path: configs/policy_search/candidates/scenario_adaptive_hybrid_orca_v2_collision_guard.yaml
    hypothesis: >
      The h500 leader misses the strict collision gate by one controllable merging collision plus
      two first-step dynamic-deadlock episodes that tuned ORCA does not repair. Disable the
      static-escape/recenter extras only on `classic_merging_low`, preserving the v1 selector
      elsewhere while reducing the controllable h500 collision slice.
    required_stages:
      - smoke
      - nominal_sanity
      - leader_collision_slice_h500

  hybrid_rule_v3_dynamic_relaxed:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_dynamic_relaxed.yaml
    hypothesis: >
      Shortening only the hard dynamic collision horizon should reduce freezing
      in doorway and crossing scenes while retaining hard radius-based dynamic
      collision rejection, static footprint clearance, and route-guided progress.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_progress_2p4:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_progress_2p4.yaml
    hypothesis: >
      A moderate 2.4 m/s speed envelope with stronger progress pressure should
      recover long-route nominal-sanity timeouts without the near-miss and
      doorway regressions observed at 3.0 m/s.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_progress_2p4_static_escape_probe:
    status: experimental_spike
    family: hybrid_rule_based
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_progress_2p4_static_escape_probe.yaml
    issue: 1834
    hypothesis: >
      Keeping the 2.4 m/s progress envelope while enabling the static-escape
      and recenter probes from the faster static-escape candidate may convert
      some low-progress stalls without adopting the 3.0 m/s fast-progress speed
      envelope.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_route_reacquire_recenter_probe:
    status: experimental_spike
    family: hybrid_rule_based
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_route_reacquire_recenter_probe.yaml
    issue: 1905
    hypothesis: >
      Combining the moderate 2.4 m/s progress envelope with route-corridor
      subgoal recovery, static recenter probes, and a narrow rotate-in-place
      recovery path should test whether existing hybrid-rule hooks can escape
      h500 route-local-minimum blockers without weakening hard static or
      dynamic safety filters.
    required_stages:
      - smoke
      - nominal_sanity

  risk_dwa_camera_ready:
    status: implemented
    family: classical_baseline
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/risk_dwa_camera_ready.yaml
    hypothesis: >
      Risk-DWA is the canonical non-learning dynamic-window baseline for
      same-seed policy-search comparisons against learned-style local planner
      spikes.
    required_stages:
      - smoke
      - nominal_sanity

  risk_surface_dwa_v0:
    status: experimental_spike
    family: local_risk_surface
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/risk_surface_dwa_v0.yaml
    hypothesis: >
      A deterministic local risk-surface producer can expose pedestrian proximity as an
      occupancy-compatible ego grid and let the existing Risk-DWA planner consume that surface
      through the normal policy-search smoke path. This is a prototype interface proof only, not
      learned-risk model or benchmark-strength evidence.
    required_stages:
      - smoke

  topology_guided_hybrid_rule_v0:
    status: experimental_spike
    family: topology_hypothesis_diagnostic
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/topology_guided_hybrid_rule_v0.yaml
    hypothesis: >
      A diagnostic masked-route selector can expose up to two local topology
      hypotheses from the occupancy grid, select one with route length and static
      clearance scoring, and add a bounded selected-hypothesis local command to
      the existing hybrid-rule safety scorer. Missing topology inputs fail closed;
      single-hypothesis rows do not activate the topology injection and are not
      benchmark evidence.
    required_stages:
      - smoke

  topology_guided_hybrid_rule_v0_reuse_penalty:
    status: experimental_spike
    family: topology_hypothesis_diagnostic
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/topology_guided_hybrid_rule_v0_reuse_penalty.yaml
    hypothesis: >
      A diagnostic primary-route reuse penalty can demote repeated primary_route
      reselection when eligible near-parity alternatives remain available, preserving
      the baseline topology-guided candidate for paired comparison. This is a
      diagnostic-only #2540/#2563 mechanism test and not benchmark evidence.
    required_stages:
      - smoke

  topology_guided_hybrid_rule_v0_progress_gated_reselection:
    status: experimental_spike
    family: topology_hypothesis_diagnostic
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/topology_guided_hybrid_rule_v0_progress_gated_reselection.yaml
    issue: 2704
    hypothesis: >
      A progress-gated reuse penalty can suppress the primary-route demotion
      when recent primary-route progress satisfies a predeclared threshold,
      preserving route commitment during meaningful forward progress while
      still demoting primary-route reselection when progress stalls. This is
      a diagnostic-only #2660 successor mechanism test and not benchmark evidence.
    required_stages:
      - smoke

  topology_guided_hybrid_rule_v0_progress_gated_reselection_monotone:
    status: experimental_spike
    family: topology_hypothesis_diagnostic
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/topology_guided_hybrid_rule_v0_progress_gated_reselection_monotone.yaml
    issue: 3463
    hypothesis: >
      An issue-3463 successor variant keeps the progress-gated reselection contract but
      switches the recent-progress accounting to the monotone baseline so transient A*
      route-remaining bumps do not erase evidence of real primary-route progress. This
      stays diagnostic-only until a bounded cross-slice sensitivity packet and the
      separate #3465 promotion gate classify it with stronger evidence.
    required_stages:
      - smoke

  tentabot_value_scorer_v0:
    status: experimental_spike
    family: learned_style_value_scorer
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/tentabot_value_scorer_v0.yaml
    learned_policy_registry_id: tentabot_value_scorer_v0
    adapter_contract: docs/context/policy_search/contracts/learned_local_policy_eligibility.md
    hypothesis: >
      A clean-room Tentabot-style primitive value scorer can reuse Robot SF's
      hybrid-rule candidate lattice and auditable route, clearance, pedestrian
      TTC, smoothness, and command-bound features without importing upstream
      Tentabot code, ROS/Gazebo dependencies, source assets, or hidden future
      state. The v0 scorer uses hand-scored teacher weights as a supervised
      spike baseline before any learned model is considered.
    required_stages:
      - smoke
      - nominal_sanity

  tentabot_value_scorer_v1_static_gated:
    status: experimental_spike
    family: learned_style_value_scorer
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/tentabot_value_scorer_v1_static_gated.yaml
    learned_policy_registry_id: tentabot_value_scorer_v1_static_gated
    adapter_contract: docs/context/policy_search/contracts/learned_local_policy_eligibility.md
    hypothesis: >
      A clean-room Tentabot-style primitive value scorer can preserve the v0
      candidate lattice and auditable value terms while demoting low-clearance
      commands unless they make positive progress without worsening static
      clearance. The static gate is an exploratory Robot SF safety tier, not
      upstream Tentabot parity or benchmark evidence.
    required_stages:
      - smoke
      - nominal_sanity

  tentabot_value_scorer_v2_route_arc:
    status: experimental_spike
    family: learned_style_value_scorer
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/tentabot_value_scorer_v2_route_arc.yaml
    learned_policy_registry_id: tentabot_value_scorer_v2_route_arc
    adapter_contract: docs/context/policy_search/contracts/learned_local_policy_eligibility.md
    hypothesis: >
      A clean-room Tentabot-style primitive value scorer can keep the v1 static
      safety gate while making route-arc progress a first-class value term for
      all accepted candidates. This tests whether route-local progress can
      reduce low-progress timeouts without buying that gain through more static
      collisions.
    required_stages:
      - smoke
      - nominal_sanity

  tentabot_value_scorer_v3_trace_recovery:
    status: experimental_spike
    family: learned_style_value_scorer
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/tentabot_value_scorer_v3_trace_recovery.yaml
    learned_policy_registry_id: tentabot_value_scorer_v3_trace_recovery
    adapter_contract: docs/context/policy_search/contracts/learned_local_policy_eligibility.md
    hypothesis: >
      A clean-room Tentabot-style primitive value scorer can keep the v1 static
      safety gate while adding an explicit trace-level route recovery selector
      that only chooses already accepted corridor-subgoal or route-guide
      candidates under recent route regression or combined route/goal stall.
      This tests route-recovery policy rather than another speed, clearance,
      static-gate, or scalar route-progress retune.
    required_stages:
      - smoke
      - nominal_sanity

  actuation_aware_hybrid_rule_v0:
    status: experimental_spike
    family: amv_actuation_diagnostic
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/actuation_aware_hybrid_rule_v0.yaml
    hypothesis: >
      A deterministic hybrid-rule local scorer can penalize command candidates that would be
      clipped by the synthetic AMV actuation envelope, exposing whether local command smoothing
      reduces synthetic actuation stress. This is diagnostic-only synthetic evidence, not
      calibrated hardware or paper-facing AMV performance evidence.
    required_stages:
      - amv_actuation_smoke

  hybrid_rule_v3_static_margin0:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0.yaml
    hypothesis: >
      Enforcing static hard clearance over the full rollout while using no extra
      static margin beyond the reported robot radius should preserve static
      safety without the doorway freezing caused by a 5 cm buffer in tight
      passages.
    required_stages:
      - smoke
      - nominal_sanity
      - stress_slice

  hybrid_rule_v3_static_margin0_waypoint2:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0_waypoint2.yaml
    hypothesis: >
      Switching from the active route waypoint at 2.0 m instead of 0.9 m may
      reduce route-local stalls in crossing and corridor scenes while keeping
      the selected v3 static safety settings.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_static_escape:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_static_escape.yaml
    hypothesis: >
      Allowing only slow, non-worsening commands when the robot is already
      inside the conservative occupancy-grid static clearance band may reduce
      static deadlock timeouts without weakening occupied-cell collision
      rejection.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_speed2p2:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_speed2p2.yaml
    hypothesis: >
      A mild 2.2 m/s speed envelope on top of the selected waypoint2 policy may
      recover long-route timeout cases without the safety regressions seen in
      the more aggressive 2.4 m/s progress-weight retune.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_route_commit:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_route_commit.yaml
    hypothesis: >
      Giving the route-guide candidate a small deterministic bonus only after
      weak 3 s progress may reduce local route stalls while leaving normal DWA
      behavior unchanged in progressing scenes.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_static_margin0_waypoint3:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0_waypoint3.yaml
    hypothesis: >
      A 3.0 m waypoint handoff distance may further reduce route-local stalls
      in long crossing/corridor scenes, but may be brittle around doorway
      waypoints.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_static_margin0_comfort:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_static_margin0_comfort.yaml
    hypothesis: >
      Increasing dynamic clearance pressure and applying a lower speed cap out
      to 2.5 m should reduce doorway and crowd intrusive near misses without
      altering static safety.
    required_stages:
      - smoke
      - nominal_sanity

  hybrid_rule_v3_waypoint2_mild_comfort:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_mild_comfort.yaml
    hypothesis: >
      A mild dynamic-clearance increase on top of the waypoint2 candidate may
      reduce intrusive near misses without the static collision regression seen
      in the stronger comfort variant.
    required_stages:
      - smoke
      - nominal_sanity

  proxemic_profile_conservative_issue_1676:
    status: implemented
    family: proxemic_profile_diagnostic
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/proxemic_profile_conservative_issue_1676.yaml
    hypothesis: >
      A conservative proxemic profile with larger dynamic-clearance targets,
      wider human slow zones, and stronger TTC pressure should reduce
      intrusive-clearance and comfort-exposure proxies, with a likely efficiency
      tradeoff.
    required_stages:
      - smoke
      - nominal_sanity

  proxemic_profile_neutral_issue_1676:
    status: implemented
    family: proxemic_profile_diagnostic
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/proxemic_profile_neutral_issue_1676.yaml
    hypothesis: >
      The neutral profile restates the base hybrid-rule v3 social-distance knobs
      so conservative and open profiles can be compared against an explicit
      middle setting.
    required_stages:
      - smoke
      - nominal_sanity

  proxemic_profile_open_issue_1676:
    status: implemented
    family: proxemic_profile_diagnostic
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/proxemic_profile_open_issue_1676.yaml
    hypothesis: >
      An open proxemic profile with lower dynamic-clearance pressure and a
      narrower human slow zone should improve progress in crowds while risking
      higher near-miss or comfort-exposure proxy values.
    required_stages:
      - smoke
      - nominal_sanity

  adaptive_proxemic_selector_v0:
    status: experimental_spike
    family: proxemic_profile_diagnostic
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/adaptive_proxemic_selector_v0.yaml
    hypothesis: >
      A deterministic local-context selector can switch among the existing
      conservative, neutral, and open proxemic profile parameterizations to
      expose when each profile would be chosen. This row is diagnostic only:
      progress gains are not success evidence unless near-miss and comfort
      exposure tradeoffs are reviewed separately.
    required_stages:
      - smoke

  adaptive_proxemic_selector_v1:
    status: experimental_spike
    family: proxemic_profile_diagnostic
    training_required: false
    claim_scope: diagnostic_only
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/adaptive_proxemic_selector_v1.yaml
    hypothesis: >
      A neutral-default local-context selector should avoid using the open
      proxemic profile unless sparse low-progress context suggests
      over-conservatism, while routing near-human, dense, or constrained
      passage contexts to the conservative profile. This row is diagnostic
      only until comfort and near-miss tradeoffs are reviewed.
    required_stages:
      - smoke

  hybrid_rule_v3_waypoint2_progress:
    status: implemented
    family: hybrid_rule_based
    training_required: false
    promotion_gate: tier_b
    candidate_config_path: configs/policy_search/candidates/hybrid_rule_v3_waypoint2_progress.yaml
    hypothesis: >
      Stronger manual progress and speed preference on top of waypoint2 may
      convert low-progress timeouts while preserving the same hard safety
      filters.
    required_stages:
