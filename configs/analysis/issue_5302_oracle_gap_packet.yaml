# Issue #5302 fixed-planner gap and scenario-conditioned oracle analysis packet.
#
# Plain-language summary: this packet fixes the comparison roster, split, and
# reporting contract needed to measure whether planner selection adds value.
# It is a pre-registration/checker surface, not a benchmark result.
schema_version: issue_5302_oracle_gap_analysis_packet.v1
issue: 5302
name: issue_5302_fixed_planner_gap_and_oracle_ceiling
claim_boundary: >-
  Pre-registration and analysis-contract evidence only. This packet does not
  run a full benchmark campaign and does not submit Slurm/GPU work, promote a planner
  ranking, or edit paper/dissertation claims. Any result remains diagnostic
  until native rows, family-level holdouts, provenance, and the report checks
  below pass.

execution_boundary:
  run_benchmark: false
  compute_submit_authorized: false
  paper_claim_edits: false
  selector_training: false
  fallback_or_degraded_success_allowed: false

planner_roster:
  selection_policy: >-
    Compare exactly these six mechanism-stratified planner keys. Do not
    silently expand to all registered keys. Amended 2026-07-17 (maintainer
    sign-off, orchestrator session): roster grew from five to six arms and the
    PPO arm entered as experimental-with-pinned-provenance. See the amendment
    block at the end of this packet.
  required:
    - planner_id: orca
      role: baseline_reactive
      readiness: canonical_baseline
      config_path: null
    - planner_id: ppo
      role: learned_policy
      readiness: experimental_explicit_opt_in
      config_path: configs/algos/ppo_v3_camera_ready.yaml
      fallback_to_goal: false
      pinned_provenance:
        model_id: ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200
        checkpoint_sha256: 8367af109a27e8879ced0c8913f6eff26df7ec59c31ea88f9a297bb2c141eb09
        provenance_source: "model/registry.yaml github_release.sha256"
      notes: >-
        Experimental-with-pinned-provenance, NOT artifact/paper-qualified.
        Readiness reuses the existing experimental_explicit_opt_in vocabulary
        token (honest: experimental, explicit opt-in, not qualified); provenance
        is pinned via model_id + checkpoint_sha256 above. fallback_to_goal is
        false to honor execution_boundary.fallback_or_degraded_success_allowed:
        false (the S30 precedent config also used false). Gate facts for the
        record: _ppo_paper_gate_status -> (False, "missing 'provenance' mapping")
        when forced to the paper profile, and the only paper-profile config for
        this model_id fail-closes at measured 0.872 < 0.900. No gate threshold
        was lowered and no provenance mapping was fabricated; paper-qualification
        is a separate future evidence event.
    - planner_id: prediction_planner
      role: predictive
      readiness: checkpoint_qualified_only
      config_path: configs/algos/prediction_planner_camera_ready.yaml
    - planner_id: scenario_adaptive_hybrid_orca_v1
      role: scenario_adaptive_selector_representative
      readiness: candidate_requires_existing_provenance
      config_path: configs/policy_search/candidates/scenario_adaptive_hybrid_orca_v1.yaml
      notes: >-
        Role renamed from scenario_adaptive_hybrid_leader on 2026-07-17: "leader"
        asserted evidence that does not exist. v1 and v2_collision_guard are a
        statistical tie in every campaign - h500 both 0.8729
        (docs/context/issue_1454_s10_h500_candidate_comparison.md); h600 job 13282
        packet states verbatim "treat the four arms as a statistical tie among
        themselves"; S30 n=1440/arm both 0.7535 (docs/context/evidence/
        issue_4882_s30_interpretation_2026-07-13/s30_arm_statistics.csv). This arm
        is the selector-representative, still pinned to
        scenario_adaptive_hybrid_orca_v1.
    - planner_id: prediction_mpc
      role: predictive_mpc
      readiness: experimental_explicit_opt_in
      config_path: configs/algos/prediction_mpc_cv.yaml
    - planner_id: hybrid_rule_v3_fast_progress_static_escape_continuous
      role: strongest_fixed_hybrid
      readiness: candidate_requires_existing_provenance
      config_path: configs/policy_search/candidates/hybrid_rule_v3_fast_progress_static_escape_continuous.yaml
      notes: >-
        Added 2026-07-17 (maintainer sign-off) as the strongest known fixed hybrid
        planner. S30 n=1440/arm success 0.7715 - the top hybrid, above
        scenario_adaptive_hybrid_orca_v1/v2 at 0.7535 (docs/context/evidence/
        issue_4882_s30_interpretation_2026-07-13/s30_arm_statistics.csv); h600 job
        13282 success 0.799. Rationale: a best-fixed-planner baseline that omits the
        strongest known fixed planner overstates the oracle gap and makes the
        pre-registered STOP-selector branch untrustworthy.
  gated_or_deferred:
    - planner_id: risk_dwa
      condition: issue_5262_zero_over_69_diagnosis_resolved
      inclusion: do_not_include_before_condition
    - planner_id: sipp_lattice
      condition: state_time_lattice_candidate_lands
      inclusion: later_follow_up_only

input_contract:
  source_kind: canonical_result_store_or_durable_campaign_bundle
  required_row_fields:
    - episode_id
    - scenario_id
    - scenario_family
    - scenario_cell
    - split
    - seed
    - planner_id
    - row_status
    - execution_mode
    - config_hash
    - repo_commit
    - selection_score
    - collision_rate
    - severe_intrusion_rate
    - completion_rate
    - timeout_rate
    - tail_clearance
    - jerk
    - pedestrian_disturbance
    - compute_time_ms
  split_contract:
    allowed_values: [selection, evaluation]
    selection_and_evaluation_family_sets_must_be_disjoint: true
    scenario_cell_is_frozen_before_execution: true
    same_episode_set_across_planners: true
    required_planner_count_per_episode: 6
  provenance:
    required_paths:
      - robot_sf/benchmark/algorithm_readiness.py
      - robot_sf/benchmark/benchmark_row_claim.py
      - robot_sf/benchmark/seed_variance.py
      - scripts/tools/campaign_result_store.py
      - configs/benchmarks/issue_2128_heldout_family_transfer_partitions.yaml
      - configs/benchmarks/issue_3059_research_engine_suite_v0.yaml

ceilings:
  score_source: selection_score_from_frozen_metric_layer
  constraints:
    - collision_rate
    - severe_intrusion_rate
  estimands:
    - id: best_fixed_planner
      selection_unit: all_selection_families
      evaluation_unit: all_heldout_evaluation_episodes
      attainable_online: true
    - id: best_planner_per_scenario_family
      selection_unit: scenario_family
      evaluation_unit: heldout_family_episodes
      attainable_online: conditionally
    - id: best_planner_per_scenario_cell
      selection_unit: scenario_cell
      evaluation_unit: heldout_cell_episodes
      attainable_online: conditionally
    - id: hindsight_per_episode_oracle
      selection_unit: episode
      evaluation_unit: same_episode
      attainable_online: false
  gap_definitions:
    family_gap: best_planner_per_scenario_family_minus_best_fixed_planner
    cell_gap: best_planner_per_scenario_cell_minus_best_fixed_planner
    oracle_gap: hindsight_per_episode_oracle_minus_best_fixed_planner
  uncertainty:
    method: hierarchical_bootstrap
    resampling_order: scenario_family_then_scenario_cell_then_episode
    confidence: 0.95
    seed: 5302

metrics:
  required:
    - collision_rate
    - severe_intrusion_rate
    - completion_rate
    - timeout_rate
    - tail_clearance
    - worst_family_performance
    - jerk
    - pedestrian_disturbance
    - compute_time_ms_p50
    - compute_time_ms_p95
    - compute_time_ms_p99
  report_views:
    - aggregate
    - scenario_family
    - scenario_cell
    - failure_mechanism
    - runtime_tail
    - pareto_dominance_probability
    - maximum_normalized_regret
  metric_semantics: frozen_existing_metric_layer_only

inference_contract:
  resampling_unit:
    method: "scenario-family-clustered hierarchical bootstrap (family → cell → episode)"
    rationale: >-
      Treatment scenarios as the outer resampling unit (scenario family, then cell,
      then episode) because between-scenario heterogeneity is large and the inference
      target is generalization to unseen scenario families, not only to new seeds
      on the same scenarios. The ceilings.uncertainty.hierarchical_bootstrap method
      in this packet requires this structure.
    bootstrap_confidence: 0.95
    resampling_order: "scenario_family → scenario_cell → episode"

  inference_population:
    type: "sampled_population"
    rationale: >-
      The evaluation scenarios are drawn from a broader scenario population, not
      treated as a fixed benchmark suite. The selection/evaluation split enforces
      family-level holdout to test generalization, and the hierarchical bootstrap
      reflects uncertainty about which families might appear in future benchmarks.

  estimand:
    type: "paired_delta_and_per_arm"
    description: >-
      Primary estimand: the gap between each policy-selection ceiling (fixed planner,
      family-best, cell-best, oracle) and the best fixed planner. The gap is computed
      as a paired episode-level delta (ceiling value minus fixed-planner value) with
      hierarchical bootstrap intervals. Secondary estimand: per-arm per-family success
      and collision rates, used for the marginal-gap boundary test.

  decision_rule:
    rule: >-
      Marginal-gap boundary: if family and cell ceilings only marginally exceed the
      fixed planner under 95% held-out hierarchical intervals, stop selector work.
    threshold: >-
      "Marginally exceed" means the 95% CI lower bound for the gap is within the
      practical-equivalence band (success rate within 2 percentage points of zero).
      "Large and stable" means the gap CI excludes the practical-equivalence band
      entirely. The dominance-claim guard always applies: no planner may be called
      universally best without non-inferiority lower bounds on every family.

  primary_metrics:
    metrics:
      - collision_rate
      - severe_intrusion_rate
      - completion_rate
      - tail_clearance
    ordered_by_importance: true

  multiplicity_handling:
    strategy: >-
      The four ceilings (best_fixed_planner, family-best, cell-best, oracle) are
      ordered by complexity and not treated as independent tests. The primary
      comparison is whether the family-best and cell-best gaps are large and stable
      (not marginal). Practical-equivalence banding reduces multiplicity risk by
      treating small gaps as inconclusive rather than calling them significant.
    rationale: >-
      The ceiling hierarchy is inherently nested: the cell-best ceiling is
      guaranteed to dominate the family-best, which dominates the fixed planner.
      Standard multiplicity correction would penalize a structure that is
      non-parametrically ordered by construction. Practical-equivalence banding
      controls false-positive risk without correcting for a non-independent
      hierarchy.

row_status_policy:
  successful_evidence_values: [successful_evidence]
  eligible_execution_modes: [native]
  visible_but_ineligible_values:
    - diagnostic_only
    - fallback
    - degraded
    - not_available
    - failed
    - blocked
  exclusion_rule: >-
    Any missing provenance, non-native execution, invalid row status, duplicate
    planner/episode key, incomplete six-planner episode, or split leakage
    blocks the report; weak rows remain visible and never count as evidence.

decision_rule:
  marginal_gap: >-
    If family and cell ceilings only marginally exceed the fixed planner under
    held-out hierarchical intervals, stop selector work and invest in the
    fixed planner.
  large_stable_gap: >-
    If the gap is large and stable on held-out families, open a separate issue
    for a scenario-conditioned selector; do not train one here.
  dominance_claim: >-
    Never call a planner universally best. A tested-ODD dominance statement
    requires non-inferiority lower bounds for every predeclared family.

outputs:
  local_root: output/benchmarks/issue_5302_oracle_gap
  disposable: true
  required_paths:
    - reports/preflight.json
    - reports/ceiling_summary.json
    - reports/ceiling_summary.csv
    - reports/family_breakdown.csv
    - reports/cell_breakdown.csv
    - reports/failure_mechanism_map.csv
    - reports/runtime_tail.csv
    - reports/pareto_dominance.json
    - reports/normalized_regret.csv
    - reports/bootstrap_intervals.json
  durable_evidence:
    path: docs/context/evidence/issue_5302_oracle_gap
    required_before_claim: true
  raw_artifact_policy: raw_episode_jsonl_and_large_logs_stay_out_of_git

validation:
  no_submit_commands:
    - uv run python scripts/validation/check_issue_5302_oracle_gap_packet.py --json
    - uv run pytest tests/validation/test_check_issue_5302_oracle_gap_packet.py -q
    - uv run python scripts/validation/check_preregistration_inference_contract.py --json configs/analysis/issue_5302_oracle_gap_packet.yaml
  future_analysis_command: >-
     Reserved for the native campaign analysis follow-up under parent issue #5302;
     no executable analysis command is introduced in this contract-only PR.
  campaign_execution_allowed_in_this_pr: false

readiness_decision:
  status: blocked_pending_native_campaign_bundle
  benchmark_campaign_run: false
  compute_submit_authorized: false
  ranking_claim_promotion: false
  selector_training: false
  paper_claim_edits: false
  fallback_degraded_success_allowed: false

amendment:
  date: 2026-07-17
  approved_by: "maintainer sign-off (orchestrator session)"
  summary: >-
    Roster expanded from five to six arms; PPO reclassified from
    artifact_qualified_only to experimental-with-pinned-provenance. This is a
    pre-registered roster amendment, not a metric-semantics change.
  changes:
    - "Renamed scenario_adaptive_hybrid_orca_v1 role scenario_adaptive_hybrid_leader -> scenario_adaptive_selector_representative (v1/v2_collision_guard are a statistical tie; 'leader' overclaimed)."
    - "Added hybrid_rule_v3_fast_progress_static_escape_continuous (role strongest_fixed_hybrid); omitting the strongest fixed planner would overstate the oracle gap and the STOP-selector branch."
    - "PPO readiness artifact_qualified_only -> experimental_explicit_opt_in with pinned model_id + checkpoint_sha256 and fallback_to_goal: false."
  tie_evidence:
    h500: "scenario_adaptive_hybrid_orca_v1 and _v2_collision_guard both 0.8729 (docs/context/issue_1454_s10_h500_candidate_comparison.md)"
    h600_job_13282: "treat the four arms as a statistical tie among themselves"
    s30_n1440_per_arm: "v1 0.7535, v2_collision_guard 0.7535, hybrid_rule_v3_fast_progress_static_escape_continuous 0.7715 (top hybrid) - docs/context/evidence/issue_4882_s30_interpretation_2026-07-13/s30_arm_statistics.csv"
  ppo_gate_facts:
    forced_paper_profile: "_ppo_paper_gate_status -> (False, missing 'provenance' mapping)"
    paper_profile_config: "fail-closes at measured 0.872 < 0.900"
    note: >-
      No gate threshold lowered and no provenance mapping fabricated;
      paper-qualification is a separate future evidence event.
