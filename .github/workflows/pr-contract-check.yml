name: PR Contract Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: pr-contract-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-contract-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch base ref
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # On pull_request the default checkout is a shallow merge-ref with no
          # origin/<base> ref, so `git diff origin/main` / `git show origin/main:path`
          # error and the contract check mis-flags modified evidence files as new
          # (issue #5464). Fetch the base branch so origin/<base> resolves locally.
          git fetch --no-tags --depth=1 origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            || echo "::warning::Failed to fetch base ref '${BASE_REF}'; contract check will use authoritative added-files list"

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Collect changed files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Routed through a shared retrying collector (issue #5918): a transient
          # GitHub API 502/503/504/429 (which arrives as an HTML body that gh can't
          # JSON-parse) is retried with backoff instead of red-ing this job before
          # contract validation runs. A persistent failure still fails closed.
          # The helper emits the authoritative ADDED list (status == "added") used
          # for evidence-hygiene "is new" decisions (issue #5464).
          uv run python scripts/ci/collect_pr_files.py \
            --repo "$REPO" --pr-number "$PR_NUMBER" \
            --out-changed-files "$RUNNER_TEMP/pr_changed_files.txt" \
            --out-files-status "$RUNNER_TEMP/pr_files_status.tsv" \
            --out-added-files "$RUNNER_TEMP/pr_added_files.txt"

      - name: Run PR Contract Check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          uv run python scripts/ci/pr_contract_check.py \
            --github-event-path "$GITHUB_EVENT_PATH" \
            --changed-files-file "$RUNNER_TEMP/pr_changed_files.txt" \
            --added-files-file "$RUNNER_TEMP/pr_added_files.txt" \
            --base-ref "origin/${{ github.base_ref }}" \
            --post-comment
