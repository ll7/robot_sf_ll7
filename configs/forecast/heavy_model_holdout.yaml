# Heavy forecast-model holdout dataset plan (issue #2845).
#
# This is a planning config for the bounded, versioned, split-disjoint
# held-out forecast dataset that the minimum viable offline experiment will
# score. It is not a durable forecast_dataset.v1 manifest: no examples are
# committed here, and the inventory must remain blocked until recording and
# manifest validation produce that artifact.
#
# schema: heavy_model_holdout_plan.v1

plan_id: "heavy_model_holdout_v1"
schema: "heavy_model_holdout_plan.v1"

description: >
  Proposed bounded held-out forecast dataset for the offline
  transformer/diffusion study (#2845). It will be recorded from simulation
  trace exports and split into train/validation/test by scenario seed so no
  scenario seed appears in more than one split.

recording:
  adapter: "oracle_full_state"
  horizons_s: [0.5, 1.0, 1.5, 2.0]
  dt_s: 0.1

splits:
  train_ratio: 0.6
  validation_ratio: 0.2
  test_ratio: 0.2

feature_schema:
  position: "x_y"
  velocity: "dx_dy"
  heading: "radians"

expected_columns:
  - scenario_id
  - step_index
  - actor_id
  - position_x
  - position_y
  - velocity_x
  - velocity_y
  - heading

constraints:
  max_scenario_seeds_per_split: 1
  min_examples: 100
