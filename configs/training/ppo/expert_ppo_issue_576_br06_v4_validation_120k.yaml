# Issue 576 (BR-06): short warm-start validation config.
# Use this to verify that warm-start loading, weighted scenario sampling,
# reward wiring, and periodic evaluation all work before launching the
# overnight v4 config.
policy_id: ppo_expert_br06_v4_validation_120k
scenario_config: ../../scenarios/classic_interactions_francis2023.yaml
resume_from: ../../../output/model_cache/ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200/model.zip
num_envs: 4
worker_mode: subproc
seeds:
  - 123
randomize_seeds: true
# Important: when resuming, total_timesteps is the final post-resume target,
# not the number of extra timesteps to add.
total_timesteps: 15360000
feature_extractor: grid_socnav
feature_extractor_kwargs:
  grid_channels: [32, 64, 64]
  grid_kernel_sizes: [5, 3, 3]
  socnav_hidden_dims: [128, 128]
  dropout_rate: 0.1
policy_net_arch: [256, 256]
ppo_hyperparams:
  learning_rate: 7.5e-5
  batch_size: 256
  n_epochs: 4
  ent_coef: 0.008
  clip_range: 0.1
  target_kl: 0.02
env_overrides:
  observation_mode: socnav_struct
  use_occupancy_grid: true
  include_grid_in_observation: true
  robot_config:
    type: differential_drive
    max_linear_speed: 3.0
    max_angular_speed: 1.0
    allow_backwards: true
  grid_config:
    resolution: 0.2
    width: 32.0
    height: 32.0
    channels: [obstacles, pedestrians, combined]
    use_ego_frame: true
    center_on_robot: true
  peds_have_obstacle_forces: true
  sim_config:
    prf_config:
      is_active: true
    max_peds_per_group: 3
env_factory_kwargs:
  reward_name: route_completion_v3
  reward_kwargs:
    weights:
      progress: 1.4
      living: -0.015
      collision: -12.0
      near_miss: -3.0
      ttc_risk: -2.8
      comfort: -0.5
      smoothness: -0.18
      timeout: -4.5
      stagnation: -2.0
      terminal_bonus: 4.0
  peds_have_obstacle_forces: true
scenario_sampling:
  strategy: random
  profile_strategy: cycle
  weights:
    classic_crossing_medium: 3.0
    classic_crossing_high: 4.0
    classic_doorway_low: 3.0
    classic_doorway_high: 4.0
    classic_bottleneck_medium: 3.0
    classic_bottleneck_high: 3.5
    classic_realworld_double_bottleneck_high: 4.0
    classic_group_crossing_medium: 2.5
    classic_group_crossing_high: 3.0
    classic_merging_medium: 2.5
    classic_overtaking_medium: 2.5
    classic_head_on_corridor_medium: 2.0
    classic_t_intersection_medium: 2.0
convergence:
  success_rate: 0.9
  collision_rate: 0.05
  plateau_window: 500
evaluation:
  # Deprecated/ignored by train_ppo.py; cadence is controlled by step_schedule.
  frequency_episodes: 10
  evaluation_episodes: 6
  hold_out_scenarios: []
  step_schedule:
    - until_step: 15300000
      every_steps: 30000
    - every_steps: 60000
tracking:
  tensorboard: true
  wandb:
    enabled: false
