repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
  - repo: local
    hooks:
      - id: prevent-schema-duplicates
        name: Prevent Schema Duplicates
        entry: uv run python hooks/prevent_schema_duplicates.py
        language: system
        files: \.schema\.v[0-9]+\.json$
        pass_filenames: true
      - id: check-config-abs-paths
        name: Check Configs For Absolute Home-Dir Paths
        entry: uv run python hooks/check_config_abs_paths.py
        language: system
        files: ^configs/.*\.(ya?ml|json|toml|cfg|ini)$
        pass_filenames: true
      - id: check-config-provenance
        name: Check Training Config Issue Provenance
        entry: uv run python hooks/check_config_provenance.py
        language: system
        files: ^configs/training/.*\.ya?ml$
        pass_filenames: true
