name: hybrid_rule_route_reacquire_recenter_probe
algo: hybrid_rule_local_planner
base_config_path: configs/algos/hybrid_rule_v3_teb_like_rollout.yaml
params:
  max_linear_speed: 2.4
  max_linear_accel: 2.4
  goal_progress_weight: 5.0
  speed_preference_weight: 0.8
  deadlock_escape_weight: 1.0
  route_guide_commitment_weight: 0.2
  static_clearance_escape_enabled: true
  static_clearance_escape_min_clearance: 1.0
  static_clearance_escape_max_speed: 0.3
  static_clearance_escape_tolerance: 0.05
  static_recenter_enabled: true
  static_recenter_weight: 0.8
  static_recenter_probe_speed: 0.3
  static_corridor_transit_enabled: true
  static_corridor_transit_initial_band: 0.08
  static_corridor_transit_tolerance: 0.08
  static_corridor_transit_min_progress_3s: 0.1
  static_corridor_transit_weight: 0.5
  corridor_subgoal_enabled: true
  corridor_subgoal_speed: 0.25
  corridor_subgoal_turn_in_place_error: 0.2
  corridor_subgoal_heading_gain: 1.2
  corridor_subgoal_min_nearest_ped_distance: 1.0
  corridor_subgoal_use_continuous_static_check: true
  continuous_static_clearance_enabled: true
  corridor_subgoal_static_clearance_buffer: 0.0
  corridor_subgoal_goal_stall_progress_3s: 0.05
  corridor_subgoal_route_stall_progress_3s: 0.05
  corridor_subgoal_route_regression_1s: -0.05
  corridor_subgoal_min_route_remaining_distance: 0.5
  corridor_subgoal_max_lateral_offset: 0.6
  corridor_subgoal_route_progress_weight: 2.5
  corridor_subgoal_centering_weight: 0.7
  corridor_subgoal_tangent_alignment_weight: 1.4
  corridor_subgoal_clearance_weight: 0.4
  corridor_subgoal_continuity_weight: 0.3
  recovery_enabled: true
  recovery_reorient_angular_speed: 0.6
scenario_overrides:
  francis2023_narrow_doorway:
    corridor_subgoal_speed: 0.2
    corridor_subgoal_max_lateral_offset: 0.4
  classic_station_platform_medium:
    corridor_subgoal_max_lateral_offset: 0.8
