# Issue #2155 Research-v1 AMMV Social-Navigation Benchmark Matrix Contract.
#
# This is a frozen pre-execution contract, not a run output or performance
# claim.  Do not treat rows here as benchmark evidence until after a named
# campaign execution with artifact provenance.
#
# Purpose:
#   Define a stable, compact AMV social-navigation planner comparison surface
#   with scenario families, planner rows by family, seed policy, artifact
#   policy, and fallback/degraded fail-closed handling.
#
# Claim boundary:
#   research-v1 evidence only.  Fallback/degraded/failed/unavailable rows are
#   excluded from successful benchmark evidence under
#   docs/context/issue_691_benchmark_fallback_policy.md.
#
# Planner families:
#   core         - baseline-safe planners (goal, social_force, orca)
#   experimental - broader baselines (ppo, prediction_planner, socnav_sampling,
#                  sacadrl, socnav_bench)
#   hybrid_rule  - hybrid rule local planner variants
#   predictive_v2 - predictive planner v2 variants
#
# Seed policy:
#   paper_eval_s5: 5 seeds (111..115) from seed_sets_v1.yaml for compact
#   seed-sensitivity coverage while staying small enough for local runs.
#
# Artifact policy:
#   export_publication_bundle: false
#   include_videos_in_publication: false
#   Campaign output is research-v1 evidence only; do not promote to paper
#   release without explicit resolution.
#
# Canonical pre-execution validation:
#   robot_sf_bench validate-config --matrix configs/scenarios/issue_2155_research_v1_ammv.yaml
#   uv run pytest tests/benchmark/test_issue_2155_research_v1_matrix.py -q
#
# See docs/context/issue_2155_research_v1_ammv_matrix.md for the context note.

name: issue_2155_research_v1_ammv_matrix
paper_facing: false
paper_profile_version: paper-matrix-v1
scenario_matrix: configs/scenarios/issue_2155_research_v1_ammv.yaml
comparability_mapping: configs/benchmarks/alyassi_comparability_map_v1.yaml
route_clearance_certifications: configs/benchmarks/route_clearance_certifications_v1.yaml

amv_profile:
  name: amv-paper-v1
  contract_version: "1"
  coverage_enforcement: warn
  required_dimensions:
    use_case: [delivery_robot, shared_space_micromobility]
    context: [sidewalk, shared_space]
    speed_regime: [walking_speed, scooter_speed]
    maneuver_type: [overtake, crossing, bottleneck]

seed_policy:
  mode: seed-set
  seed_set: paper_eval_s5
  seed_sets_path: configs/benchmarks/seed_sets_v1.yaml

# No SNQI baseline or weights: research-v1 evidence does not require SNQI
# calibration.  SNQI is still available for diagnostic use when enabled.
snqi_contract:
  enabled: false

workers: 1
horizon: 100
dt: 0.1
record_forces: true
resume: true
stop_on_failure: false
bootstrap_samples: 300
bootstrap_confidence: 0.95
bootstrap_seed: 123

kinematics_matrix:
  - differential_drive

export_publication_bundle: false
include_videos_in_publication: false
overwrite_publication_bundle: false
repository_url: https://github.com/ll7/robot_sf_ll7
paper_interpretation_profile: issue-2155-research-v1-ammv-matrix

# ── Core baseline-safe planners ──────────────────────────────────────────
planners:
  - key: goal
    algo: goal
    planner_group: core
    benchmark_profile: baseline-safe

  - key: social_force
    algo: social_force
    planner_group: core
    benchmark_profile: baseline-safe

  - key: orca
    algo: orca
    planner_group: core
    benchmark_profile: baseline-safe
    socnav_missing_prereq_policy: fallback

# ── Experimental broader baseline planners ───────────────────────────────
  - key: ppo
    algo: ppo
    planner_group: experimental
    algo_config: configs/baselines/ppo_15m_grid_socnav.yaml
    benchmark_profile: experimental
    adapter_impact_eval: true

  - key: prediction_planner
    algo: prediction_planner
    planner_group: experimental
    algo_config: configs/algos/prediction_planner_camera_ready.yaml
    benchmark_profile: experimental

  - key: socnav_sampling
    algo: socnav_sampling
    planner_group: experimental
    benchmark_profile: experimental
    socnav_missing_prereq_policy: skip-with-warning

  - key: sacadrl
    algo: sacadrl
    planner_group: experimental
    benchmark_profile: experimental
    socnav_missing_prereq_policy: fallback

  - key: socnav_bench
    algo: socnav_bench
    planner_group: experimental
    benchmark_profile: experimental
    socnav_missing_prereq_policy: skip-with-warning

# ── Hybrid rule family (experimental) ────────────────────────────────────
  - key: hybrid_rule_v3_fast_progress_static_escape
    algo: hybrid_rule_local_planner
    planner_group: experimental
    algo_config: configs/policy_search/candidates/hybrid_rule_v3_fast_progress_static_escape.yaml
    benchmark_profile: experimental

  - key: scenario_adaptive_hybrid_orca_v1
    algo: hybrid_rule_local_planner
    planner_group: experimental
    algo_config: configs/policy_search/candidates/scenario_adaptive_hybrid_orca_v1.yaml
    benchmark_profile: experimental

# ── Predictive planner v2 family (experimental) ──────────────────────────
  - key: prediction_planner_v2_full
    algo: prediction_planner
    planner_group: experimental
    algo_config: configs/algos/prediction_planner_camera_ready.yaml
    benchmark_profile: experimental

  - key: prediction_planner_v2_xl_ego
    algo: prediction_planner
    planner_group: experimental
    algo_config: configs/algos/prediction_planner_camera_ready_xl_ego.yaml
    benchmark_profile: experimental
