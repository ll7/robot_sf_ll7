stage_order:
  - smoke
  - nominal_sanity
  - stress_slice
  - full_matrix
  - leader_collision_slice_h500
  - full_matrix_h500
  - robustness_extension

_h500_common: &h500_common
  scenario_matrix: configs/scenarios/classic_interactions_francis2023.yaml
  benchmark_profile: experimental
  horizon: 500
  dt: 0.1
  workers: 2
  requires_slurm: true

stages:
  smoke:
    scenario_matrix: configs/scenarios/single/planner_sanity_simple.yaml
    seed_list: [ 111 ]
    benchmark_profile: experimental
    horizon: 80
    dt: 0.1
    workers: 1
    requires_slurm: false
  nominal_sanity:
    scenario_matrix: configs/policy_search/nominal_sanity_matrix.yaml
    seed_manifest: configs/policy_search/nominal_sanity_seeds.yaml
    benchmark_profile: experimental
    horizon: 120
    dt: 0.1
    workers: 2
    requires_slurm: false
    gate:
      min_success_rate: 0.80
      max_collision_rate: 0.02
  stress_slice:
    scenario_matrix: configs/policy_search/stress_slice_matrix.yaml
    seed_manifest: configs/policy_search/stress_slice_seeds.yaml
    benchmark_profile: experimental
    horizon: 120
    dt: 0.1
    workers: 2
    requires_slurm: false
  full_matrix:
    scenario_matrix: configs/scenarios/classic_interactions_francis2023.yaml
    seed_list: [ 111, 112, 113 ]
    benchmark_profile: experimental
    horizon: 120
    dt: 0.1
    workers: 2
    requires_slurm: true
  leader_collision_slice_h500:
    <<: *h500_common
    seed_manifest: configs/policy_search/leader_collision_slice_h500_seeds.yaml
  full_matrix_h500:
    <<: *h500_common
    seed_list: [ 111, 112, 113 ]
  robustness_extension:
    scenario_matrix: configs/policy_search/stress_slice_matrix.yaml
    seed_manifest: configs/policy_search/robustness_extension_seeds.yaml
    benchmark_profile: experimental
    horizon: 120
    dt: 0.1
    workers: 2
    requires_slurm: true
