# Guarded PPO relaxed profile v2.
# More permissive than v1 to test whether success can be recovered without
# falling fully back to raw PPO behavior.

model_id: ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200
device: auto
deterministic: true
obs_mode: dict
action_space: unicycle
v_max: 2.0
omega_max: 1.0
fallback_to_goal: true

guard_rollout_dt: 0.2
guard_rollout_steps: 4
guard_near_field_distance: 1.3
guard_hard_ped_clearance: 0.40
guard_first_step_ped_clearance: 0.52
guard_hard_obstacle_clearance: 0.24
guard_min_ttc: 0.32

guard_obstacle_threshold: 0.5
guard_obstacle_search_cells: 12

fallback_risk_dwa:
  max_linear_speed: 1.15
  max_angular_speed: 1.2
  rollout_dt: 0.2
  rollout_steps: 7
  near_field_distance: 2.0
  near_field_speed_cap: 0.75
  goal_progress_weight: 5.5
  heading_weight: 0.8
  ped_clearance_weight: 1.6
  obstacle_clearance_weight: 0.9
  smoothness_weight: 0.08
  ttc_weight: 0.22
  progress_escape_enabled: true
