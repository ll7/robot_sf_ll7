# SAC gate configuration: ego-frame observation ablation plus stronger
# route-completion safety shaping.

policy_id: sac_gate_socnav_struct_ego_safe_v1
scenario_config: ../../scenarios/classic_interactions.yaml
total_timesteps: 50000
seed: 42
action_semantics: delta
obs_transform: ego

output_dir: output/models/sac

sac_hyperparams:
  learning_rate: 3.0e-4
  buffer_size: 50000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  learning_starts: 1000

env_overrides:
  observation_mode: socnav_struct

env_factory_kwargs:
  reward_name: route_completion_v3
  reward_kwargs:
    weights:
      progress: 2.2
      living: -0.015
      collision: -10.0
      near_miss: -1.0
      ttc_risk: -0.9
      comfort: -0.5
      smoothness: -0.2
      timeout: -3.0
      stagnation: -1.2
      terminal_bonus: 2.5

tracking:
  enabled: false
  project: robot_sf_sac
  run_name: sac_gate_socnav_struct_ego_safe_v1
  tags:
    - sac
    - gate
    - socnav-struct
    - ego-frame
    - safety-shaped
    - issue-790
