# Reviewed Baseline Disposition Companion (Issue #5952 / Issue #5972)
schema_version: evidence_registry_baseline_review.v1
claim_boundary: >-
  Per-file review record for the evidence-registry ratchet baseline refresh (Issues #5952 and
  #5972). This is NOT an exclusion policy: the strict-CI code-level exclusion policy lives at
  docs/context/evidence/evidence_registry_strict_ci_policy.yaml. This file records, for each
  evidence file that gained findings after the #5275/#5317 baseline was first committed, the
  explicit remediate-or-baseline disposition required by the issue Definition of Done. It exists
  separately from scripts/validation/evidence_registry_baseline.json so that
  evidence_registry_ratchet.py --write-baseline can regenerate the machine-counted baseline
  without clobbering the human review.
evidence_status: diagnostic-only
approved_by: ll7
approved_date: 2026-07-17
source_issue: 5972
source_issue_addendum: 5981
latest_reconciliation_issue: 6109
latest_reviewed_date: 2026-07-22
prior_baseline_commit: 9fa96c01bf1c8152459f5fa8c481e938fb1e6725
prior_baseline_total_findings: 359
prior_baseline_files_with_findings: 73
refreshed_baseline_total_findings: 410
refreshed_baseline_files_with_findings: 86
decision_summary: >-
  Fourteen evidence files merged after the 2026-07-11 baseline introduced 52 findings across
  eight codes. Every introduced code is already in the strict-CI exclusion policy, so no active
  strict-linter finding was introduced (strict mode remains at zero active findings). Each file
  was reviewed against its source to decide remediate-vs-baseline. All fourteen use the same
  legacy-debt pattern as the original 359 findings: artifact provenance gaps
  (external/private/untracked artifacts, ambiguous bare filenames) and campaign provenance gaps
  (dangling historical commits, missing producing config). None is trivially remediable without
  recovering external or historical provenance (durable remote commits, committed large
  artifacts, or external private locations), which is out of scope for this refresh and explicitly
  out of scope for Issue #5972 (deleting artifacts and suppressing new findings globally are
  excluded; this is a targeted, reviewed baseline inclusion, not a global suppression).
  Accordingly each file is dispositioned baseline below. A future maintainer who backfills
  provenance for any of these files should refresh the baseline with --write-baseline to lock in
  the reduction.
  Review addendum (issue #5983): campaign-level aggregation for
  `issue4206_trace_capable_h600_rerun_20260704` had attributed the unresolved producer commit
  62e08add1c2a5a750a6fd68a823319280c2dccd6 (an orphaned squash fragment, no longer reachable)
  from the issue #4891 and remaining issue #4848 exemplar records to the canonical Issue #4848
  metadata path. It was recorded below as a reviewed baseline increase pending provenance repair.
  Repair addendum (issue #5986): the dangling producer provenance across the whole shared
  campaign has been repaired by recording the unavailable original-generation provenance in every
  #4848 and #4891 exemplar `metadata.json`, `trace_series.json`, and `README.md`. The reachable
  origin/main integration commit 0b0214ced856eac77fa9a4c15b02921eabab1661 (squash-merge of PR
  #4938) is recorded separately as `published_integration_commit`, a pointer to the published
  exporter source; it is not asserted to be the generation commit. This completes the repair PR
  #5383 started (it fixed one metadata.json and README but left trace_series.json and the other
  bundles on the orphaned commit, which kept the campaign-level finding alive). The per-file
  SHA256SUMS were refreshed for every changed file. The baseline was refreshed with --write-baseline,
  dropping the #4848 canonical-path `dangling_commit` from 1 to 0 (total 415 -> 414); the
  corresponding reviewed baseline increase entry is removed below. The orphaned 62e08add commit
  remains unavailable and was not recovered or substituted as generation provenance. The three
  remaining findings on the canonical #4848 path
  (duplicate_campaign_id, missing_config_path, missing_config_sha256) are separate campaign
  provenance concerns outside issue #5986's dangling-commit scope and remain tracked here.
  Reconciliation addendum (issue #6109): the #5164 recovery merged exact historical campaign
  summaries for jobs 13268 and 13273. Their declared producer commit
  56b245132ea104ee8a621ddf65b8a3dd85028ed2 is absent from the full local history and from the
  GitHub commit API. Replacing it in the byte-preserved source reports would falsify provenance,
  so the two campaign-level dangling_commit increases are explicitly baselined below. In the
  same repair, all eight source-report hashes in h600_source_reports_recovery.json were bound to
  their tracked, byte-matching artifact paths instead of baselining the fixable
  hash_without_artifact_path findings. Regenerating the baseline also locks in six resolved
  uncommitted-artifact findings from h600_source_reports_manifest.json, reducing the baseline
  from 414 findings across 87 files to 410 findings across 86 files.
disposition_legend:
  baseline: >-
    Finding kept as reviewed legacy debt; the file is now tracked in the committed baseline so the
    downward ratchet gates on net-new findings only.
  remediate: >-
    Finding to be fixed in the evidence file itself; not applicable to this refresh because no
    file admitted a trivial, in-repo repair.
