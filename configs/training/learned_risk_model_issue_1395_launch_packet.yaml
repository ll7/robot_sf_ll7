trace_input_contract:
  required_episode_fields:
    - scenario_id
    - seed
    - candidate_id
    - termination_reason
    - metrics
    - trajectory_features
    - labels
  feature_inputs:
    - candidate_command_count
    - min_rollout_clearance_m
    - mean_pedestrian_distance_m
    - route_progress_delta
    - metrics.min_distance
    - metrics.avg_speed
    - metrics.goal_progress
