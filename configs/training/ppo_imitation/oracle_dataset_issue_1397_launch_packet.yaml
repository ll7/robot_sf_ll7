# Durable destinations the Slurm collection job must target. These are declared up front
# (as :pending aliases) so the preflight can reject worktree-local output/ roots before any
# job runs; concrete aliases replace the :pending placeholders once collection completes.
collection_roots:
  log_root: wandb-artifact://robot-sf/oracle-imitation/issue_1397_oracle_imitation_v1_logs:pending
  dataset_output_root: wandb-artifact://robot-sf/oracle-imitation/issue_1397_oracle_imitation_v1_raw_traces:pending
  manifest_destination: wandb-artifact://robot-sf/oracle-imitation/issue_1397_oracle_imitation_v1_manifest:pending
artifact_promotion_policy:
  raw_outputs_are_durable: false
  downstream_training_ready: false
  training_gate: >
    Downstream imitation training must run the validator with --require-training-ready and must
    fail closed until train_trace_jsonl_uri, validation_trace_jsonl_uri, evaluation_trace_jsonl_uri,
    and trace_source_manifest_uri point at concrete durable aliases. Issue #2620 currently records
    artifact_retrieval_blocked for the Issue #2441 raw traces.
  required_before_collection:
    - "Replace :pending W&B artifact aliases with concrete aliases or run ids."
    - "Record checksums for the generated dataset and manifest before imitation training starts."
collection_command_shape: >
  uv run python scripts/training/collect_expert_trajectories.py --dataset-id
  issue_1397_oracle_imitation_v1 --policy-id hybrid_rule_v3_static_margin0_waypoint2
  --scenario-config configs/policy_search/nominal_sanity_matrix.yaml --seeds 201 202 203
  204 205 206
local_preflight_command: >
  uv run python scripts/validation/validate_oracle_imitation_launch_packet.py --config
  configs/training/ppo_imitation/oracle_dataset_issue_1397_launch_packet.yaml --json
slurm_command_shape: >
  scripts/dev/sbatch_oracle_imitation_traces_issue1470.sh --dry-run --no-status
  prepares the issue #1470 train-split source-candidate trace collection job. This trace
  job is executable Slurm work, but it is not the final imitation NPZ dataset; downstream
  imitation training still requires durable dataset materialization and concrete artifact
  aliases after the trace run completes.
