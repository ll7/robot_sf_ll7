schema_version: robot_sf.scenario_matrix.v1
scenarios:
- name: issue_2925_cyclist_crossing
  map_file: ../../../maps/svg_maps/francis2023/francis2023_intersection_no_gesture.svg
  simulation_config:
    max_episode_steps: 180
    ped_density: 0.0
  single_pedestrians:
  - id: h1
    goal: null
    speed_m_s: 5.4
    trajectory:
    - - 8.0
      - 16.0
    - - 14.0
      - 10.0
    - - 20.0
      - 4.0
    metadata:
      fast_bicycle_actor:
        schema_version: fast-bicycle-actor.v1
        actor_type: bicycle
        speed_m_s: 5.4
        acceleration_m_s2: 1.2
        actor_radius_m: 0.45
        robot_radius_m: 0.3
        interaction_class: crossing
        interaction_role: oblique_crossing_fast_bicycle
        diagnostic_metric_subset: &cyclist_proxy_metrics
        - relative_closing_speed_m_s
        - time_to_conflict_zone_s
        - clearance_m
        - pass_overtake_state
        - interaction_class
        claim_boundary: &proxy_claim_boundary >
          Authored cyclist and fast-micromobility proxy metadata only; not a full cyclist
          dynamics model, calibrated cyclist realism evidence, or planner-ranking benchmark
          evidence.
  robot_config: {}
  metadata:
    purpose: Diagnostic cyclist-like crossing fixture for fast-micromobility proxy smoke tests.
    behavior: cyclist_proxy_crossing
    generation_profile:
      schema_version: scenario_generation_params.v1
      seed_signature: "2925"
      parameters: &base_generation_parameters
        density: low
        obstacle: open
        groups: 0.0
        speed_var: high
        goal_topology: point
        repeats: 1
        preset: manual_cyclist_micromobility_proxy
        id: issue_2925_cyclist_crossing
        flow: cross
        robot_context: embedded
    initial_difficulty: &medium_initial_difficulty
      schema_version: scenario_initial_difficulty.v1
      score: 0.54
      band: medium
      components:
        density: 0.18
        flow: 0.3
        obstacle: 0.0
        speed_var: 0.06
        goal_topology: 0.0
        groups: 0.0
        crowding: 0.0008333333333333333
      n_agents: 1
      area: 60.0
    authoring: &authoring_boundary
      status: draft
      template: francis2023-single-pedestrian-cyclist-micromobility-proxy
      source_issue: https://github.com/ll7/robot_sf_ll7/issues/2925
      benchmark_evidence: false
    cyclist_micromobility_actor:
      schema_version: cyclist-micromobility-fixture.v1
      case: crossing
      interaction_class: crossing
      status: diagnostic_metadata_only
      benchmark_evidence: false
      claim_boundary: *proxy_claim_boundary
      required_metrics: *cyclist_proxy_metrics
  seeds:
  - 2925
