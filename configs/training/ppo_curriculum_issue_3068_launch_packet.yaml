schema_version: ppo-curriculum-launch-packet.v1
campaign_id: issue_3068_ppo_curriculum_v1
generating_commit: fedee58afe8c5834f4e6ccb1179cdc00a8354606
# This packet is a PRE-LAUNCH specification authored BEFORE any long training run.
# Running the long SLURM training is a separate downstream issue and is out of scope here.
evidence_status: proposal
no_training_result_claim: true
no_claim_statement: >
  No training-result, performance, or benchmark claim exists for this campaign. The
  density/complexity curriculum and the fixed-difficulty PPO baseline have not been
  trained or evaluated in this issue. Any future claim requires the long training run,
  the predeclared metrics below, and durable artifacts recorded under durable_storage_plan.
hypothesis:
  id: density_complexity_curriculum_v1
  statement: >
    A density/complexity curriculum that gradually raises pedestrian density and scene
    complexity for socnav PPO reaches a higher final benchmark success rate (and/or lower
    collision rate) than a fixed-difficulty PPO baseline trained on the full-difficulty
    distribution with a matched total training budget. This is a proposal to be tested,
    not a result.
  competing_explanations:
    - id: extra_budget_not_curriculum
      statement: >
        Any observed gain comes from extra training budget or extra environment steps the
        curriculum arm received, not from the curriculum schedule itself.
      discriminating_check: matched_budget
    - id: train_curve_not_final_benchmark
      statement: >
        The curriculum improves the training curve (faster early learning) but does not
        improve the final held-out benchmark, so an early-stopping or curve-only readout
        would overstate the effect.
      discriminating_check: train_curve_and_final_benchmark
    - id: insufficient_provenance
      statement: >
        An apparent difference is an artifact of config drift or untracked checkpoints
        rather than a real curriculum effect.
      discriminating_check: config_checksums_and_artifact_pointers
discriminating_checks:
  matched_budget:
    requirement: >
      The curriculum arm and the baseline arm MUST use the same documented total_timesteps
      and the same number of seeds. Any budget difference must be recorded explicitly and
      treated as a confound; an unmatched-budget result cannot be reported as a curriculum
      gain.
    curriculum_total_timesteps: 15000000
    baseline_total_timesteps: 15000000
    budget_matched: true
  train_curve_and_final_benchmark:
    requirement: >
      Both training-curve metrics AND final held-out benchmark metrics MUST be reported.
      A curriculum claim requires improvement on the final benchmark, not only on the
      training curve.
    train_curve_metrics:
      - eval/success_rate_at_step
      - eval/collision_rate_at_step
      - rollout/ep_rew_mean
    final_benchmark_metrics:
      - benchmark/success_rate
      - benchmark/collision_rate
      - benchmark/timeout_rate
      - benchmark/route_completion
  config_checksums_and_artifact_pointers:
    requirement: >
      Every referenced config carries a sha256 checksum in this packet, and every future
      training run MUST record concrete checkpoint URIs and W&B run ids. Pending aliases
      are placeholders, not durable evidence.
training_starting_points:
  base_ppo_training_config: configs/training/ppo/expert_ppo_issue_576_br06_v3_15m_all_maps_randomized.yaml
  ppo_algo_config: configs/algos/ppo_v3_camera_ready.yaml
  guarded_algo_config: configs/algos/guarded_ppo_relaxed_v2.yaml
  scenario_config: configs/scenarios/classic_interactions_francis2023.yaml
  seed_manifest: configs/benchmarks/seed_sets_v1.yaml
  # The base training config supplies architecture (grid_socnav), reward
  # (route_completion_v3) and env overrides. The curriculum and baseline arms below
  # only modify density/complexity sampling; architecture, reward and seeds are held fixed.
  resume_policy_id: ppo_expert_br06_v3_15m_all_maps_randomized
  checksums:
    configs/training/ppo/expert_ppo_issue_576_br06_v3_15m_all_maps_randomized.yaml: a374a624eb38402e5e4e2612f92440c0f80ff1eb0554a34f33dd36c16920a426
    configs/algos/ppo_v3_camera_ready.yaml: 6e7efd7bef68d4cdbac23bda7a0fa12d206229d5c0566c1e38f84cd9122a73c8
    configs/algos/guarded_ppo_relaxed_v2.yaml: 666eda5a47de6e452eba9b2f3cb15bda16fc97abcd7137434661a87ac9ff85d8
    configs/scenarios/classic_interactions_francis2023.yaml: d9e148e4b544b4c7e2b6ba98e599aef47046d114e0e25645f021946674cb9dc5
    configs/benchmarks/seed_sets_v1.yaml: 3aaab9171517b8d33bafc679d4a2c740864db0f96650e24d75c4c7e927d239e6
curriculum:
  # Density/complexity stages, expressed over real env knobs:
  #   - ped_density: scenario simulation_config.ped_density (peds per m^2)
  #   - max_peds_per_group: env_overrides.sim_config.max_peds_per_group (group complexity)
  #   - archetype_mix: which interaction archetypes are sampled (scene complexity)
  # Stage progression is gated on the within-stage success_rate threshold below; the
  # total_timesteps is partitioned across stages and MUST sum to curriculum_total_timesteps.
  variable: [ped_density, max_peds_per_group, archetype_mix]
  advance_rule: success_rate_threshold
  stages:
    - id: stage_0_sparse
      ped_density: 0.0
      max_peds_per_group: 1
      archetype_mix: [empty_navigation, classic_crossing_low]
      timesteps: 3000000
      advance_success_rate: 0.85
    - id: stage_1_low
      ped_density: 0.01
      max_peds_per_group: 2
      archetype_mix: [classic_crossing_low, head_on_corridor]
      timesteps: 4000000
      advance_success_rate: 0.80
    - id: stage_2_medium
      ped_density: 0.02
      max_peds_per_group: 3
      archetype_mix: [head_on_corridor, classic_crossing_medium, overtaking]
      timesteps: 4000000
      advance_success_rate: 0.75
    - id: stage_3_full
      ped_density: 0.04
      max_peds_per_group: 3
      archetype_mix: [classic_interactions_francis2023_full]
      timesteps: 4000000
      advance_success_rate: null
  total_timesteps: 15000000
baseline_comparator:
  # Fixed-difficulty PPO trained directly on the full-difficulty distribution, matched
  # architecture/reward/seeds/budget. This is the comparator for the curriculum arm.
  id: fixed_difficulty_ppo_v1
  description: >
    Fixed-difficulty PPO trained on the full-difficulty scenario distribution
    (classic_interactions_francis2023 with ped_density 0.04 and max_peds_per_group 3) for
    the same total_timesteps, seeds, architecture and reward as the curriculum arm.
  ped_density: 0.04
  max_peds_per_group: 3
  archetype_mix: [classic_interactions_francis2023_full]
  total_timesteps: 15000000
  base_ppo_training_config: configs/training/ppo/expert_ppo_issue_576_br06_v3_15m_all_maps_randomized.yaml
seeds:
  training: [123, 231, 777, 992, 1337]
  randomize_seeds: true
  evaluation:
    manifest: configs/benchmarks/seed_sets_v1.yaml
    dev: [101, 102, 103]
    eval: [111, 112, 113]
  note: >
    Training seeds match the base config. Evaluation uses the frozen dev/eval seeds from the
    manifest. Training and evaluation seed roles are kept distinct; eval seeds are excluded
    from training-curve readouts.
run_budget:
  arms: [curriculum, fixed_difficulty_baseline]
  total_timesteps_per_arm: 15000000
  seeds_per_arm: 5
  total_training_runs: 10
  budget_matched_between_arms: true
  wall_clock_estimate: out_of_scope_for_this_packet
stop_rule:
  description: >
    Per-arm training stops at total_timesteps_per_arm OR at the base-config convergence
    gate (success_rate >= 0.9 and collision_rate <= 0.05 over plateau_window), whichever
    comes first. Curriculum stage advance is gated on the per-stage advance_success_rate.
    No early-stopping on the training curve may be used to declare a final-benchmark claim.
  max_timesteps_per_run: 15000000
  convergence_success_rate: 0.9
  convergence_collision_rate: 0.05
  plateau_window: 2000
metrics:
  train_curve:
    - eval/success_rate_at_step
    - eval/collision_rate_at_step
    - rollout/ep_rew_mean
  final_benchmark:
    - benchmark/success_rate
    - benchmark/collision_rate
    - benchmark/timeout_rate
    - benchmark/route_completion
  primary: benchmark/success_rate
  comparison: curriculum_vs_fixed_difficulty_baseline
expected_artifacts:
  items:
    - per_arm_per_seed_checkpoints
    - per_arm_training_curve_csv
    - per_arm_final_benchmark_summary_json
    - curriculum_stage_advance_log
    - comparison_table_curriculum_vs_baseline
  durable_uris:
    curriculum_checkpoints: wandb-artifact://robot-sf/ppo-curriculum/issue_3068_curriculum:pending
    baseline_checkpoints: wandb-artifact://robot-sf/ppo-curriculum/issue_3068_baseline:pending
    final_benchmark_summary: wandb-artifact://robot-sf/ppo-curriculum/issue_3068_benchmark:pending
validation_command: >
  uv run python -c "import yaml; d=yaml.safe_load(open('configs/training/ppo_curriculum_issue_3068_launch_packet.yaml')); assert d['no_training_result_claim'] is True; print('valid', d['campaign_id'])"
execution_boundary:
  full_training_in_this_issue: false
  submit_slurm_from_this_issue: true
  local_preflight_command: >
    uv run pytest tests/training/test_ppo_curriculum_launch_packet_issue_3068.py -q
  slurm_command_shape: >
    Submit through private operations only, using public worktree that owns
    issue-3068 launch branch. First launchable run is a full-surface scout that
    records training-curve artifacts under issue-3068 PPO curriculum campaign,
    but does not by itself establish full curriculum-vs-baseline final benchmark
    claim.
