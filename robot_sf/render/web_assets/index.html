<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Robot SF Three.js Viewer</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #111827;
        color: #f8fafc;
      }
      #viewer {
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 16px;
        top: 16px;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgb(15 23 42 / 88%);
        font-size: 14px;
      }
      #timeline {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 16px;
      }
      input[type="range"] {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="hud">Loading scene...</div>
    <input id="timeline" type="range" min="0" max="0" value="0" />
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
