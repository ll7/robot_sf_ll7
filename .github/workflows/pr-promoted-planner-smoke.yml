name: PR Promoted Planner Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promoted-planner-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      SDL_VIDEODRIVER: dummy
      MPLBACKEND: Agg
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
      LOGURU_LEVEL: WARNING
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python
        with:
          migrate-artifacts: "false"

      - name: Sync dependencies (locked)
        env:
          CI_STEP_TIMEOUT_SECONDS: "1200"
        run: bash scripts/dev/ci_step_timer.sh "Sync dependencies (locked)" uv sync --all-extras --frozen

      - name: Report uv cache state after sync
        if: always()
        run: bash scripts/dev/ci_uv_sync_diag.sh "uv-cache-post-sync"

      - name: Run promoted planner smoke
        run: |
          uv run python scripts/validation/run_pr_promoted_planner_smoke.py \
            --output-root output/benchmarks/pr_promoted_planner_smoke \
            --runtime-budget-seconds 90 \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload promoted planner smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-promoted-planner-smoke
          path: |
            output/benchmarks/pr_promoted_planner_smoke/summary.json
            output/benchmarks/pr_promoted_planner_smoke/summary.md
            output/benchmarks/pr_promoted_planner_smoke/episodes.jsonl
            output/benchmarks/pr_promoted_planner_smoke/logs/
          if-no-files-found: warn
