name: orca_prior_guarded_ppo_v1
algo: guarded_ppo
base_config_path: configs/algos/guarded_ppo_relaxed_v2.yaml
params:
  prior_policy: orca
  prior_blend_weight: 0.35
  prior_near_field_only: true
  prior_progress_margin: 0.04
  prior_allow_orca_fallback: false
  prior_orca:
    max_linear_speed: 1.7
    max_angular_speed: 1.0
    orca_neighbor_dist: 9.0
    orca_max_neighbors: 8
    orca_time_horizon: 5.0
    orca_time_horizon_obst: 3.0
    orca_obstacle_range: 6.0
    orca_heading_slowdown: 0.35
    orca_symmetry_bias: 0.2
    orca_head_on_bias: 0.35
    orca_stall_speed_threshold: 0.1
    orca_commit_distance: 1.7
    orca_commit_lateral_gain: 0.5
  fallback_risk_dwa:
    max_linear_speed: 1.05
    max_angular_speed: 1.2
    rollout_dt: 0.2
    rollout_steps: 7
    near_field_distance: 2.2
    near_field_speed_cap: 0.65
    goal_progress_weight: 5.2
    heading_weight: 0.8
    ped_clearance_weight: 1.8
    obstacle_clearance_weight: 1.0
    smoothness_weight: 0.1
    ttc_weight: 0.28
    progress_escape_enabled: true
