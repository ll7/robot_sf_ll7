[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = true

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.coverage.run]
source = ["robot_sf", "fast-pysf/pysocialforce"]

# Omit test files and non-library code from coverage measurement
omit = [
    "*/tests/*",
    "*/test_*",
    "tests/pygame/*",
    "examples/*",
    "scripts/*",
    "fast-pysf/tests/*",
    "fast-pysf/examples/*",
    "*/conftest.py",
    "*/__pycache__/*",
]
parallel = true
branch = true
data_file = "output/coverage/.coverage"

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
skip_empty = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.coverage.html]
directory = "output/coverage/htmlcov"
show_contexts = false

[tool.coverage.json]
output = "output/coverage/coverage.json"
show_contexts = false

[tool.pytest.ini_options]
addopts = [
    "--import-mode=importlib",
    "--durations=10",
]
testpaths = ["tests", "fast-pysf/tests"]
filterwarnings = [
    # Suppress external library warnings
    "ignore::UserWarning:pygame.*",
    "ignore::DeprecationWarning:pygame.*",
    "ignore::DeprecationWarning:pkg_resources.*",
    "ignore::DeprecationWarning:stable_baselines3.*",
    "ignore::UserWarning:stable_baselines3.*",
    "ignore::UserWarning:gymnasium.*",
    # Keep our own warnings visible
    "default::DeprecationWarning:robot_sf.*",
    "default::UserWarning:robot_sf.*",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "timeout: marks tests with a timeout expectation",
]


[dependency-groups]
dev = [
    # Development tools
    "pytest>=9.1.1",
    "pytest-timeout>=2.4.0",
    "pytest-cov>=7.1.0",
    "scalene>=2.3.0",
    "ruff==0.15.12",
    "pre-commit>=4.6.0",
    "setuptools>=83.0.0",
    "pylint>=4.0.6",
    "pytest-xdist>=3.6.1",
    "pytest-split>=0.9.0",
    "jupyter>=1.0.0",
    "mypy>=1.0.0",
    "mutmut",
]
docs = [
    "myst-parser>=4.0.0",
    "sphinx>=7.0.0",
    "sphinx-rtd-theme>=2.0.0",
]
carla = [
    # Host-side Python client for the pinned CARLA Docker/runtime path. Keep this as an explicit
    # dependency group so routine `uv sync --all-extras` installs remain CARLA-free.
    "carla==0.9.16 ; sys_platform == 'linux' and platform_machine == 'x86_64'",
]
imitation = [
    "imitation>=1.0.0",
]

[project.scripts]
robot_sf_bench = "robot_sf.benchmark.cli:main"
robot-sf-export-carla-t0 = "robot_sf_carla_bridge.cli:export_t0_scenarios_main"
robot-sf-validate-carla-t0-manifest = "robot_sf_carla_bridge.cli:validate_t0_manifest_main"
robot-sf-validate-carla-t0-batch = "robot_sf_carla_bridge.cli:validate_t0_export_batch_main"
robot-sf-check-carla = "robot_sf_carla_bridge.cli:check_carla_availability_main"
robot-sf-catalog-carla-schemas = "robot_sf_carla_bridge.cli:catalog_carla_schemas_main"
robot-sf-carla-t1-oracle-smoke = "robot_sf_carla_bridge.cli:replay_t1_oracle_smoke_main"
robot-sf-carla-docker-runtime = "robot_sf_carla_bridge.cli:carla_docker_runtime_main"
robot-sf-carla-parity-bundle-preflight = "robot_sf_carla_bridge.cli:preflight_carla_parity_bundle_main"
robot-sf-carla-replay-diagnostics = "scripts.carla_bridge.diagnose_replay_semantics:main"
robot-sf-migrate-artifacts = "scripts.tools.migrate_artifacts:main"

# Note: uv-specific config removed to avoid duplicate-config warnings with uv.toml

[tool.uv]
conflicts = [
    [
        { extra = "rllib" },
        { group = "imitation" },
    ],
]

[tool.uv.sources]
pysocialforce = { path = "fast-pysf", editable = true }
pyrvo2 = { path = "third_party/python-rvo2" }

[tool.ty.src]
exclude = [
    "tests",
    "tests/pygame",
    "fast-pysf/tests",
    "fast-pysf/examples",
    "fast-pysf/benchmarks"
]

[tool.ty.environment]
python = "./.venv"
