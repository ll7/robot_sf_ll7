# Diagnostic-only AMV actuation-aware hybrid-rule wrapper.
#
# This reuses the deterministic hybrid-rule route-guided local planner and
# projects its absolute unicycle command through the synthetic AMV actuation
# envelope before benchmark execution. It is not calibrated hardware evidence.
allow_testing_algorithms: true
planner_variant: actuation_aware_hybrid_rule_v0

max_linear_speed: 2.0
max_angular_speed: 1.2
max_linear_accel: 2.0
max_linear_decel: 2.5
max_angular_accel: 4.0
control_period: 0.6

rollout_dt: 0.2
rollout_horizon: 1.6
hard_collision_horizon: 1.2
soft_prediction_horizon: 3.0
goal_tolerance: 0.25
waypoint_switch_distance: 0.9

linear_samples: 7
angular_samples: 9
lookahead_distances: [0.5, 1.0, 1.5, 2.0]

robot_radius_default: 0.3
pedestrian_radius_default: 0.3
hard_safety_margin: 0.05
desired_static_clearance: 0.7
desired_dynamic_clearance: 0.9
obstacle_threshold: 0.5
obstacle_search_cells: 12

stop_distance_human: 0.5
slow_distance_human: 1.0
moderate_distance_human: 2.0
very_slow_speed: 0.15
moderate_speed: 0.6
near_human_angular_limit_distance: 0.8
near_human_max_angular_speed: 0.7

goal_progress_weight: 4.0
path_alignment_weight: 0.8
speed_preference_weight: 0.6
static_clearance_weight: 1.5
dynamic_clearance_weight: 1.8
ttc_weight: 0.8
heading_smoothness_weight: 0.4
velocity_smoothness_weight: 0.3
control_effort_weight: 0.2
freezing_weight: 0.8
oscillation_weight: 0.5

freezing_speed_threshold: 0.05
goal_far_distance: 0.8
oscillation_window: 6
top_k_diagnostics: 5

route_guide_enabled: true
route_guide_obstacle_inflation_cells: 3
route_guide_waypoint_lookahead_cells: 5
route_guide_clearance_penalty_weight: 0.5

projection_profile_name: amv-actuation-stress-v0
projection_profile_version: v0
claim_scope: synthetic-only
diagnostic_only: true
calibrated_hardware_evidence: false
max_linear_accel_m_s2: 2.0
max_linear_decel_m_s2: 2.5
max_yaw_rate_rad_s: 1.2
max_angular_accel_rad_s2: 4.0
projection_dt: 0.1
