# Issue #5578 robot speed-tier sweep preregistration.
#
# Plain-language summary: this freezes a comparable six-scenario speed sweep so
# future results can test whether the current <=2.0 m/s evidence boundary changes
# in the 3.0-4.2 m/s micromobility band. This packet is protocol evidence only.
schema_version: robot_sf.issue_5578_robot_speed_tier_preregistration.v1
issue: 5578
governance_issue: 5557
amendment_issue: 6100
study_id: issue_5578_robot_speed_tier_sweep_above_2mps_v1
status: preregistration

claim_boundary: >-
  Preregistration and CPU contract evidence only. This packet does not run the
  benchmark campaign, establish planner superiority, promote speed-effect claims,
  or edit paper/dissertation claims. A future result is not benchmark evidence unless
  every native row and provenance requirement below passes.

primary_claim_scope: per_planner_robustness
ranking_claim_scope: descriptive_only

execution_boundary:
  full_benchmark_campaign_in_this_pr: false
  compute_submit_authorized: false
  paper_claim_edits: false
  metric_semantics_changes: false
  fallback_or_degraded_success_allowed: false

baseline_protocol:
  release_reference: configs/benchmarks/paper_experiment_matrix_v1_h600_hybrid_vs_orca_s30.yaml
  scenario_matrix: configs/scenarios/classic_interactions.yaml
  seed_set_name: paper_eval_s30
  horizon_steps: 600
  dt_seconds: 0.1
  workers: 1

scenario_contract:
  selection_rule: >-
    Fixed middle-band slice: one medium-density interaction row for each of five
    planner-dependent classic mechanisms plus the fixed station-platform interaction.
    No scenario may be added, removed, or replaced after the first campaign row.
  selected_scenarios:
    - scenario_id: classic_head_on_corridor_medium
      source_path: configs/scenarios/archetypes/classic_head_on_corridor.yaml
      mechanism: head_on_corridor
    - scenario_id: classic_doorway_medium
      source_path: configs/scenarios/archetypes/classic_doorway.yaml
      mechanism: doorway
    - scenario_id: classic_group_crossing_medium
      source_path: configs/scenarios/archetypes/classic_group_crossing.yaml
      mechanism: group_crossing
    - scenario_id: classic_merging_medium
      source_path: configs/scenarios/archetypes/classic_merging.yaml
      mechanism: merging
    - scenario_id: classic_overtaking_medium
      source_path: configs/scenarios/archetypes/classic_overtaking.yaml
      mechanism: overtaking
    - scenario_id: classic_station_platform_medium
      source_path: configs/scenarios/archetypes/classic_station_platform.yaml
      mechanism: station_platform
  scenario_count: 6
  scenario_count_justification: >-
    The six-scenario / 2,160-episode design is a bounded fixed-suite study covering
    the middle-density classic interaction mechanisms. It does not inherit the earlier
    18-cell / 6.5k scope and cannot support wider scenario-population generalization claims.
  power_sensitivity_note: >-
    Statistical power and sensitivity are bounded by the 6 fixed scenarios and 30 seeds
    (n=180 pairs per planner x tier). The study is powered to detect material shifts
    exceeding the preregistered harm thresholds on this fixed suite, not to generalize
    across arbitrary unobserved map topologies.
  fixed_pairing:
    same_scenario_seed_set_across_speed_tiers: true
    same_scenario_seed_set_across_planners: true
    scenario_order_frozen: true
    no_seed_substitution: true

seed_policy:
  source_path: configs/benchmarks/seed_sets_v1.yaml
  set_name: paper_eval_s30
  seeds:
    - 111
    - 112
    - 113
    - 114
    - 115
    - 116
    - 117
    - 118
    - 119
    - 120
    - 121
    - 122
    - 123
    - 124
    - 125
    - 126
    - 127
    - 128
    - 129
    - 130
    - 131
    - 132
    - 133
    - 134
    - 135
    - 136
    - 137
    - 138
    - 139
    - 140

robot_speed_axis:
  axis_name: robot_speed_cap_m_s
  baseline_cap_m_s: 2.0
  tiers:
    - tier_id: cap_2_0_nominal
      cap_m_s: 2.0
      drive_model: bicycle_drive
      max_accel_m_s2: 1.0
      max_decel_m_s2: 2.0
      stopping_distance_envelope_m: 1.0
      command_action_scaling:
        scaling_method: linear_unicycle_action_to_drive_speed_cap
        linear_speed_range_m_s: [0.0, 2.0]
        normalized_action_range: [0.0, 1.0]
      role: nominal_reference
    - tier_id: cap_3_0
      cap_m_s: 3.0
      drive_model: bicycle_drive
      max_accel_m_s2: 1.5
      max_decel_m_s2: 3.0
      stopping_distance_envelope_m: 1.5
      command_action_scaling:
        scaling_method: linear_unicycle_action_to_drive_speed_cap
        linear_speed_range_m_s: [0.0, 3.0]
        normalized_action_range: [0.0, 1.0]
      role: preregistered_extension
    - tier_id: cap_4_2
      cap_m_s: 4.2
      drive_model: bicycle_drive
      max_accel_m_s2: 2.1
      max_decel_m_s2: 4.2
      stopping_distance_envelope_m: 2.1
      command_action_scaling:
        scaling_method: linear_unicycle_action_to_drive_speed_cap
        linear_speed_range_m_s: [0.0, 4.2]
        normalized_action_range: [0.0, 1.0]
      role: preregistered_extension
  override_contract:
    runtime_binding: robot_config.drive_speed_cap
    runtime_reference_config: configs/research/robot_speed_band_v1.yaml
    robot_only_axis: true
    pedestrian_speed_axis_fixed: true
    supported_drive_models:
      bicycle_drive: max_velocity
      differential_drive: max_linear_speed
    braking_authority: carry_drive_model_max_decel_into_each_tier
  activation_contract:
    required_diagnostics:
      - commanded_speed_mean_m_s
      - realized_speed_mean_m_s
      - realized_speed_peak_m_s
      - fraction_above_2_0_mps
      - cap_saturation_fraction
      - resolved_actuation_envelope
    minimum_activation_rule:
      min_fraction_above_2_0_mps: 0.05
      min_peak_speed_m_s: 2.2
      rule_definition: >-
        For non-nominal tiers (3.0 and 4.2 m/s), an intervention is activated if
        fraction_above_2_0_mps >= 0.05 or realized_speed_peak_m_s > 2.2.
        If an intervention is not activated (cap-inactive), the tier cannot support
        a no-harm / no-effect conclusion and must be reported as intervention_not_activated.

planner_roster:
  selection_assumption: >-
    "Top hybrid" is operationalized and frozen as the promoted collision-guarded
    hybrid arm (scenario_adaptive_hybrid_orca_v2_collision_guard).
  arms:
    - planner_id: scenario_adaptive_hybrid_orca_v2_collision_guard
      algorithm: hybrid_rule_local_planner
      role: top_hybrid_promoted
      config_path: configs/policy_search/candidates/scenario_adaptive_hybrid_orca_v2_collision_guard.yaml
    - planner_id: ppo
      algorithm: ppo
      role: learned_comparator
      config_path: configs/baselines/ppo_issue_791_eval_aligned_large_capacity.yaml
      estimand_type: zero_shot_ood_robustness
      retraining_status: none_zero_shot_eval_only
    - planner_id: orca
      algorithm: orca
      role: classical_baseline
      config_path: null
    - planner_id: prediction_planner
      algorithm: prediction_planner
      role: predictive_comparator
      config_path: configs/algos/prediction_planner_camera_ready.yaml

inference_contract:
  resampling_unit: paired_seed_block
  resampling_unit_rationale: >-
    Conditioned on the six fixed declared scenarios, resample paired seed blocks
    across scenarios to preserve exact scenario-seed contrasts without implying
    an unobserved scenario superpopulation.
  inference_population: fixed_declared_suite
  estimand: paired_delta
  primary_claim_scope: per_planner_robustness
  ranking_claim_scope: descriptive_only
  estimand_definition: >-
    For each planner and non-nominal tier, estimate the tier-minus-2.0 m/s change
    on the same scenario-seed pairs, then summarize across the six declared scenarios.
  primary_metrics:
    - success_rate
    - collision_rate
    - near_miss_rate
  typed_collision_breakdown:
    - ped_collision_rate
    - obstacle_collision_rate
    - agent_collision_rate
    - unclassified_collision_rate
  exposure_metrics:
    - time_to_goal_norm
    - total_exposure_seconds
    - travel_distance_m
    - mean_clearance_m
    - min_clearance_m
  multiplicity:
    method: holm_bonferroni
    family: planner_by_non_nominal_tier_by_primary_metric
    tests_per_planner: 6
    hypothesis_alignment: margin_aligned_one_sided
  decision_rule:
    confidence_level: 0.95
    success_rate_harm_threshold: -0.05
    collision_rate_harm_threshold: 0.02
    near_miss_rate_harm_threshold: 0.05
    hypothesis_type: margin_aligned_one_sided
    labels:
      materially_harmful: >-
        One-sided adjusted confidence interval crosses the corresponding preregistered
        harm threshold in the harmful direction for at least one primary metric.
      no_material_shift: >-
        All adjusted one-sided confidence intervals demonstrate non-inferiority with
        respect to the preregistered harm thresholds.
      inconclusive: >-
        The native paired result is complete but neither decision condition is met.
      intervention_not_activated: >-
        The speed-tier manipulation was not activated (minimum activation rule failed);
        cannot support a no-harm conclusion.
  safety_interpretation_contract:
    collision_frequency_note: >-
      Collision and near-miss frequencies measure event occurrence rate, not
      physical impact severity, impulse, or injury risk.
    speed_range_validity_note: >-
      The 4.2 m/s (~15.1 km/h) top tier tests the low end of the micromobility
      speed range and does not validate safety across the full 15-25 km/h platform range.

result_contract:
  required_cell_keys:
    - scenario_id
    - speed_tier_id
    - speed_cap_m_s
    - planner_id
    - seed
    - horizon_steps
    - dt_seconds
    - execution_mode
    - commanded_speed_mean_m_s
    - realized_speed_mean_m_s
    - realized_speed_peak_m_s
    - fraction_above_2_0_mps
    - cap_saturation_fraction
    - resolved_actuation_envelope
  required_per_tier_summary:
    - success_rate
    - collision_rate
    - near_miss_rate
    - typed_collision_breakdown
    - paired_delta_vs_cap_2_0
    - activation_diagnostics_summary
    - exposure_summary
  expected_cell_count: 2160
  expected_speed_scenario_cells: 18

provenance_contract:
  required:
    - public_git_sha_and_clean_dirty_state
    - exact_command_and_environment_manifest
    - per_episode_jsonl_and_aggregate_summary
    - typed_collision_breakdown_and_denominator_table
    - native_execution_mode_for_every_claimed_row
    - exclusion_table_for_missing_failed_fallback_or_degraded_rows
  durable_evidence_path: docs/context/evidence/issue_5578_robot_speed_tier_sweep
  raw_episode_policy: keep_raw_jsonl_videos_logs_out_of_git

validation:
  checker_command: uv run python scripts/validation/check_issue_5578_robot_speed_tier_preregistration.py --json
  focused_test_command: uv run pytest -q tests/validation/test_check_issue_5578_robot_speed_tier_preregistration.py
  campaign_execution_allowed_in_this_pr: false
