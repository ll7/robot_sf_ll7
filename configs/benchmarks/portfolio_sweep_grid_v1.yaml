# Portfolio campaign sweep grid.
variants:
  - name: risk_dwa_baseline
    algo: risk_dwa
    algo_config_path: ../algos/risk_dwa_camera_ready.yaml

  - name: risk_dwa_dense_safe
    algo: risk_dwa
    algo_config_path: ../algos/risk_dwa_camera_ready.yaml
    params:
      near_field_speed_cap: 0.5
      ttc_weight: 0.45
      ped_clearance_weight: 2.0

  - name: mppi_social_baseline
    algo: mppi_social
    algo_config_path: ../algos/mppi_social_camera_ready.yaml

  - name: mppi_social_dense_safe
    algo: mppi_social
    algo_config_path: ../algos/mppi_social_camera_ready.yaml
    params:
      sample_count: 128
      iterations: 4
      near_field_speed_cap: 0.45
      ttc_weight: 0.5

  - name: hybrid_portfolio_default
    algo: hybrid_portfolio
    algo_config_path: ../algos/hybrid_portfolio_camera_ready.yaml

  - name: prediction_planner_anchor
    algo: prediction_planner
    algo_config_path: ../algos/prediction_planner_camera_ready.yaml
