# PPO carry-forward candidate config pinned to the BR-06 v10 best-success checkpoint.
#
# Intended for benchmark/evaluation runs where PPO should use the current
# carry-forward candidate without changing the rest of the paper-facing matrix.

model_id: ppo_expert_br06_v10_best_27dbe5xu_20260317

# Device selection for SB3
device: auto
# Use deterministic=True for evaluation/benchmarking
deterministic: true

# Observation handling
obs_mode: dict

# Action formatting
action_space: unicycle
v_max: 2.0
omega_max: 1.0

# Fail fast so this comparison reflects the checkpoint itself.
fallback_to_goal: false
