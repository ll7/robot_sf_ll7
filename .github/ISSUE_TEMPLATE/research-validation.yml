name: Research validation
description: Propose a bounded research or benchmark-validation question with proof expectations.
title: "research: "
labels:
  - research
  - validation
body:
  - type: markdown
    attributes:
      value: |
        Use this form for research-validation work that needs a clear hypothesis, evidence grade,
        artifact policy, and executable validation path before implementation starts.
        Research issues should preferably explain what claim boundary, hypothesis, negative
        result, synthesis decision, or durable experiment blocker they are meant to change. Treat
        that as adapted guidance, not a hard requirement for every small support issue.
        Prefer the smallest issue that can produce one discriminating diagnostic table, trace,
        decision, or experiment. Blocked and diagnostic-only outcomes are valid research results
        when the claim boundary stays explicit.
  - type: textarea
    id: goal
    attributes:
      label: Goal / Problem
      description: State the research question and why it matters now.
      placeholder: What question should this issue answer?
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: State the expected result or decision this issue should test.
      placeholder: We expect that...
    validations:
      required: true
  - type: textarea
    id: competing_explanations
    attributes:
      label: Competing explanations
      description: List plausible alternatives this issue should distinguish from the preferred hypothesis, or explain why comparison is blocked.
      placeholder: |
        1.
        2.
        3.
        N/A - blocked:
    validations:
      required: true
  - type: textarea
    id: discriminating_evidence
    attributes:
      label: Discriminating evidence
      description: Name the trace, metric, table, diagnostic, or experiment that separates the competing explanations, or explain the blocker.
      placeholder: |
        What evidence would make one explanation more plausible than the others?
        N/A - blocked:
    validations:
      required: true
  - type: textarea
    id: mechanism_signal_required
    attributes:
      label: Mechanism signal required
      description: Name the fields or observable mechanism signals that must change before any claim-strength upgrade, or explain why this is support-only.
      placeholder: |
        Which planner, scenario, trace, score, activation, command, or outcome fields must move?
        N/A - support/docs-only:
    validations:
      required: true
  - type: textarea
    id: stop_rule
    attributes:
      label: Stop rule
      description: State when to retire, narrow, block, or keep the mechanism diagnostic-only.
      placeholder: |
        When do we stop pursuing this mechanism or classify it as blocked/diagnostic-only?
        If blocked or diagnostic-only, why does the claim class stay unchanged?
    validations:
      required: true
  - type: dropdown
    id: evidence_grade
    attributes:
      label: Evidence grade
      description: How strong is the current evidence behind this issue?
      options:
        - observed
        - inferred
        - speculative
        - blocked
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List in-scope work, non-goals, variables, and comparison boundaries.
      placeholder: |
        In scope:
        Non-goals:
        Controls/comparators:
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true before this research issue is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: research_result_guidance
    attributes:
      label: Research result guidance
      description: Optional adapted guidance for claim movement, synthesis, or decision routing.
      placeholder: |
        Target claim or hypothesis:
        Comparator or baseline:
        Minimum valid evidence:
        Decision routing:
        Expected artifacts:
        Parent issue / claim map / context note to update:
    validations:
      required: false
  - type: textarea
    id: validation_command
    attributes:
      label: Validation command
      description: Provide the canonical command or explain why this is docs-only.
      placeholder: uv run --active ...
    validations:
      required: true
  - type: textarea
    id: artifact_policy
    attributes:
      label: Artifact policy
      description: Identify expected evidence category and durable storage boundary.
      placeholder: |
        Evidence category:
        output/ usage:
        Durable pointer or tracked evidence:
    validations:
      required: true
  - type: dropdown
    id: blocked_ready_state
    attributes:
      label: Blocked / ready state
      description: Select the current execution state.
      options:
        - ready
        - blocked by prerequisite implementation
        - blocked by external asset/runtime
        - execution-only
        - decision required
    validations:
      required: true
  - type: textarea
    id: estimate_metadata
    attributes:
      label: Estimate metadata
      description: Capture effort, complexity, risk, and uncertainty.
      placeholder: |
        Effort (h):
        Complexity:
        Risk:
        Uncertainty:
    validations:
      required: true
