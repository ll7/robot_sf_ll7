# BR-08 offline world-model pretraining profile for DreamerV3.
# This warm-start phase trains only the world model on teacher-generated episodes.
experiment:
  run_id: dreamerv3_br08_benchmark_socnav_grid_world_model_pretrain
  output_root: output/dreamerv3
  train_iterations: 40
  checkpoint_every: 10
  seed: 123
  log_level: WARNING

ray:
  address: null
  local_mode: false
  include_dashboard: false
  num_cpus: 16
  num_gpus: 1
  disable_uv_run_runtime_env: true
  runtime_env:
    working_dir: .
    excludes:
      - ".git"
      - ".venv"
      - ".pytest_cache"
      - ".ruff_cache"
      - "__pycache__"
      - "output"
      - "results"
      - "dist"
      - "robot_sf.egg-info"
      - "*.mp4"
      - "*.gif"

tracking:
  wandb:
    enabled: true
    project: robot_sf_dreamerv3
    group: br08-benchmark-socnav-grid-world-model-pretrain
    job_type: pretrain
    mode: online
    tags:
      [dreamerv3, rllib, br08, offline, world-model-pretrain, socnav_struct, occupancy_grid]
    dir: output/wandb

env:
  flatten_observation: true
  flatten_keys: null
  normalize_actions: true
  scenario_matrix:
    path: ../../scenarios/classic_interactions_francis2023.yaml
    strategy: random
    switch_per_reset: true
  factory_kwargs:
    debug: false
    recording_enabled: false
    reward_name: route_completion_v3
    reward_kwargs:
      weights:
        progress: 1.1
        living: -0.015
        collision: -15.0
        near_miss: -3.0
        ttc_risk: -2.8
        comfort: -0.5
        smoothness: -0.18
        timeout: -6.5
        stagnation: -2.0
        terminal_bonus: 20.0
  config:
    observation_mode: socnav_struct
    use_image_obs: false
    use_occupancy_grid: true
    include_grid_in_observation: true
    grid_config:
      resolution: 0.2
      width: 32.0
      height: 32.0
      channels: [obstacles, pedestrians, combined]
      use_ego_frame: true
      center_on_robot: true

evaluation:
  enabled: false
  every_iterations: 10
  evaluation_episodes: 10

offline_data:
  input: ../../../output/benchmarks/dreamer_world_model/br08_world_model_ppo_teacher
  input_read_episodes: true
  input_read_batch_size: 16
  materialize_data: true
  materialize_mapped_data: true
  dataset_num_iters_per_learner: 1
  shuffle_buffer_size: 1
  actions_in_input_normalized: true

algorithm:
  framework: torch
  env_runners:
    num_env_runners: 0
    rollout_fragment_length: 1
  resources:
    num_gpus: 1
  learners:
    num_learners: 0
    num_gpus_per_learner: 1
  training:
    model_size: S
    training_ratio: 64
    batch_size_B: 16
    batch_length_T: 32
    horizon_H: 10
    train_actor: false
    train_critic: false
    world_model_lr: 0.0001
    actor_lr: 0.00003
    critic_lr: 0.00003
