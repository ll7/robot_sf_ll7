# Issue #1856 planner-side coupling gate for predictive-v2 work.
#
# This grid is intentionally small and local-preflight oriented. It keeps the old
# baseline-like row as the closed-loop reference, then tests one revised planner-side
# coupling hypothesis before any four-way training expansion.
variants:
  - name: baseline_like
    params:
      predictive_goal_weight: 5.0
      predictive_collision_weight: 0.4
      predictive_near_miss_weight: 0.05
      predictive_ttc_weight: 0.15
      predictive_ttc_distance: 0.8
      occupancy_weight: 0.3
      predictive_candidate_speeds: [0.0, 0.4, 0.7, 1.0]
      predictive_candidate_heading_deltas: [-0.785398, -0.392699, 0.0, 0.392699, 0.785398]

  - name: phase_coupled_sequence_gate
