<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Real-world inspired station platform benchmark -->
<svg
  width="72"
  height="28"
  viewBox="0 0 72 28"
  version="1.1"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape">
  <g inkscape:label="obstacles">
    <rect x="0" y="0" width="72" height="1" fill="#000000" inkscape:label="obstacle" />
    <rect x="0" y="27" width="72" height="1" fill="#000000" inkscape:label="obstacle" />
    <rect x="0" y="0" width="1" height="28" fill="#000000" inkscape:label="obstacle" />
    <rect x="71" y="0" width="1" height="28" fill="#000000" inkscape:label="obstacle" />

    <!-- Parked train body / platform edge occupying the upper half of the map. -->
    <rect x="1" y="1" width="70" height="7" fill="#000000" inkscape:label="obstacle" />

    <!-- Bench islands that force lateral passing decisions in the platform aisle. -->
    <rect x="20" y="11" width="5" height="3" fill="#000000" inkscape:label="obstacle" />
    <rect x="35" y="11" width="5" height="3" fill="#000000" inkscape:label="obstacle" />
    <rect x="50" y="11" width="5" height="3" fill="#000000" inkscape:label="obstacle" />

    <!-- Columns near the open concourse edge. -->
    <rect x="28" y="18" width="2" height="3" fill="#000000" inkscape:label="obstacle" />
    <rect x="43" y="18" width="2" height="3" fill="#000000" inkscape:label="obstacle" />
  </g>

  <g inkscape:label="robot">
    <rect x="4" y="20" width="4" height="4" fill="#ffdf00" inkscape:label="robot_spawn_zone_0" />
    <rect x="64" y="20" width="4" height="4" fill="#ff6c00" inkscape:label="robot_goal_zone_0" />
    <path
      d="M 8 22 L 18 22 L 28 22 L 36 22 L 44 22 L 54 22 L 64 22"
      stroke="#0300d5"
      stroke-width="0.4"
      fill="none"
      inkscape:label="robot_route_0_0" />
  </g>

  <g inkscape:label="pedestrians">
    <rect x="3" y="9" width="4" height="10" fill="#23ff00" inkscape:label="ped_spawn_zone_0" />
    <rect x="65" y="9" width="4" height="10" fill="#107400" inkscape:label="ped_goal_zone_0" />

    <rect x="65" y="9" width="4" height="10" fill="#23ff00" inkscape:label="ped_spawn_zone_1" />
    <rect x="3" y="9" width="4" height="10" fill="#107400" inkscape:label="ped_goal_zone_1" />

    <path
      d="M 7 14 L 18 14 L 18 16 L 28 16 L 33 16 L 33 14 L 43 14 L 48 14 L 48 16 L 58 16 L 65 16"
      stroke="#c40202"
      stroke-width="0.4"
      fill="none"
      inkscape:label="ped_route_0_0" />
    <path
      d="M 65 13 L 58 13 L 48 13 L 48 15 L 43 15 L 33 15 L 33 13 L 28 13 L 18 13 L 18 15 L 7 15"
      stroke="#c40202"
      stroke-width="0.4"
      fill="none"
      inkscape:label="ped_route_1_1" />
  </g>

  <g inkscape:label="single_pedestrians">
    <circle cx="12" cy="12" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p1_start" />
    <circle cx="60" cy="12" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p1_goal" />

    <circle cx="14" cy="17" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p2_start" />
    <circle cx="58" cy="17" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p2_goal" />

    <circle cx="60" cy="12.5" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p3_start" />
    <circle cx="12" cy="12.5" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p3_goal" />

    <circle cx="58" cy="17.5" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p4_start" />
    <circle cx="14" cy="17.5" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p4_goal" />
  </g>
</svg>
