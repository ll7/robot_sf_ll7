# Predictive MPPI planner.
# Uses the learned pedestrian predictor from the predictive planner, but scores
# short action sequences via CEM/MPPI instead of a one-step control lattice.

predictive_model_id: predictive_proxy_selected_v1
predictive_device: cpu
predictive_max_agents: 16
predictive_horizon_steps: 10
predictive_rollout_dt: 0.2

max_linear_speed: 1.5
max_angular_speed: 1.3
goal_tolerance: 0.25

horizon_steps: 12
rollout_dt: 0.2
sample_count: 128
iterations: 4
elite_fraction: 0.2

init_linear_std: 0.35
init_angular_std: 0.65
min_linear_std: 0.05
min_angular_std: 0.08
hard_ped_clearance: 0.62
hard_obstacle_clearance: 0.30
first_step_ped_clearance: 0.75
first_step_obstacle_clearance: 0.35
invalid_sequence_cost: 1000000.0

goal_progress_weight: 6.0
heading_weight: 0.8
clearance_weight: 3.0
obstacle_weight: 1.6
smoothness_weight: 0.2
ttc_weight: 0.45
occupancy_weight: 0.35
anchor_bias_weight: 0.08

near_distance: 0.7
progress_escape_enabled: true
progress_escape_distance: 1.2
progress_escape_speed: 0.55
progress_escape_heading_gain: 1.5

# Reuse predictive near-field controls from the anchor planner.
predictive_adaptive_horizon_enabled: true
predictive_horizon_boost_steps: 6
predictive_near_field_distance: 2.6
predictive_near_field_speed_cap: 0.65
predictive_candidate_speeds: [0.0, 0.25, 0.5, 0.75, 1.0]
predictive_candidate_heading_deltas: [-0.785398, -0.523599, -0.261799, 0.0, 0.261799, 0.523599, 0.785398]
