name: PR body contracts

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: pr-body-contracts-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-body-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Collect changed files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Routed through a shared retrying collector (issue #5918): a transient
          # GitHub API 502/503/504/429 (which arrives as an HTML body that gh can't
          # JSON-parse) is retried with backoff instead of red-ing this job before
          # body validation runs. A persistent failure still fails closed.
          uv run python scripts/ci/collect_pr_files.py \
            --repo "$REPO" --pr-number "$PR_NUMBER" \
            --out-changed-files "$RUNNER_TEMP/pr_changed_files.txt"

      - name: Validate PR body contracts (advisory)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Advisory: contract violations surface as ::warning:: annotations but do not block the PR.
          # Re-promote to blocking by removing --advisory once the body conventions are settled.
          uv run python scripts/dev/check_pr_followups.py \
            --github-event-path "$GITHUB_EVENT_PATH" \
            --changed-files-file "$RUNNER_TEMP/pr_changed_files.txt" \
            --require-body \
            --require-substantive-body \
            --require-open-issues \
            --advisory
