name: holonomic_upstream_wrappers_probe
paper_facing: false
scenario_matrix: configs/scenarios/planner_sanity_matrix_v1.yaml

workers: 1
horizon: 150
stop_on_failure: true
resume: true
record_forces: false
bootstrap_samples: 100
bootstrap_confidence: 0.95
bootstrap_seed: 123

kinematics_matrix:
  - holonomic
holonomic_command_mode: vx_vy

planners:
  - key: social_navigation_pyenvs_orca
    algo: social_navigation_pyenvs_orca
    planner_group: experimental
    benchmark_profile: experimental
    socnav_missing_prereq_policy: fail-fast
    algo_config: configs/algos/social_navigation_pyenvs_orca_probe.yaml

  - key: social_navigation_pyenvs_sfm_helbing
    algo: social_navigation_pyenvs_sfm_helbing
    planner_group: experimental
    benchmark_profile: experimental
    socnav_missing_prereq_policy: fail-fast
    algo_config: configs/algos/social_navigation_pyenvs_sfm_helbing_probe.yaml
