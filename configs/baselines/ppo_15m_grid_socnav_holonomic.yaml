# PPO baseline config for the strict holonomic camera-ready profile.
#
# This keeps the promoted BR-06 v3 PPO policy as the runtime model through the
# model registry, but disables goal-seeking fallback so benchmark runs fail
# closed when the policy or model contract is not available.

model_id: ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200

# Device selection for SB3
device: auto
# Use deterministic=True for evaluation/benchmarking
deterministic: true

# Observation handling
obs_mode: dict

# Action formatting
action_space: unicycle
v_max: 2.0
omega_max: 1.0

# Benchmark mode must fail closed rather than masking missing policy behavior
# with a goal-seeking fallback.
fallback_to_goal: false
