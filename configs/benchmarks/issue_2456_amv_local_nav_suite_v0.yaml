name: issue_2456_amv_local_nav_suite_v0
contract_kind: benchmark-proposal
issue: 2456
evidence_tier: proposal
benchmark_evidence: false
status: proposed

suite_id: amv_local_nav_suite_v0
suite_version: "0"
claim_boundary: >
  This file defines the proposed evaluation dimensions, required metrics, and evidence-boundary
  classification for an AMV Local Navigation Evaluation Suite. It is a structural proposal only. It
  does not provide hardware-calibrated validity, real AMV data collection, simulator port evidence,
  benchmark-success claims, or paper-facing actuation-realism results. No dimension in this suite
  has been validated against real AMV hardware. All dimensions are classified as synthetic,
  platform-class proxy, or hardware-calibrated blocked.

purpose: >
  Define a structured evaluation suite for autonomous mobile vehicle (AMV) local navigation that
  covers actuation feasibility, braking, yaw, smoothness, latency, low-speed stability, narrow
  corridor progress, and sidewalk/crossing scenario classes. The suite is designed to surface
  planner limitations that are masked by holonomic or pedestrian-only benchmarks.

related_issues:
  - issue: 1559
    role: evidence_boundary
    surface: AMV evidence/claim boundary gate
    status: unresolved
    claim: >
      This suite links #1559 as the gate for calibrated AMV actuation claims. It does not resolve
      or bypass that gate.
  - issue: 1585
    role: calibration_gate
    surface: AMV calibration source acceptance
    status: unresolved
    claim: >
      This suite links #1585 as the pending calibration-source gate. It does not claim acceptance
      or readiness of any calibration source.
  - issue: 2000
    role: trace_acquisition
    surface: real command-response trace acquisition
    status: unresolved
    claim: >
      This suite links #2000 as the pending real command-response trace acquisition issue. It does
      not claim that real traces exist or are available.
  - issue: 2001
    role: proxy_source
    surface: AMV actuation proxy source analysis
    status: resolved_proxy_only
    claim: >
      This suite links #2001 as the accepted platform-class proxy source for longitudinal
      acceleration and deceleration only. Proxy coverage does not extend to yaw rate, angular
      acceleration, latency, update rate, or command-response dynamics.

evaluation_dimensions:
  actuation_feasibility:
    description: >
      Measures whether commands generated by a planner are executable within the AMV actuation
      envelope (acceleration, deceleration, yaw rate limits).
    evidence_boundary: synthetic
    required_metrics:
      - name: command_clip_fraction
        description: Fraction of steps where commanded acceleration exceeds the actuation envelope.
        status: existing
        source: issue_1556 actuation stress config
      - name: infeasible_rate
        description: Fraction of steps where no valid command exists within the envelope.
        status: existing
        source: map_runner kinematics feasibility metadata
      - name: projection_rate
        description: Fraction of steps where the command is projected onto the feasible set.
        status: existing
        source: map_runner kinematics feasibility metadata

  braking_margin:
    description: >
      Evaluates braking deceleration peaks, signed braking margin, and braking jerk relative to
      the AMV braking envelope.
    evidence_boundary: proxy
    required_metrics:
      - name: signed_braking_peak_m_s2
        description: Peak braking deceleration observed during the episode.
        status: existing
        source: issue_1556 actuation stress config
      - name: braking_margin_ratio
        description: Ratio between observed braking peak and the AMV deceleration envelope.
        status: proposed
        source: new metric
      - name: braking_jerk
        description: Rate of change of braking deceleration.
        status: proposed
        source: new metric
    proxy_caveat: >
      Longitudinal proxy from #2001 supports deceleration limits but does not validate braking
      jerk or transient braking dynamics against real AMV hardware.

  yaw_rate_saturation:
    description: >
      Assesses how often the planner commands yaw rates at or beyond the AMV yaw-rate saturation
      boundary and how the system responds under sustained turning.
    evidence_boundary: synthetic
    required_metrics:
      - name: yaw_rate_saturation_fraction
        description: Fraction of steps where commanded yaw rate exceeds the yaw rate limit.
        status: existing
        source: issue_1556 actuation stress config
      - name: angular_velocity_exceedance_rate
        description: Rate of angular acceleration exceedance beyond the angular acceleration limit.
        status: proposed
        source: new metric
      - name: turning_radius_violation
        description: Fraction of steps where the effective turning radius falls below the minimum.
        status: proposed
        source: new metric
    synthetic_caveat: >
      Yaw rate and angular acceleration values are synthetic stress factors. No proxy or hardware
      calibration supports these values. See #2001 for the proxy limitation.

  command_smoothness:
    description: >
      Quantifies the smoothness of the command stream through jerk, acceleration discontinuity,
      and command-difference norms.
    evidence_boundary: synthetic
    required_metrics:
      - name: normalized_jerk
        description: Normalized jerk magnitude averaged over the episode.
        status: proposed
        source: new metric
      - name: command_difference_norm
        description: Average norm of consecutive command differences.
        status: proposed
        source: new metric
      - name: acceleration_discontinuity_rate
        description: Fraction of steps where acceleration changes direction or magnitude abruptly.
        status: proposed
        source: new metric
    synthetic_caveat: >
      Smoothness metrics use synthetic command streams. Real AMV controller smoothing and
      actuator response may differ materially from simulated command traces.

  latency_sensitivity:
    description: >
      Measures the degradation of planner performance under increasing observation and action
      latency typical of real AMV sensor-actuator pipelines.
    evidence_boundary: synthetic
    required_metrics:
      - name: latency_step_response_degradation
        description: Change in success rate per additional latency step.
        status: proposed
        source: new metric derived from a latency sensitivity sweep
      - name: success_rate_drop_per_delay_step
        description: Absolute drop in success rate per step of added delay.
        status: proposed
        source: new metric derived from a latency sensitivity sweep
      - name: collision_rate_increase_per_delay_step
        description: Absolute increase in collision rate per step of added delay.
        status: proposed
        source: new metric derived from issue_2011 sweep
    synthetic_caveat: >
      Latency profiles are synthetic step-delay modes. Real AMV sensor latency, processing jitter,
      and actuation lag are not captured by one-step or two-step delay models.

  low_speed_stability:
    description: >
      Evaluates whether planners maintain stable, oscillation-free behavior at low speeds typical
      of AMV sidewalk operation (0.3--1.5 m/s).
    evidence_boundary: proxy
    required_metrics:
      - name: minimum_forward_speed_violation
        description: Fraction of steps where forward speed drops below a minimum threshold.
        status: proposed
        source: new metric
      - name: oscillation_amplitude_at_low_speed
        description: Amplitude of lateral oscillation during low-speed segments.
        status: proposed
        source: new metric
      - name: stop_and_go_cycle_count
        description: Number of stop-and-go cycles detected during the episode.
        status: proposed
        source: new metric
    proxy_caveat: >
      Low-speed stability uses the walking-speed regime from the AMV profile. Real sidewalk
      surface compliance, wheel slip, and actuator deadbands are not modeled.

  narrow_corridor_progress:
    description: >
      Assesses progress efficiency and clearance margin in narrow corridor scenarios relevant to
      sidewalk and indoor AMV operation.
    evidence_boundary: synthetic
    required_metrics:
      - name: corridor_clearance_margin
        description: Minimum distance to corridor walls or boundaries.
        status: proposed
        source: new metric
      - name: progress_per_step_in_corridor
        description: Average progress toward goal per step while inside the corridor.
        status: proposed
        source: new metric
      - name: corridor_exit_time
        description: Time steps required to exit the narrow corridor segment.
        status: proposed
        source: new metric
    synthetic_caveat: >
      Corridor geometry and clearance margins are simulated. Real AMV corridor navigation depends
      on localization accuracy, controller tracking error, and surface conditions not modeled here.

  sidewalk_crossing:
    description: >
      Scenario-class dimension covering sidewalk navigation and crosswalk/pedestrian crossing
      interactions. Includes both sidewalk-following and crossing-yield behaviors.
    evidence_boundary: proxy
    required_metrics:
      - name: sidewalk_success_rate
        description: Success rate on sidewalk-class scenarios.
        status: proposed
        source: new metric scoped to sidewalk-class scenario rows
      - name: crosswalk_yield_compliance
        description: Fraction of crossing events where the AMV yields to pedestrians.
        status: proposed
        source: new metric
      - name: pedestrian_interaction_force_sidewalk
        description: Average pedestrian interaction force in sidewalk scenarios.
        status: proposed
        source: new metric scoped to sidewalk-class scenario rows
    proxy_caveat: >
      Sidewalk and crossing scenario classes are proxy environments using simulated pedestrians.
      Real sidewalk rules, crosswalk signals, curb negotiation, and ADA compliance are not
      modeled.

evidence_boundary_classification:
  synthetic:
    description: >
      Dimensions whose values are purely software-defined stress factors with no external
      calibration link. These dimensions are useful for sensitivity analysis but do not support
      any AMV hardware truth claim.
    dimensions:
      - actuation_feasibility
      - yaw_rate_saturation
      - command_smoothness
      - latency_sensitivity
      - narrow_corridor_progress
  proxy:
    description: >
      Dimensions whose values may reference platform-class proxy sources (e.g., e-scooter
      longitudinal data) but have not been calibrated against real AMV hardware. Proxy-backed
      fields must name the source, supported fields, and caveats.
    dimensions:
      - braking_margin
      - low_speed_stability
      - sidewalk_crossing
  hardware_calibrated:
    description: >
      No dimension in this suite has hardware-calibrated evidence. All dimensions are classified
      as synthetic or proxy. Hardware-calibrated evidence requires resolution of #1585
      (calibration-source gate) and #2000 (real command-response trace acquisition) before any
      dimension can be promoted.
    status: blocked
    gate_issues:
      - 1585
      - 2000
    dimensions: []
    block_reason: >
      Hardware-calibrated AMV actuation evidence is blocked pending acceptance of a calibration
      source via #1585 and availability of real command-response traces via #2000. No suite
      dimension may claim hardware-calibrated validity until both gates resolve positively and
      the specific dimension's fields are backed by the accepted source.

scenario_classes:
  sidewalk:
    description: >
      Scenarios on sidewalk-adjacent topologies with pedestrian interactions, narrow clearances,
      and low-speed operation.
    covered_dimensions:
      - low_speed_stability
      - narrow_corridor_progress
      - sidewalk_crossing
  crossing:
    description: >
      Scenarios involving crosswalk, intersection, or shared-space pedestrian crossing events
      with yield negotiation.
    covered_dimensions:
      - sidewalk_crossing
      - actuation_feasibility
      - braking_margin

fallback_policy:
  fallback_is_success: false
  degraded_is_success: false
  rule: >
    Any row that cannot execute within the named dimension's evidence boundaries must be marked
    not_available or failed. Fallback or degraded execution is not suite-strengthening evidence
    and must not be reported as successful evaluation.

stop_rule:
  initial_structure: >
    This proposal defines the suite structure, dimensions, metrics, and evidence boundaries. It is
    not executable. The next step is to implement the proposed metrics and produce smoke-path
    evidence for at least one dimension per evidence-boundary class.
  promote: >
    Promote an individual dimension to executable evaluation only after its required metrics are
    implemented, a smoke config exists, and at least one planner row runs without fallback or
    degraded status. Do not claim suite-level validity from a single promoted dimension.
  stop_or_revise: >
    Stop if the evidence-boundary classification for any dimension is found to be incorrect or
    if hardware-calibrated evidence becomes available for a dimension currently classified as
    synthetic or proxy. Revise the classification and gate issues accordingly.

first_executable_follow_up:
  issue: 2456
  recommended_issue_title: "benchmark: add executable smoke for AMV local nav suite dimension"
  minimum_proof: >
    Implement the proposed metrics for at least one dimension, produce a smoke config that
    exercises that dimension, and confirm that at least one native planner row emits the required
    metric fields without fallback or degraded status. The smoke must include one synthetic and
    one proxy-classified dimension.
