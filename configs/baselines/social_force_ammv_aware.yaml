# Diagnostic AMMV-aware Social Force planner configuration.
#
# This enables the optional AMMV interaction term for local model probes only.
# It is not benchmark-strength or paper-facing evidence by itself.

mode: "velocity"
v_max: 2.0
omega_max: 1.0
accel_max: 2.0
dt: 0.1

desired_speed: 1.0
tau: 0.5

A: 5.1
B: 0.35
lambda_anisotropy: 2.0
sigma_phi: 90.0
cutoff_radius: 10.0

A_obs: 10.0
B_obs: 0.0
k_body: 0.0
kappa_slide: 0.0

integration: "euler"
clip_force: true
max_force: 100.0
noise_std: 0.0
action_space: "velocity"
safety_clamp: true

speed_scale_to_vmax: true
interaction_weight: 3.0

ammv_aware_enabled: true
ammv_repulsion_amplitude: 3.0
ammv_repulsion_range: 0.5
ammv_speed_factor: 0.3
ammv_diagnostics_enabled: true
