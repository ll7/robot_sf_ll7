schema_version: braking-authority-sensitivity-smoke.v1
issue: 5088
name: issue_5088_braking_authority_sensitivity_smoke
claim_boundary: >-
  targeted-smoke diagnostic evidence only; this comparison does not calibrate braking,
  establish safety, or support paper/dissertation claims
scenario:
  path: configs/scenarios/classic_interactions.yaml
  name: classic_cross_trap_high
seeds: [101, 102, 103]
planner:
  algo: social_force
  benchmark_profile: baseline-safe
run:
  horizon: 100
  dt: 0.1
  workers: 1
  record_forces: false
  record_simulation_step_trace: true
arms:
  - key: weak_braking
    max_linear_decel_m_s2: 0.25
  - key: strong_braking
    max_linear_decel_m_s2: 2.0
signal:
  metrics:
    - near_misses
    - min_clearance
    - time_to_collision_min
  minimum_valid_seeds: 2
  absolute_tolerance: 1.0e-9
