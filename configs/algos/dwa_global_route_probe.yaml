# DWA with global-route integration probe (default-off, diagnostic-only).
# This is experimental/testing-only: it is runnable for controlled evaluation
# but is not paper-facing benchmark evidence.
allow_testing_algorithms: true
max_linear_speed: 1.0
max_angular_speed: 1.2
max_linear_acceleration: 0.8
max_angular_acceleration: 1.5
control_dt: 0.2
prediction_dt: 0.1
prediction_steps: 15
linear_samples: 7
angular_samples: 9
goal_tolerance: 0.25
robot_radius: 0.25
pedestrian_radius: 0.30
safety_margin: 0.10
clearance_distance: 2.0
obstacle_threshold: 0.5
obstacle_search_cells: 12
heading_weight: 0.8
clearance_weight: 1.2
velocity_weight: 0.25
progress_weight: 1.0
prediction_scoring_enabled: false
# Global-route integration probe: biases DWA toward next global-route waypoint.
# Default-off, fail-closed. Diagnostic-only probe for issue #5331.
global_route_probe_enabled: true
global_route_probe_waypoint_distance: 2.0
global_route_probe_heading_weight: 0.5
