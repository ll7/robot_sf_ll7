<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Station hall with stair and elevator cores -->
<svg
  width="84"
  height="28"
  viewBox="0 0 84 28"
  version="1.1"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape">
  <rect id="canvas_bg" x="0" y="0" width="84" height="28" fill="#0f141c" />
  <rect id="hall_bg" x="1" y="1" width="82" height="26" fill="#171717" stroke="#000000" stroke-width="0.4" />

  <g inkscape:label="obstacles">
    <rect x="0" y="0" width="84" height="1" fill="#000000" inkscape:label="obstacle" />
    <rect x="0" y="27" width="84" height="1" fill="#000000" inkscape:label="obstacle" />
    <rect x="0" y="0" width="1" height="28" fill="#000000" inkscape:label="obstacle" />
    <rect x="83" y="0" width="1" height="28" fill="#000000" inkscape:label="obstacle" />

    <!-- Left stair core -->
    <rect x="15" y="8" width="15" height="8" fill="#000000" inkscape:label="obstacle" />
    <!-- Elevator core -->
    <rect x="40" y="8" width="10" height="9" fill="#000000" inkscape:label="obstacle" />
    <!-- Right stair core -->
    <rect x="58" y="7" width="16" height="10" fill="#000000" inkscape:label="obstacle" />
  </g>

  <g inkscape:label="robot">
    <rect x="2" y="3" width="4" height="3" fill="#ffdf00" inkscape:label="robot_spawn_zone_0" />
    <rect x="77" y="21" width="4" height="3" fill="#ff6c00" inkscape:label="robot_goal_zone_0" />
    <path
      d="M 6 4.5 L 20 4.5 L 34 4.5 L 42 4.5 L 46 5.5 L 48 8.0 L 47 11.0 L 44 13.5 L 41 16.5 L 39 20.0 L 38 22.5 L 55 22.5 L 68 22.5 L 77 22.5"
      stroke="#0300d5"
      stroke-width="0.4"
      fill="none"
      inkscape:label="robot_route_0_0" />
  </g>

  <g inkscape:label="pedestrians">
    <rect x="2" y="3" width="4" height="3" fill="#23ff00" inkscape:label="ped_spawn_zone_0" />
    <rect x="78" y="3" width="4" height="3" fill="#107400" inkscape:label="ped_goal_zone_0" />

    <rect x="78" y="20" width="4" height="3" fill="#23ff00" inkscape:label="ped_spawn_zone_1" />
    <rect x="2" y="20" width="4" height="3" fill="#107400" inkscape:label="ped_goal_zone_1" />

    <path
      d="M 6 4.5 L 18 4.5 L 30 4.5 L 42 4.5 L 54 4.5 L 66 4.5 L 78 4.5"
      stroke="#c40202"
      stroke-width="0.4"
      fill="none"
      inkscape:label="ped_route_0_0" />
    <path
      d="M 78 22.0 L 66 22.0 L 54 22.0 L 42 22.0 L 30 22.0 L 18 22.0 L 6 22.0"
      stroke="#c40202"
      stroke-width="0.4"
      fill="none"
      inkscape:label="ped_route_1_1" />
  </g>

  <g inkscape:label="single_pedestrians">
    <circle cx="9" cy="22.0" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p1_start" />
    <circle cx="76" cy="22.0" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p1_goal" />

    <circle cx="12" cy="4.8" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p2_start" />
    <circle cx="74" cy="4.8" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p2_goal" />

    <circle cx="76" cy="4.2" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p3_start" />
    <circle cx="9" cy="4.2" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p3_goal" />

    <circle cx="72" cy="22.0" r="0.45" fill="#7fa7ff" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p4_start" />
    <circle cx="12" cy="22.0" r="0.45" fill="none" stroke="#3a5edb" stroke-width="0.2" inkscape:label="single_ped_p4_goal" />
  </g>
</svg>
