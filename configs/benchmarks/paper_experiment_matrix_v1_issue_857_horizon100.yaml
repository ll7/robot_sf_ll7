# Issue-857 Phase C benchmark: PPO horizon-matched candidate vs reference baselines.
#
# Provenance:
# - PPO row swapped to the issue-857 horizon-matched candidate
#   (configs/baselines/ppo_issue_791_horizon100_12178.yaml, job 12178).
# - All other rows, scenario matrix, seed policy, SNQI weights, and bootstrap
#   protocol mirror configs/benchmarks/paper_experiment_matrix_v1_issue_791_eval_aligned_compare.yaml
#   exactly so the comparison against the Wave-5 leader row is apples-to-apples.
# - Phase D promotion gate (issue #857): success_mean ≥ 0.50 AND
#   max_steps_share ≤ 0.30 on this matrix unlocks seed replicas at 231 / 1337.
#
# CAVEAT: this benchmark inherits the in-distribution caveat from the eval
# superset (see ppo_full_maintained_eval_v1.yaml). It does not measure OOD
# generalization. The horizon-matched policy was trained at horizon 100 to
# match this benchmark's horizon: 100, which is the experimental variable
# under test.

name: paper_experiment_matrix_v1
paper_facing: true
paper_profile_version: paper-matrix-v1
scenario_matrix: configs/scenarios/classic_interactions_francis2023.yaml
comparability_mapping: configs/benchmarks/alyassi_comparability_map_v1.yaml

amv_profile:
  name: amv-paper-v1
  contract_version: "1"
  coverage_enforcement: warn
  required_dimensions:
    use_case: [delivery_robot, shared_space_micromobility]
    context: [sidewalk, shared_space]
    speed_regime: [walking_speed, scooter_speed]
    maneuver_type: [overtake, crossing, bottleneck]

seed_policy:
  mode: seed-set
  seed_set: eval
  seed_sets_path: configs/benchmarks/seed_sets_v1.yaml

snqi_weights: configs/benchmarks/snqi_weights_camera_ready_v3.json
snqi_baseline: configs/benchmarks/snqi_baseline_camera_ready_v3.json
snqi_contract:
  enabled: true
  enforcement: warn
  rank_alignment_warn_threshold: 0.5
  rank_alignment_fail_threshold: 0.3
  outcome_separation_warn_threshold: 0.05
  outcome_separation_fail_threshold: 0.0
  max_component_dominance_warn_threshold: 0.24
  max_component_dominance_fail_threshold: 0.27
  calibration_seed: 123
  calibration_trials: 6000

workers: 2
horizon: 100
dt: 0.1
record_forces: true
resume: true
stop_on_failure: false
bootstrap_samples: 300
bootstrap_confidence: 0.95
bootstrap_seed: 123

kinematics_matrix:
  - differential_drive

export_publication_bundle: true
include_videos_in_publication: false
overwrite_publication_bundle: true
repository_url: https://github.com/ll7/robot_sf_ll7
release_tag: "{release_tag}"
doi: 10.5281/zenodo.<record-id>
paper_interpretation_profile: baseline-ready-core

planners:
  - key: prediction_planner
    algo: prediction_planner
    planner_group: experimental
    algo_config: configs/algos/prediction_planner_camera_ready.yaml
    benchmark_profile: experimental

  - key: goal
    algo: goal
    planner_group: core
    benchmark_profile: baseline-safe

  - key: social_force
    algo: social_force
    planner_group: core
    benchmark_profile: baseline-safe

  - key: orca
    algo: orca
    planner_group: core
    benchmark_profile: baseline-safe
    socnav_missing_prereq_policy: fallback

  # Phase C swap: the PPO row points at the issue-857 horizon-matched candidate
  # (job 12178). The Wave-5 leader retains its own canonical config and is the
  # comparison reference, but is not in this matrix; the goal of this run is to
  # produce a single PPO row to score against the leader's existing camera-ready
  # row.
  - key: ppo
    algo: ppo
    planner_group: experimental
    algo_config: configs/baselines/ppo_issue_791_horizon100_12178.yaml
    benchmark_profile: experimental
    adapter_impact_eval: true
    workers: 1

  - key: socnav_sampling
    algo: socnav_sampling
    planner_group: experimental
    benchmark_profile: experimental
    socnav_missing_prereq_policy: fail-fast

  - key: sacadrl
    algo: sacadrl
    planner_group: experimental
    benchmark_profile: experimental
    socnav_missing_prereq_policy: fallback
