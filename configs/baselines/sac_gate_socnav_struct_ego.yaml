# Experimental SAC baseline config for the ego-frame SAC observation ablation.
#
# Keeps the repo `socnav_struct` producer contract unchanged and applies the
# ego-frame transform only inside the SAC benchmark adapter.
#
# Artifact status (issue #1960, 2026-06-01): the referenced local checkpoint is
# missing here and has no durable registry/release entry. Treat this config as
# retire-pending and not benchmark evidence until issue #1764 recovers a
# checksummed durable artifact or retires/rewrites the config.

model_id: retired_sac_gate_socnav_struct_ego_local_only

device: auto
deterministic: true

obs_mode: dict
action_space: unicycle
v_max: 2.0
omega_max: 1.0
obs_transform: ego

fallback_to_goal: false
profile: experimental
