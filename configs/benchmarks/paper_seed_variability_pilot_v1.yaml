name: paper_seed_variability_pilot_v1
paper_facing: true
paper_profile_version: paper-seed-variability-v1
scenario_matrix: configs/scenarios/sets/paper_seed_variability_pilot_v1.yaml
comparability_mapping: configs/benchmarks/alyassi_comparability_map_v1.yaml

seed_policy:
  mode: fixed-list
  seeds: [111, 112, 113, 114, 115, 116, 117, 118]

workers: 2
horizon: 100
dt: 0.1
record_forces: true
resume: true
stop_on_failure: true
bootstrap_samples: 1000
bootstrap_confidence: 0.95
bootstrap_seed: 123

kinematics_matrix:
  - differential_drive

export_publication_bundle: false
include_videos_in_publication: false
overwrite_publication_bundle: false
repository_url: https://github.com/ll7/robot_sf_ll7
release_tag: "{release_tag}"
doi: 10.5281/zenodo.<record-id>
paper_interpretation_profile: baseline-ready-core

planners:
  - key: orca
    algo: orca
    planner_group: core
    benchmark_profile: baseline-safe
    socnav_missing_prereq_policy: fail-fast

  - key: ppo
    algo: ppo
    planner_group: experimental
    algo_config: configs/baselines/ppo_15m_grid_socnav.yaml
    benchmark_profile: experimental
    adapter_impact_eval: true
