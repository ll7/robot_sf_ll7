name: paper_cross_kinematics_v1
paper_facing: true
paper_profile_version: paper-cross-kinematics-v1
scenario_matrix: configs/scenarios/sets/paper_cross_kinematics_v1.yaml
comparability_mapping: configs/benchmarks/alyassi_comparability_map_v1.yaml
compatibility_manifest: configs/benchmarks/paper_cross_kinematics_v1_compatibility.yaml

seed_policy:
  mode: fixed-list
  seeds: [111]

snqi_weights: configs/benchmarks/snqi_weights_camera_ready_v3.json
snqi_baseline: configs/benchmarks/snqi_baseline_camera_ready_v3.json
snqi_contract:
  enabled: true
  enforcement: warn
  rank_alignment_warn_threshold: 0.5
  rank_alignment_fail_threshold: 0.3
  outcome_separation_warn_threshold: 0.05
  outcome_separation_fail_threshold: 0.0
  max_component_dominance_warn_threshold: 0.24
  max_component_dominance_fail_threshold: 0.27
  calibration_seed: 123
  calibration_trials: 1000

workers: 1
horizon: 80
dt: 0.1
record_forces: true
resume: true
stop_on_failure: false
bootstrap_samples: 100
bootstrap_confidence: 0.95
bootstrap_seed: 123

kinematics_matrix:
  - differential_drive
  - bicycle_drive
  - holonomic
holonomic_command_mode: vx_vy

export_publication_bundle: false
include_videos_in_publication: false
overwrite_publication_bundle: false
repository_url: https://github.com/ll7/robot_sf_ll7
release_tag: "{release_tag}"
doi: 10.5281/zenodo.<record-id>
paper_interpretation_profile: cross-kinematics-parity-smoke

planners:
  - key: goal
    algo: goal
    planner_group: core
    benchmark_profile: baseline-safe

  - key: social_force
    algo: social_force
    planner_group: core
    benchmark_profile: baseline-safe

  - key: orca
    algo: orca
    planner_group: core
    benchmark_profile: baseline-safe
    socnav_missing_prereq_policy: fail-fast
