name: Nightly Performance

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1"
      SDL_VIDEODRIVER: dummy
      MPLBACKEND: Agg
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.5.11"

      - name: Cache uv sync package payloads
        id: cache-uv
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ${{ runner.temp }}/setup-uv-cache/archive-v0
            ${{ runner.temp }}/setup-uv-cache/wheels-v6
          key: uv-sync-payloads-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Report uv cache restore state
        run: |
          echo "cache-hit=${{ steps.cache-uv.outputs.cache-hit }}"
          echo "cache-matched-key=${{ steps.cache-uv.outputs.cache-matched-key }}"
          bash scripts/dev/ci_uv_sync_diag.sh "uv-cache-pre-sync"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: System packages for headless
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libglib2.0-0 libgl1

      - name: Sync dependencies (locked)
        env:
          CI_STEP_TIMEOUT_SECONDS: "1200"
        run: bash scripts/dev/ci_step_timer.sh "Sync dependencies (locked)" uv sync --all-extras --frozen

      - name: Report uv cache state after sync
        if: always()
        run: bash scripts/dev/ci_uv_sync_diag.sh "uv-cache-post-sync"

      - name: Run xdist race validation
        env:
          XDIST_RACE_WORKERS: "32"
          XDIST_RACE_TIMEOUT_SECONDS: "7200"
          PYTEST_XDIST_DIST: worksteal
        run: scripts/dev/run_xdist_race_validation.sh

      - name: Upload xdist race validation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xdist-race-validation
          path: output/validation/xdist-race/
          if-no-files-found: warn

      - name: Restore trend history cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: output/benchmarks/perf/trend/history
          key: perf-trend-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            perf-trend-history-${{ github.ref_name }}-
            perf-trend-history-main-

      - name: Run nightly trend benchmark matrix
        id: nightly_trend
        run: |
          mkdir -p output/benchmarks/perf/trend/history
          uv run python -m robot_sf.benchmark.perf_trend \
            --matrix configs/benchmarks/perf_trend_matrix_classic_v1.yaml \
            --seed 101 \
            --history-glob 'output/benchmarks/perf/trend/history/*.json' \
            --history-limit 14 \
            --output-json output/benchmarks/perf/trend/latest.json \
            --output-markdown output/benchmarks/perf/trend/latest.md \
            --fail-on-regression \
            --fail-on-history-regression

      - name: Store latest report in trend history cache path
        if: always()
        run: |
          mkdir -p output/benchmarks/perf/trend/history
          if [ -f output/benchmarks/perf/trend/latest.json ]; then
            cp output/benchmarks/perf/trend/latest.json "output/benchmarks/perf/trend/history/${{ github.run_id }}.json"
          fi

      - name: Upload nightly perf artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-perf-artifacts
          path: output/benchmarks/perf/
          if-no-files-found: ignore
