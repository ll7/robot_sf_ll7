# configs/research/issue_4142_dpcbf_dense_comparison_v1.yaml`.
schema_version: robot_sf.issue_4142_dpcbf_dense_comparison.v1
scenario_manifest: configs/scenarios/sets/issue_4142_dense_dynamic_cbf_v1.yaml
algorithm: prediction_mpc_cv
algorithm_configs:
  cbf_off: configs/algos/prediction_mpc_cv.yaml
  cbf_collision_cone_on: configs/algos/prediction_mpc_cv_cbf_collision_cone.yaml
  cbf_dynamic_parabolic_v1_on: configs/algos/prediction_mpc_cv_cbf_dynamic_parabolic_v1.yaml
runtime_cbf_arms:
