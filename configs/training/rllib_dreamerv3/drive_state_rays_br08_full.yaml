# BR-08 full DreamerV3 RLlib profile under benchmark-reset-v2 semantics.
# Use this for longer remote training runs after the gate profile passes.
experiment:
  run_id: dreamerv3_br08_drive_state_rays_full
  output_root: output/dreamerv3
  train_iterations: 6000
  checkpoint_every: 100
  seed: 123
  log_level: WARNING

ray:
  address: null
  local_mode: false
  include_dashboard: false
  num_cpus: auto
  num_gpus: auto
  disable_uv_run_runtime_env: true
  runtime_env:
    working_dir: .
    excludes:
      - ".git"
      - ".venv"
      - ".pytest_cache"
      - ".ruff_cache"
      - "__pycache__"
      - "output"
      - "results"
      - "dist"
      - "robot_sf.egg-info"
      - "*.mp4"
      - "*.gif"

tracking:
  wandb:
    enabled: true
    project: robot_sf_dreamerv3
    group: br08-drive-state-rays-full
    job_type: train
    mode: online
    tags: [dreamerv3, rllib, br08, benchmark-reset-v2, full, drive_state_rays]
    dir: output/wandb

env:
  flatten_observation: true
  flatten_keys: [drive_state, rays]
  normalize_actions: true
  factory_kwargs:
    debug: false
    recording_enabled: false
    reward_name: route_completion_v3
    reward_kwargs:
      weights:
        progress: 1.1
        living: -0.015
        collision: -15.0
        near_miss: -3.0
        ttc_risk: -2.8
        comfort: -0.5
        smoothness: -0.18
        timeout: -6.5
        stagnation: -2.0
        terminal_bonus: 20.0
  config:
    use_image_obs: false
    include_grid_in_observation: false
    randomize_seeds: true

algorithm:
  framework: torch
  env_runners:
    num_env_runners: auto
    num_envs_per_env_runner: 1
    rollout_fragment_length: 32
  resources:
    num_gpus: auto
  learners:
    num_learners: 0
  training:
    model_size: S
    training_ratio: 128
    batch_size_B: 32
    batch_length_T: 64
    horizon_H: 15
    world_model_lr: 0.0001
    actor_lr: 0.00003
    critic_lr: 0.00003
