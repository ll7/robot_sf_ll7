name: Temporary Ruff diagnostics

on:
  push:
    branches:
      - orchestrator/ll7-lease-5308-7ece80aae4e1
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Capture canonical lint subcommands
        shell: bash
        run: |
          set +e
          mkdir -p output/ruff-diagnostics

          uv run ruff check . > output/ruff-diagnostics/ruff-check.txt 2>&1
          check_status=$?
          uv run ruff format --check . > output/ruff-diagnostics/ruff-format.txt 2>&1
          format_status=$?
          uv run python scripts/validation/check_broad_exceptions.py \
            > output/ruff-diagnostics/broad-exceptions.txt 2>&1
          broad_status=$?
          uv run python scripts/dev/check_version_alignment.py --advisory \
            > output/ruff-diagnostics/version-alignment.txt 2>&1
          version_status=$?

          printf 'ruff_check=%s\nruff_format=%s\nbroad_exceptions=%s\nversion_alignment=%s\n' \
            "$check_status" "$format_status" "$broad_status" "$version_status" \
            > output/ruff-diagnostics/status.txt

          cat output/ruff-diagnostics/status.txt
          for report in output/ruff-diagnostics/*.txt; do
            printf '\n===== %s =====\n' "$report"
            cat "$report"
          done

          # The artifact, not this temporary workflow, carries the diagnostic result.
          exit 0

      - name: Upload lint diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-diagnostics
          path: output/ruff-diagnostics/
          if-no-files-found: error
