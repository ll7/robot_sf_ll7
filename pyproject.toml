[project]
name = "robot_sf"
# Version is derived automatically from the git tag by hatch-vcs (see
# [tool.hatch.version] below). Do NOT hardcode a version here: the git
# tag/release line is the single source of truth. External evidence
# provenance pins resolve by these tags, so the tag line must never be
# renumbered. scripts/dev/check_version_alignment.py guards against drift.
dynamic = ["version"]
description = """
This package allows implementing a "gymnasium-style" environment
for navigating a crowd with autonomous micromobility vehicles
"""
authors = [
    {name = "Marco Tröster", email = "marco.troester.student@uni-augsburg.de"}
]
license = "GPL-3.0-only"
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Typing :: Typed",
]
dependencies = [
    # Core dependencies
    "numpy>=2.4.6",
    "gymnasium>=0.29,<1.2",
    "numba>=0.66.0",
    "pygame>=2.6.1",
    # Data processing
    "pandas>=3.0.3",
    "scipy>=1.17.1",
    "matplotlib>=3.11.0",
    "pillow>=10.4.0",
    "svgelements>=1.9.6",
    # Utilities
    "loguru>=0.7.2",
    "rich>=15.0.0",
    "psutil>=6.1.0",
    "moviepy>=2.0.0",
    "jsonschema>=4.23.0",
    "shapely>=2.1.2",
    "networkx>=3.6.1,<4.0",
    "pyvisgraph>=0.2.1",
    "python-motion-planning>=2.0.1,<3",
    # OSM map extraction (Issue #392)
    "osmnx>=2.1.0",
    "geopandas>=1.1.4",
    "pyproj>=3.6",
    "pyyaml>=6.0",
    "orjson>=3.11.5",
]

[project.optional-dependencies]
gpu = [
    "torch[cuda]>=2.5.1",
]
training = [
    "stable-baselines3>=2.9.0",
    "torch>=2.8.0,<2.13.0",
    "scikit-learn>=1.9.0",
    "optuna>=4.9.0",
    "tensorboard>=2.21.0",
    "wandb>=0.28.0",
    "optuna-dashboard>=0.20.0",
]
recurrent = [
    "sb3-contrib>=2.9.0,<2.10.0",
]
rllib = [
    "ray[rllib]>=2.53.0",
]
progress = [
    "tqdm>=4.68.4",
]
analysis = [
    "seaborn>=0.13.2",
]
analytics = [
    "duckdb>=1.5.4",
    "pyarrow>=25.0.0",
]
viz = [
    "seaborn>=0.13.2",
]
browser = [
    "playwright>=1.61.0",
]
sacadrl = [
    "tensorflow>=2.15.0",
]
orca = [
    # Use MIT-ACL fork for ORCA: it adds a collabCoeff extension to model cooperative/adversarial behavior.
    # See https://github.com/mit-acl/Python-RVO2 for details; upstream is https://github.com/sybrenstuvel/Python-RVO2.
    # The fork is vendored under third_party/python-rvo2 to patch CMake compatibility.
    "pyrvo2",
]
socnav = [
    # Pinned runtime bridge and mesh dependencies for the vendored SocNavBench subset.
    "opencv-python-headless==5.0.0.93",
    "pyassimp==5.2.5",
    "PyOpenGL==3.1.10",
    "scikit-fmm>=2024.5",
    "scikit-image==0.26.0",
]
criticality = [
    "cma>=3.3.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs>=0.5.0", "Cython>=3.0.0"]
build-backend = "hatchling.build"

# --- Single-source version: git tag -> package version (hatch-vcs) ---------
# The git tag/release line is the canonical version source. Release tags are
# plain "X.Y.Z" (e.g. 0.0.2) and release-candidate tags are "rcX.Y.Z"
# (e.g. rc0.0.3); tag_regex maps both to the numeric X.Y.Z. For non-tag builds
# (sdists, untagged CI checkouts) hatch-vcs derives a PEP 440 dev version and
# falls back to fallback_version so builds never break.
[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
tag_regex = "^(?:[\\w.-]*?)(?P<version>\\d+\\.\\d+\\.\\d+.*)$"
fallback_version = "0.0.3.dev0"

[tool.hatch.build.hooks.vcs]
# Build hook writes the resolved version to an importable module so
# `robot_sf.__version__` works from installed wheels and editable installs.
version-file = "robot_sf/_version.py"

[tool.hatchling.build.targets.wheel]
packages = [
    { include = "robot_sf" },
    { include = "robot_sf_carla_bridge" },
    { include = "examples" },
    { include = "third_party" },
]
include = ["examples/**", "benchmarks/**"]

[tool.hatchling.build.targets.wheel.shared-data]
"robot_sf/maps" = "robot_sf/maps"

[tool.hatch.build.targets.wheel.force-include]
"benchmarks" = "benchmarks"
"fast-pysf/pysocialforce" = "pysocialforce"

[tool.hatchling.build.targets.sdist]
include = [
    "/robot_sf",
    "/robot_sf_carla_bridge",
    "/fast-pysf/pysocialforce",
    "/examples",
    "/benchmarks",
    "/third_party",
    "/README.md",
    "/LICENSE",
]
exclude = [
    "/tests",
    "/tests/pygame",
    "/.git",
    "/.pytest_cache",
    "/__pycache__",
    "/fast-pysf/tests",
    "/fast-pysf/examples",
    "/fast-pysf/benchmarks",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
required-version = "==0.15.12"
# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    "**/*.ipynb",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "third_party",
]

# Same as Black.
line-length = 100
indent-width = 4

# Assume Python 3.12
target-version = "py312"

[tool.ruff.lint]
# https://docs.astral.sh/ruff/preview/#selecting-single-preview-rules
preview = true
explicit-preview-rules = true

select = [
  # you already have:
  "E4","E7","E9","F","W","C901","I001",

  # **Bug catchers & safety**
  "B",      # flake8-bugbear: common footguns (B006/B008/B904 are gold)
  "BLE",    # no bare/overbroad except
  "TRY",    # try/except anti-patterns (tryceratops)
  "A",      # no shadowing of builtins
  "ARG",    # unused args in public APIs
  "S",      # Bandit security checks (safe subset, see per-file ignores)

  # **Modernization & simplification**
  "UP",     # pyupgrade: keep code current
  "C4",     # flake8-comprehensions: cleaner comps/gens
  "ICN",    # canonical import aliases (np, pd, plt, etc.)

  # **Performance & correctness nits**
  "PERF",   # perflint: avoid tiny perf traps (informational)
  "PL",     # selected pylint-derived rules (see ignores below)

  # **Time handling**
  "DTZ",    # timezone-aware datetime usage

  # **Logging / prints / commented code**
  "G",      # logging format string correctness
  "T20",    # discourage print() outside scripts/tests
  "ERA",    # eradicate commented-out code

  # **Style that doesn't fight your formatter**
  "COM",    # trailing commas where helpful
  "ISC",    # implicit string concat gotchas

  # **Housekeeping**
  "RUF",    # Ruff's own rules (e.g., unused `noqa`)
  "PGH",    # blanket noqa / useless noqa hygiene
  "TCH",    # move typing-only imports under TYPE_CHECKING
  "TID",    # tidy imports (relative vs absolute)

  # Docstrings
    "D100",  # Missing docstring in public module
    "D101",  # Missing docstring in public class
    "D102",  # Missing docstring in public method
    "D103",  # Missing docstring in public function
    "D104",  # Missing docstring in public package
    "D105",  # Missing docstring in magic method
    "D106",  # Missing docstring in public nested class
    "D107",  # Missing docstring in __init__
    "D417",  # Missing argument descriptions in the docstring
    "D419",  # Empty docstring
    "DOC102",  # Documented parameter {id} is not in the function's signature
    "DOC201",  # `return` is not documented in docstring
    "DOC202",  # Docstring should not have a returns section because the function doesn't return anything
]

fixable = ["ALL"]
unfixable = []

ignore = [
    # Research/scientific computing patterns that are acceptable
    "PLR0911",  # Too many return statements
    "PLR2004",  # Magic value comparison
    # Explicit Ruff security (Bandit) baseline (issue #3477): instead of suppressing the
    # whole `S` category, list only the codes currently present in the tree, so any *new*
    # category of security finding (e.g. exec/eval, yaml.load, jinja autoescape, request
    # without timeout) is now enforced. The codes below are the ratchet-down backlog;
    # .github/workflows/security-baseline.yml continues to expose full Bandit findings.
    "S101",   # assert (pervasive in tests/research)
    "S105",   # possible hardcoded password string (audit: mostly false positives)
    "S108",   # hardcoded temp-file path
    "S110",   # try-except-pass (also tracked by the broad-exception ratchet)
    "S112",   # try-except-continue
    "S202",   # tarfile unsafe members
    "S301",   # pickle usage (trusted local artifacts)
    "S310",   # url open audit
    "S311",   # non-cryptographic random (research RNG)
    "S314",   # xml ElementTree usage
    "S324",   # insecure hash (non-security fingerprints)
    "S602",   # subprocess Popen with shell=True
    "S603",   # subprocess without shell=True
    "S607",   # start-process with partial path
    "S608",   # hardcoded SQL expression
    "PGH003",   # Use specific rule codes when ignoring instead of categories
    "DTZ005",   # datetime.datetime.now() called without a 'tz' argument
    "ERA001",   # Found commented-out code
    "ARG001",   # Unused function argument
    "ARG005",   # Unused lambda argument
    "PERF401",  # Use a list comprehension to collect items
    "TRY004",   # Prefer `TypeError` exception for invalid type
    "B904",     # Within an `except` clause, raise exceptions with `raise ... from err`
    "PLW2901",  # `for` loop variable `line` overwritten by assignment target
    "TRY301",   # Abstract `raise` to an inner function
    "TRY401",   # Redundant exception object included in `logging.exception` call
    "ICN001",   # `matplotlib.pyplot` should be imported as `plt`
    "N803",     # Argument name should be lowercase
    "A005",     # Module `types` shadows a Python standard-library module
    "A001",     # Variable `id` is shadowing a Python builtin
    "G004",     # Logging statement uses f-string
    "B008",     # Do not perform function call in argument defaults
    "B023",     # Function definition does not bind loop variable
    "ISC003",   # Explicitly concatenated string should be implicitly concatenated
    "UP007",    # Use `X | Y` for type annotations
    "B007",     # Loop control variable not used within loop body
    "PLW0603",  # Using the global statement to update is discouraged
    "ARG002",   # Unused method argument
    "RUF012",   # Mutable class attributes should be annotated with `typing.ClassVar`
    "RUF001",   # String contains ambiguous `‑` (NON-BREAKING HYPHEN)
    "RUF002",   # String contains ambiguous characters (EN DASH, EM DASH)
    "RUF003",
    "TRY300",   # Consider moving this statement to an `else` block
    "TRY003",   # Avoid specifying long messages outside the exception class
    "N806",     # Variable `X` in function should be lowercase (too noisy for math code)
    "B017",     # Do not assert blind exception: `Exception`
    "PLC0206",  # Extracting value from dictionary without calling `.items()`
    "RUF005",   # Consider iterable unpacking instead of concatenation
    "COM812",  # Missing trailing comma in a multi-line collection
    "RUF043",   # while this is harmless to fix, it creates noise for every new assertion
]

[tool.ruff.lint.pylint]
max-args = 8
max-branches = 15
max-statements = 60

