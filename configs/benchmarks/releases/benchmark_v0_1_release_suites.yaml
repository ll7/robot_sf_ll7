  - suite_id: adversarial
    suite_kind: adversarial
    suite_definition: configs/adversarial/issue_1500_adversarial_comparison_manifest.v1.yaml
    scenario_family_ids:
      - crossing_ttc
      - classic_head_on_corridor
    odd_contract: configs/benchmarks/odd_contracts/low_speed_public_space_v1.yaml
    scenario_contract: configs/adversarial/issue_1500_adversarial_comparison_manifest.v1.yaml
    scenario_certification: docs/context/evidence/issue_2910_release_scenario_certification/summary.json
    planner_row_status: docs/context/evidence/issue_1502_adversarial_two_family_2026-05-31/row_status_summary.json
    seed_schedule: configs/benchmarks/seed_sets_v1.yaml
    artifact_manifest: docs/context/evidence/issue_1502_adversarial_two_family_2026-05-31/archive.json

  - suite_id: amv_specific
