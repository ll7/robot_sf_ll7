# Issue #1858 pilot perturbation manifest for parent issue #1610.
#
# This manifest is a validity-preflight input only. It does not execute planners and does not make
# paper-facing claims. Invalid, fallback, degraded, or certification-excluded variants must be
# excluded from success evidence before a later pilot matrix runs.

schema_version: scenario_perturbation_manifest.v1
manifest_id: issue_1858_seed_sensitive_pilot_v1
description: >-
  First bounded perturbation manifest for three scenario-certification-eligible seed-sensitive
  scenarios from docs/context/issue_1608_seed_sensitivity_analysis.md.
scenario_config: ../classic_interactions_francis2023.yaml
seed_controls:
  baseline_seeds: [111, 112, 113, 116]
  replay_seed_policy: explicit
  source: docs/context/evidence/issue_1608_seed_sensitivity_2026-05-30/scenario_seed_sensitivity.csv
validity:
  require_scenario_certification: true
  max_route_offset_m: 0.5
  invalid_variant_evidence_policy: exclude_from_success_evidence
  notes: >-
    The v1 preflight supports no-op baselines and bounded robot route waypoint offsets only.
    Planner execution must consume only variants that remain certification-eligible.
variants:
  - variant_id: classic_group_crossing_high_noop
    scenario_id: classic_group_crossing_high
    family: noop
    seeds: [111, 112, 117, 119]
    rationale: Baseline row for a certification-eligible seed-sensitive scenario from issue #1608.
  - variant_id: classic_group_crossing_high_route_offset_x025
    scenario_id: classic_group_crossing_high
    family: robot_route_offset
    seeds: [111, 112, 117, 119]
    rationale: Small bounded route shift for parent issue #1610 criticality pilot design.
    parameters:
      dx_m: 0.25
      dy_m: 0.0
      max_magnitude_m: 0.5
      waypoint_selector: all
  - variant_id: classic_head_on_corridor_low_noop
    scenario_id: classic_head_on_corridor_low
    family: noop
    seeds: [111, 112, 116, 117]
    rationale: Baseline row for a hard-but-solvable seed-sensitive corridor scenario.
  - variant_id: classic_head_on_corridor_low_route_offset_y025
    scenario_id: classic_head_on_corridor_low
    family: robot_route_offset
    seeds: [111, 112, 116, 117]
    rationale: Small bounded route shift for corridor-interaction sensitivity preflight.
    parameters:
      dx_m: 0.0
      dy_m: 0.25
      max_magnitude_m: 0.5
      waypoint_selector: all
  - variant_id: francis2023_join_group_noop
    scenario_id: francis2023_join_group
    family: noop
    seeds: [112, 113, 115, 116]
    rationale: Baseline row for a Francis social-interaction scenario flagged by issue #1608.
  - variant_id: francis2023_join_group_route_offset_x025
    scenario_id: francis2023_join_group
    family: robot_route_offset
    seeds: [112, 113, 115, 116]
    rationale: Small bounded route shift for join-group mechanism probing after #1609.
    parameters:
      dx_m: 0.25
      dy_m: 0.0
      max_magnitude_m: 0.5
      waypoint_selector: all
pilot_matrix_note:
  parent_issue: "#1610"
  next_step: >-
    After this preflight passes, run a tiny paired planner pilot over the eligible no-op and
    perturbed rows using the same planner/config/seed controls except for variant_id.
  evidence_boundary: >-
    Preflight validity is necessary but not sufficient benchmark evidence; invalid, fallback,
    degraded, missing, or stress-only rows are limitations rather than success evidence.
