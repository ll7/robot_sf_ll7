schema_version: improvement-batch-dependency-ledger.v1
issue: 4984
issue_url: https://github.com/ll7/robot_sf_ll7/issues/4984
title: 2026-07-10 improvement-batch dependency ledger
summary: >-
  Durable sequence, ownership, evidence-gate, and delivery-status map for issues
  #4966 through #4983. It keeps the batch executable without treating a merged
  capability slice or a fallback/degraded run as empirical evidence.
snapshot:
  observed_at_utc: "2026-07-10T16:31:18Z"
  source_issue_updated_at_utc: "2026-07-10T11:12:22Z"
  source_comment_count: 1
  source: issue bodies, all issue comments, and linked merged pull requests
owner_policy: >-
  Each child issue owns its row. All child issues were unassigned at the snapshot,
  so no personal owner is inferred; owner.issue is the durable accountability surface.
sequence_policy: >-
  Phase order is the recommended batch order, not a blanket merge blocker. Only an
  item's implementation_prerequisites block that implementation. Evidence gates block
  the stated empirical interpretation, not independent contract or configuration work.
claim_boundary:
  evidence_status: planning_and_delivery_status_only
  establishes:
    - "dependency and phase ordering recorded in issue #4984"
    - live delivery boundaries recorded in the child issue threads at the snapshot
  does_not_establish:
    - benchmark performance or planner ranking
    - pedestrian, actuation, map, or sensor realism
    - paper-grade or dissertation-ready evidence

phases:
  - phase: 1
    name: documentation_and_auditability
    recommended_after: []
    parallel_with: []
    gate: Make defaults, units, scenario disposition, and artifact provenance truthful.
  - phase: 2
    name: pedestrian_realism
    recommended_after: [1]
    parallel_with: [3]
    gate: Use the empirical validation harness before promoting realism claims.
  - phase: 3
    name: actuation_realism
    recommended_after: [1]
    parallel_with: [2]
    gate: Land braking and latency axes before the combined actuation sweep.
  - phase: 4
    name: benchmark_robustness
    recommended_after: [2, 3]
    parallel_with: []
    gate: Measure determinism and numerical-scheme sensitivity before scaling campaigns.
  - phase: 5
    name: scale_and_roster_breadth
    recommended_after: [4]
    parallel_with: []
    gate: Expand maps, rollout throughput, held-out evaluation, and the planner roster.

cross_cutting_gates:
  - issue: 4224
    applies_to: [issue_4975_dataset_assets]
    boundary: Public dataset staging gates real-data validation, not diagnostic harness work.
  - issue: 4826
    applies_to: [phase_2_large_campaigns, phase_3_large_campaigns]
    boundary: GPU lifecycle readiness gates large campaigns, not CPU-only implementation.
  - issue: 4932
    applies_to: [issue_4974_scenario_half]
    boundary: Scenario-generation ownership; it does not gate force-parameter configuration.
  - issue: 2910
    applies_to: [issue_4970_provenance, issue_4978_stability]
    boundary: Benchmark v0.1 should absorb the fields after their child contracts are ready.
  - issue: 3207
    applies_to: [phase_2_rebase, issue_4979_timestep_comparison]
    boundary: Re-run fidelity sensitivity only after the pedestrian-realism configuration lands.
  - issue: 3574
    applies_to: [phase_2_rebase]
    boundary: Re-run heterogeneity studies only after the pedestrian-realism configuration lands.

