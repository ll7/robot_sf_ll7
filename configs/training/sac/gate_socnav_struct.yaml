# SAC gate training configuration on benchmark-compatible SocNav structured observations.
#
# Purpose: produce the first SAC checkpoint that can be evaluated through the
# benchmark stack without inventing a drive_state+rays adapter.
#
# Usage:
#   uv run python scripts/training/train_sac_sb3.py \
#     --config configs/training/sac/gate_socnav_struct.yaml

policy_id: sac_gate_socnav_struct_v1
scenario_config: ../../scenarios/classic_interactions.yaml
total_timesteps: 50000
seed: 42
# Canonical benchmark-facing SAC gate profile:
# - delta action semantics, consumed natively by map_runner
# - relative SocNav observations, so the checkpoint is not tied to a map origin
action_semantics: delta
relative_obs: true

output_dir: output/models/sac

sac_hyperparams:
  learning_rate: 3.0e-4
  buffer_size: 50000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  learning_starts: 1000

env_overrides:
  observation_mode: socnav_struct

env_factory_kwargs:
  reward_name: route_completion_v3
  reward_kwargs:
    weights:
      progress: 2.5
      living: -0.01
      collision: -5.0
      near_miss: -0.8
      ttc_risk: -0.6
      comfort: -0.4
      smoothness: -0.15
      terminal_bonus: 2.0

tracking:
  enabled: false
  project: robot_sf_sac
  run_name: sac_gate_socnav_struct_v1
  tags:
    - sac
    - gate
    - socnav-struct
    - issue-790
