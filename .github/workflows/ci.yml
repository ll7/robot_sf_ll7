name: CI

on:
  merge_group:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHONUNBUFFERED: "1"
  SDL_VIDEODRIVER: dummy
  MPLBACKEND: Agg
  PYGAME_HIDE_SUPPORT_PROMPT: "1"
  # Use CPython 3.12+ sys.monitoring backend for coverage: dramatically lower
  # instrumentation overhead than the default trace-based core.
  COVERAGE_CORE: sysmon

jobs:
  fast-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Split every event across four runners. Pull requests retain their fast-only
    # shards; main/manual/merge-queue events run the complete suite and publish
    # unique coverage data for the downstream combine gate.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      PYTEST_SHARD_COUNT: 4
      PYTEST_SHARD_INDEX: ${{ matrix.shard }}
      ROBOT_SF_SHARD_INCLUDE_SLOW: ${{ github.event_name != 'pull_request' && '1' || '0' }}
      ROBOT_SF_PYTEST_COVERAGE: ${{ github.event_name != 'pull_request' && '1' || '0' }}
      COVERAGE_FILE: ${{ format('output/coverage/.coverage.{0}', matrix.shard) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # The evidence-registry ratchet resolves historical producing commits.
          # A shallow checkout turns reachable provenance into false
          # ``dangling_commit`` findings and makes main CI environment-dependent.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Cache test results
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            pytest-${{ runner.os }}-

      # Lint and typecheck are shard-independent; run them once (shard 1 only)
      # to avoid quadruplicated annotations on pull-request shard matrices.
      - name: Lint
        if: ${{ matrix.shard == 1 }}
        run: scripts/dev/ci_driver.sh lint

      - name: Type check
        if: ${{ matrix.shard == 1 }}
        run: scripts/dev/ci_driver.sh typecheck

      # Pre-seed the runtime model cache (issue #6189) so the exact-repeat
      # benchmark test never downloads a model inside its timed repeat loop.
      # The test is auto-marked ``slow`` and only runs when
      # ROBOT_SF_SHARD_INCLUDE_SLOW=1 (push to main / merge_group / dispatch),
      # so the pre-seed is gated to that same context and runs on every shard
      # (the sharded suite may collect the slow test on any shard). A transient
      # download failure fails this setup step loudly instead of producing
      # differing trajectory fingerprints inside the benchmark.
      - name: Restore model artifact cache
        if: ${{ env.ROBOT_SF_SHARD_INCLUDE_SLOW == '1' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: output/model_cache
          # The pinned SHA-256 lives in model/registry.yaml; keying on it makes
          # a cache hit content-addressed and a pin change a clean miss.
          key: model-cache-${{ runner.os }}-${{ hashFiles('model/registry.yaml') }}
          restore-keys: |
            model-cache-${{ runner.os }}-

      - name: Pre-seed model cache for exact-repeat benchmark
        if: ${{ env.ROBOT_SF_SHARD_INCLUDE_SLOW == '1' }}
        # The exact-repeat PPO test (tests/benchmark/test_exact_repeat_executor.py)
        # binds the ppo arm to configs/baselines/
        # ppo_issue_791_eval_aligned_large_capacity_cpu.yaml, which loads both
        # the PPO checkpoint and the predictive-foresight proxy through
        # resolve_model_path. Both are GitHub-release assets fetched into
        # output/model_cache; pre-seed them here so the timed repeat loop only
        # ever reads a present, checksum-verified cache file. Add further
        # --model-id entries if additional slow benchmark tests need models.
        run: >-
          uv run python scripts/dev/prefetch_models.py
          --model-id predictive_proxy_selected_v2_full
          --model-id ppo_expert_issue_791_reward_curriculum_eval_aligned_large_capacity_20260417

      - name: Unit tests
        run: scripts/dev/ci_driver.sh test

      - name: Upload coverage shard
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: output/coverage/.coverage.${{ matrix.shard }}
          if-no-files-found: error
          include-hidden-files: true

  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fast-feedback
    if: ${{ github.event_name != 'pull_request' && needs.fast-feedback.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Download coverage shards
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-shard-*
          path: output/coverage
          merge-multiple: true

      - name: Combine coverage shards
        run: |
          uv run coverage combine output/coverage
          uv run coverage json
          uv run coverage html

      - name: Enforce absolute coverage floor
        run: >-
          uv run python scripts/coverage/compare_coverage.py
          --current output/coverage/coverage.json
          --absolute-only
          --format github
          --minimum-total 85.0

      - name: Restore coverage baseline
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: output/coverage/.coverage-baseline.json
          key: coverage-baseline-${{ github.ref_name }}
          restore-keys: |
            coverage-baseline-main

      - name: Compare coverage with baseline
        continue-on-error: true
        run: |
          if [ -f output/coverage/.coverage-baseline.json ]; then
            echo "Baseline found, comparing coverage..."
            uv run python scripts/coverage/compare_coverage.py \
              --current output/coverage/coverage.json \
              --baseline output/coverage/.coverage-baseline.json \
              --format github \
              --threshold 1.0
          else
            echo "No baseline found, skipping comparison"
          fi

      - name: Update coverage baseline (main branch only)
        if: github.ref == 'refs/heads/main' && success()
        run: |
          mkdir -p output/coverage
          cp output/coverage/coverage.json output/coverage/.coverage-baseline.json
          echo "Coverage baseline updated for main branch"

      - name: Save coverage baseline (main branch only)
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: output/coverage/.coverage-baseline.json
          key: coverage-baseline-${{ github.ref_name }}-${{ github.sha }}

      - name: Upload coverage reports
        if: ${{ failure() || github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            output/coverage/coverage.json
            output/coverage/htmlcov/
            output/coverage/.coverage
          include-hidden-files: true

  compat-matrix:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up matrixed core CI environment
        uses: ./.github/actions/setup-ci-python
        with:
          python-version: ${{ matrix.python }}
          sync-args: "--frozen"

      - name: Run core compatibility tests
        run: >-
          uv run pytest tests/common tests/contract tests/factories tests/gym_env tests/maps
          tests/nav tests/ped_npc tests/render tests/scenarios tests/sensor tests/sim tests/unit
          -q -m "not slow"

  fast-pysf-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true
          prune-cache: true

      - name: Validate fast-pysf standalone lock
        run: uv lock --check --directory fast-pysf

  smoke-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Validation smoke tests
        id: smoke_tests
        run: scripts/dev/ci_driver.sh smoke

      - name: Upload map verification manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: map-verification-manifest
          path: output/validation/map_verification.json
          if-no-files-found: warn

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-artifacts
          path: output/benchmarks/
          if-no-files-found: ignore

      - name: Upload recording artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: recording-artifacts
          path: output/recordings/
          if-no-files-found: ignore

      - name: Upload cold/warm perf smoke artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cold-warm-perf-smoke
          path: |
            output/benchmarks/perf/cold_warm_pr_smoke.json
            output/benchmarks/perf/cold_warm_pr_smoke.md
          if-no-files-found: warn

      - name: Upload smoke artifact on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-smoke-episodes
          path: output/benchmarks/ci_smoke/episodes.jsonl

      - name: Enforce artifact root policy
        if: >-
          ${{ always() && (steps.smoke_tests.outcome == 'success' ||
          steps.smoke_tests.outcome == 'failure') }}
        env:
          CI_STEP_TIMEOUT_SECONDS: "300"
        run: bash scripts/dev/ci_step_timer.sh "Enforce artifact root policy" scripts/dev/ci_driver.sh artifact-policy

  reproducibility-check:
    # Run on pull requests so hosted reproducibility evidence is green rather
    # than skipped; retain manual dispatch for standalone diagnostics.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Run optional reproducibility diagnostic
        run: uv run python scripts/benchmark_repro_check.py

      - name: Upload reproducibility report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproducibility-report
          path: output/benchmarks/reproducibility_check.json
          if-no-files-found: warn

  xdist-scratch-isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Run xdist scratch-isolation guard
        run: |
          uv run pytest -n 4 --dist worksteal \
            tests/test_runner_policy_timeout.py::test_planner_step_timeout_fails_fast_and_reports_metadata \
            tests/tools/test_release_evidence_gate.py::test_archive_integrity_pass_and_fail \
            tests/benchmark/test_scenario_criticality_optimization.py::test_effective_workers_capped_at_candidate_count \
            'tests/analysis/test_recenter_topology_panels_issue_2227.py::test_both_arm_traces_validate_against_schema[topology_result]' \
            'tests/analysis/test_recenter_topology_panels_issue_2227.py::test_both_arm_traces_validate_against_schema[static_recenter_result]' \
            tests/validation/test_evaluate_predictive_planner_smoke.py::test_evaluate_predictive_planner_fails_closed_without_collision_metric \
            tests/validation/test_predictive_success_campaign_tags.py::test_main_writes_failure_summary_for_missing_jsonl \
            tests/validation/test_predictive_success_campaign_tags.py::test_main_writes_failure_summary_for_malformed_jsonl

  wheel-smoke-install:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Build wheel
        run: uv build

      - name: Clean wheel install/import smoke
        run: bash scripts/validation/wheel_install_smoke.sh

      - name: Upload wheel smoke report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-smoke-report
          path: output/validation/wheel_install_smoke_report.json
          if-no-files-found: warn

  examples-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Example smoke tests
        run: scripts/dev/ci_driver.sh examples-smoke

  notebooks-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Notebook smoke tests
        run: scripts/dev/ci_driver.sh notebooks-smoke

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - fast-feedback
      - coverage-gate
      - compat-matrix
      - fast-pysf-compat
      - smoke-artifacts
      - xdist-scratch-isolation
      - wheel-smoke-install
      - examples-smoke
      - notebooks-smoke
    if: always()
    steps:
      - name: Check split job results
        run: |
          if [[ "${{ needs.fast-feedback.result }}" != "success" ]]; then
            echo "fast-feedback finished with ${{ needs.fast-feedback.result }}" >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" != "pull_request" && "${{ needs.coverage-gate.result }}" != "success" ]]; then
            echo "coverage-gate finished with ${{ needs.coverage-gate.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.compat-matrix.result }}" != "success" ]]; then
            echo "compat-matrix finished with ${{ needs.compat-matrix.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.fast-pysf-compat.result }}" != "success" ]]; then
            echo "fast-pysf-compat finished with ${{ needs.fast-pysf-compat.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.wheel-smoke-install.result }}" != "success" ]]; then
            echo "wheel-smoke-install finished with ${{ needs.wheel-smoke-install.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.smoke-artifacts.result }}" != "success" ]]; then
            echo "smoke-artifacts finished with ${{ needs.smoke-artifacts.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.xdist-scratch-isolation.result }}" != "success" ]]; then
            echo "xdist-scratch-isolation finished with ${{ needs.xdist-scratch-isolation.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.examples-smoke.result }}" != "success" ]]; then
            echo "examples-smoke finished with ${{ needs.examples-smoke.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.notebooks-smoke.result }}" != "success" ]]; then
            echo "notebooks-smoke finished with ${{ needs.notebooks-smoke.result }}" >&2
            exit 1
          fi
