name: amv_paired_nominal_primary_v1
paper_facing: false
scenario_matrix: configs/scenarios/nominal_v1.yaml

seed_policy:
  mode: seed-set
  seed_set: eval
  seed_sets_path: configs/benchmarks/seed_sets_v1.yaml

snqi_weights: configs/benchmarks/snqi_weights_camera_ready_v3.json
snqi_baseline: configs/benchmarks/snqi_baseline_camera_ready_v3.json

workers: 2
horizon: 100
dt: 0.1
record_forces: true
resume: true
stop_on_failure: false
bootstrap_samples: 300
bootstrap_confidence: 0.95
bootstrap_seed: 123

kinematics_matrix:
  - differential_drive

export_publication_bundle: false
include_videos_in_publication: false
overwrite_publication_bundle: false
repository_url: https://github.com/ll7/robot_sf_ll7
release_tag: "{release_tag}"
doi: 10.5281/zenodo.<record-id>
paper_interpretation_profile: amv-paired-nominal-primary-v1

planners:
  - key: goal
    algo: goal
    planner_group: core
    benchmark_profile: baseline-safe

  - key: social_force
    algo: social_force
    planner_group: core
    benchmark_profile: baseline-safe

  - key: orca
    algo: orca
    planner_group: core
    benchmark_profile: baseline-safe
    socnav_missing_prereq_policy: fail-fast
