# Portable PPO baseline pinned to the issue-791 Wave-5 leader (eval-aligned + reward
# curriculum + large-capacity grid_socnav, 10M env22).
#
# Sibling of configs/baselines/ppo_issue_791_eval_aligned_large_capacity.yaml. The
# historical sibling pins an absolute `output/model_cache/...` path and forces the
# predictive-foresight device to `cuda`, which breaks clean checkouts and CPU-only
# validation paths. This portable variant is the one to cite for new evaluation runs:
#
#   * Resolves the checkpoint via the model registry (model/registry.yaml) so the
#     same config works on any machine that has fetched the artifact through the
#     registry-aware download path used by other baselines.
#   * Lets the predictive-foresight runner pick `cpu` or `cuda` automatically.
#
# Source job: 11724 (auxme-imech093, l40s, 8h04m).
# WandB run: ll7/robot_sf/ibo3aqus
# Best eval (70 episodes, ppo_full_maintained_eval_v1):
#   success_rate=0.929, collision_rate=0.071, SNQI=0.353
# Best step: 9,961,472 / 10,000,000.
# Training config: configs/training/ppo/ablations/expert_ppo_issue_791_reward_curriculum_promotion_10m_env22_eval_aligned_large_capacity.yaml
# Promotion campaign log: docs/context/issue_791_promotion_campaign_128k_256k.md
# Promotion verdict: docs/context/issue_791_best_policy_verdict_2026_04_21.md
# Narrow paper claim: memory/decisions/2026-04-20_issue_791_narrow_benchmark_claim.md
#
# CAVEAT: this policy was trained on the eval superset
# (configs/scenarios/sets/ppo_full_maintained_eval_v1.yaml). Eval numbers above are
# in-distribution; report as benchmark-set performance, not OOD generalization.

model_id: ppo_expert_issue_791_reward_curriculum_eval_aligned_large_capacity_20260417

device: auto
deterministic: true

obs_mode: dict

predictive_foresight_enabled: true
predictive_foresight_model_id: predictive_proxy_selected_v2_full
predictive_foresight_device: auto
predictive_foresight_max_agents: 16
predictive_foresight_horizon_steps: 8
predictive_foresight_rollout_dt: 0.2
predictive_foresight_near_distance: 0.7
predictive_foresight_front_corridor_length: 3.0
predictive_foresight_front_corridor_half_width: 1.0

action_space: unicycle
v_max: 2.0
omega_max: 1.0

fallback_to_goal: false
