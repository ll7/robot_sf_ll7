# Canonical PPO baseline for benchmark/evaluation runs.
#
# Promoted on 2026-04-28 from the issue-791 Wave-5 leader (job 11724).
# Previous pin: output/model_cache/ppo_expert_br06_v3_15m_all_maps_randomized_20260304T075200/model.zip
# (BR-06 v3 15M, source run ll7/robot_sf/b60iopxt). The BR-06 artifact remains on disk for
# reproducibility; downstream paper configs that need the historical pin should point at it
# explicitly.
#
# Source job: 11724 (auxme-imech093, l40s, 8h04m).
# WandB run: ll7/robot_sf/ibo3aqus
# Best eval (70 episodes, ppo_full_maintained_eval_v1):
#   success_rate=0.929, collision_rate=0.071, SNQI=0.353
# Best step: 9,961,472 / 10,000,000.
# Training config: configs/training/ppo/ablations/expert_ppo_issue_791_reward_curriculum_promotion_10m_env22_eval_aligned_large_capacity.yaml
# Promotion campaign log: docs/context/issue_791_promotion_campaign_128k_256k.md
# Promotion verdict: docs/context/issue_791_best_policy_verdict_2026_04_21.md
# Narrow paper claim record: memory/decisions/2026-04-20_issue_791_narrow_benchmark_claim.md
#
# CAVEAT: this policy was trained on the eval superset
# (configs/scenarios/sets/ppo_full_maintained_eval_v1.yaml). The eval numbers above are
# in-distribution; report as benchmark-set performance, not OOD generalization.
# A held-out scenario family is still required to measure true OOD generalization
# and is explicitly deprioritized for the AMV camera-ready paper.
#
# Behavior change vs prior baseline: fallback_to_goal flips from true to false. This is
# intentional and aligned with docs/context/issue_691_benchmark_fallback_policy.md — the
# policy must fail closed if it cannot produce a valid action, not silently fall back to
# goal-seeking, since fallback execution is not a successful benchmark outcome.

model_path: output/model_cache/ppo_expert_issue_791_reward_curriculum_eval_aligned_large_capacity_20260417/model.zip

device: auto
deterministic: true

obs_mode: dict

predictive_foresight_enabled: true
predictive_foresight_model_id: predictive_proxy_selected_v2_full
predictive_foresight_device: cuda
predictive_foresight_max_agents: 16
predictive_foresight_horizon_steps: 8
predictive_foresight_rollout_dt: 0.2
predictive_foresight_near_distance: 0.7
predictive_foresight_front_corridor_length: 3.0
predictive_foresight_front_corridor_half_width: 1.0

action_space: unicycle
v_max: 2.0
omega_max: 1.0

fallback_to_goal: false
