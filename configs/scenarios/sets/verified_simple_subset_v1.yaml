  - name: empty_map_8_directions_east
    map_id: atomic_empty_frame_test
    route_overrides_file: ../route_overrides/issue_596/empty_goal_east.yaml
    simulation_config:
      max_episode_steps: 250
      ped_density: 0.0
    robot_config: {}
    metadata:
      archetype: empty_map_8_directions
      label: empty map east
      flow: none
      behavior: none
      density_advisory: zero_baseline_route_spawn
      primary_capability: frame_consistency
      target_failure_mode: coordinate_transform
      purpose: Verify straight-line motion and frame correctness for an eastward target on an empty map.
      expected_behavior: Move directly toward the east goal with no oscillation or spurious curvature.
      expected_pass_criteria: Reach the east goal without collision, timeout, or visible open-space oscillation.
      failure_modes: [directional bias, oscillation in open space, incorrect frame transform]
      determinism: deterministic
      variation_family: goal_direction
      variation_value: east
      variation_rationale: East is the canonical forward-direction sanity case.
      plausibility:
        status: unverified
        verified_on: null
        verified_by: null
        method: null
        notes: null
        metrics_updated_on: null
        metrics: {min_distance: null, mean_distance: null, robot_ped_within_5m_frac: null, ped_force_mean: null, force_q95: null}
