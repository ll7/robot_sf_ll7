name: Temporary Ruff diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up CI Python environment
        uses: ./.github/actions/setup-ci-python

      - name: Capture canonical formatter output
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/ruff-diagnostics
          uv run ruff format tests/adversarial/test_issue_5308_qd_campaign.py \
            > output/ruff-diagnostics/formatter.txt 2>&1
          cp tests/adversarial/test_issue_5308_qd_campaign.py \
            output/ruff-diagnostics/formatted_test_issue_5308_qd_campaign.py
          uv run ruff check . > output/ruff-diagnostics/ruff-check.txt 2>&1
          uv run ruff format --check . > output/ruff-diagnostics/ruff-format.txt 2>&1

      - name: Upload formatter output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-formatted-test
          path: output/ruff-diagnostics/
          if-no-files-found: error
