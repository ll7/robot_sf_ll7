# Issue #4018 diagnostic smoke config. Not a benchmark or training-result claim.
policy_id: issue_4018_density_curriculum_smoke
scenario_config: ../../../scenarios/sets/ppo_all_available_training_v1_h500_schedule.yaml
num_envs: 1
worker_mode: dummy
seeds:
  - 4018
total_timesteps: 96
best_checkpoint_metric: success_rate
feature_extractor: mlp
policy_net_arch:
  - 32
  - 32
ppo_hyperparams:
  learning_rate: 0.0003
  n_steps: 16
  batch_size: 16
  n_epochs: 1
  ent_coef: 0.0
evaluation:
  frequency_episodes: 0
  evaluation_episodes: 1
  step_schedule:
    - until_step: 96
      every_steps: 96
convergence:
  success_rate: 0.9
  collision_rate: 0.05
  plateau_window: 1
scenario_sampling:
  strategy: cycle
env_overrides:
  observation_mode: default_gym
  sim_config:
    difficulty: 0
    ped_density_by_difficulty:
      - 0.04
    max_peds_per_group: 3
density_curriculum:
  enabled: true
  advance_rule: timestep
  enforce_nondecreasing_density: true
  stages:
    - id: sparse
      until_timesteps: 32
      density_m2: 0.04
      difficulty: 0
      max_peds_per_group: 3
    - id: medium
      until_timesteps: 64
      density_m2: 0.08
      difficulty: 0
      max_peds_per_group: 4
    - id: dense
      until_timesteps: null
      density_m2: 0.12
      difficulty: 0
      max_peds_per_group: 5
tracking:
  tensorboard: false
  wandb:
    enabled: false
    tags:
      - issue-4018
      - density-curriculum-smoke
