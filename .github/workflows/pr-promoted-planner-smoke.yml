name: PR Promoted Planner Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promoted-planner-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      SDL_VIDEODRIVER: dummy
      MPLBACKEND: Agg
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
      LOGURU_LEVEL: WARNING
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.5.11"

      - name: Cache uv sync package payloads
        id: cache-uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ${{ runner.temp }}/setup-uv-cache/archive-v0
            ${{ runner.temp }}/setup-uv-cache/wheels-v6
          key: uv-sync-payloads-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Report uv cache restore state
        run: |
          echo "cache-hit=${{ steps.cache-uv.outputs.cache-hit }}"
          echo "cache-matched-key=${{ steps.cache-uv.outputs.cache-matched-key }}"
          bash scripts/dev/ci_uv_sync_diag.sh "uv-cache-pre-sync"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: System packages for headless
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libglib2.0-0 libgl1 fonts-dejavu-core

      - name: Free runner disk space
        run: bash scripts/dev/free_github_runner_space.sh

      - name: Sync dependencies (locked)
        env:
          CI_STEP_TIMEOUT_SECONDS: "1200"
        run: bash scripts/dev/ci_step_timer.sh "Sync dependencies (locked)" uv sync --all-extras --frozen

      - name: Report uv cache state after sync
        if: always()
        run: bash scripts/dev/ci_uv_sync_diag.sh "uv-cache-post-sync"

      - name: Run promoted planner smoke
        run: |
          uv run python scripts/validation/run_pr_promoted_planner_smoke.py \
            --output-root output/benchmarks/pr_promoted_planner_smoke \
            --runtime-budget-seconds 90 \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload promoted planner smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-promoted-planner-smoke
          path: |
            output/benchmarks/pr_promoted_planner_smoke/summary.json
            output/benchmarks/pr_promoted_planner_smoke/summary.md
            output/benchmarks/pr_promoted_planner_smoke/episodes.jsonl
            output/benchmarks/pr_promoted_planner_smoke/logs/
          if-no-files-found: warn
