version: 1
updated_at: 2026-06-04
policy: context-catalog.v1
description: >
  Machine-readable catalog for the current retrieval-first context index. This is not a full
  inventory of docs/context; it covers curated entry points from docs/context/INDEX.md so agents can
  validate routing metadata without normalizing the entire historical note tree.
status_values:
  current: Active source of truth or current entry point.
  historical: Useful background; check newer linked notes before relying on conclusions.
  superseded: Kept only for provenance; replacement must be named.
  evidence: Tracked compact proof or manifest.
  proposal: Planned or exploratory guidance, not completed implementation evidence.
freshness_values:
  maintained: Update when the referenced workflow or contract changes.
  dated: Date-scoped note; preserve as historical context unless a newer note supersedes it.
  policy: Durable policy boundary; update only when the policy changes.
  evidence: Evidence pointer or manifest; preserve provenance and checksums when applicable.
