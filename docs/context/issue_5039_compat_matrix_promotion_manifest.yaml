schema_version: compat_matrix_promotion_manifest.v1
issue: 5039
title: "ci: promote proven compatibility matrix and add coverage floor"
claim_boundary: >-
  CI compatibility evidence only. This manifest records the hosted-run evidence used to promote
  the compat-matrix CI job from advisory to required. It asserts no benchmark, metric, or paper
  claim. The promotion is allowed only when
  scripts/ci/check_compat_matrix_promotion_readiness.py --require-ready passes.

# --- Objective promotion gate the promotion PR must satisfy ---
promotion_gate:
  # Advisory job introduced by PR #5037; canonical source of the required cells.
  advisory_job: compat-matrix
  advisory_pr: 5037
  # Every cell must accumulate green evidence; a missing cell fails closed.
  required_cells:
    - {os: ubuntu-latest, python: "3.11"}
    - {os: ubuntu-latest, python: "3.13"}
    - {os: macos-latest, python: "3.11"}
    - {os: macos-latest, python: "3.13"}
  # Minimum count of green hosted runs per cell before promotion is allowed.
  min_green_runs_per_cell: 3
  # Runtime budget ceiling (minutes) per cell. Matches the advisory job's
  # timeout-minutes in PR #5037; a run over budget does not count as green evidence.
  runtime_budget_minutes: 30

# --- Recorded hosted-run evidence (empty or incomplete => blocked / fail-closed) ---
# Populate one entry per eligible green hosted run from the advisory matrix.
# Each entry: {os, python, run_url, conclusion: success|failure, duration_minutes, sha}
