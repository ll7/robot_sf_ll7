name: confirmation_v1_smoke
paper_facing: false
scenario_matrix: configs/scenarios/confirmation_v1.yaml

seed_policy:
  mode: fixed-list
  seeds: [59601]

workers: 1
horizon: 400
dt: 0.1
record_forces: false
resume: true
stop_on_failure: false
bootstrap_samples: 100
bootstrap_confidence: 0.95
bootstrap_seed: 123

kinematics_matrix:
  - differential_drive

planners:
  - key: goal
    algo: goal
    planner_group: core
    benchmark_profile: baseline-safe

  - key: social_force
    algo: social_force
    planner_group: core
    benchmark_profile: baseline-safe

  - key: orca
    algo: orca
    planner_group: core
    benchmark_profile: baseline-safe
    socnav_missing_prereq_policy: fallback
