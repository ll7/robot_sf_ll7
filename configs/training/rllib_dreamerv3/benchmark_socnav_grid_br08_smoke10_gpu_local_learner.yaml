# BR-08 smoke profile that adds explicit local-learner GPU placement.
experiment:
  run_id: dreamerv3_br08_benchmark_socnav_grid_smoke10_gpu_local_learner
  output_root: output/dreamerv3
  train_iterations: 10
  checkpoint_every: 10
  seed: 123
  log_level: WARNING

ray:
  address: null
  local_mode: false
  include_dashboard: false
  num_cpus: 32
  num_gpus: 1
  disable_uv_run_runtime_env: true

tracking:
  wandb:
    enabled: true
    project: robot_sf_dreamerv3
    group: br08-benchmark-socnav-grid-smoke10
    job_type: train
    mode: offline
    tags: [dreamerv3, rllib, br08, smoke10, gpu-local-learner, socnav_struct, occupancy_grid]
    dir: output/wandb

env:
  flatten_observation: true
  flatten_keys: null
  normalize_actions: true
  scenario_matrix:
    path: ../../scenarios/classic_interactions_francis2023.yaml
    strategy: random
    switch_per_reset: true
  factory_kwargs:
    debug: false
    recording_enabled: false
    reward_name: route_completion_v3
    reward_kwargs:
      weights:
        progress: 1.1
        living: -0.015
        collision: -15.0
        near_miss: -3.0
        ttc_risk: -2.8
        comfort: -0.5
        smoothness: -0.18
        timeout: -6.5
        stagnation: -2.0
        terminal_bonus: 20.0
  config:
    observation_mode: socnav_struct
    use_image_obs: false
    use_occupancy_grid: true
    include_grid_in_observation: true
    grid_config:
      resolution: 0.2
      width: 32.0
      height: 32.0
      channels: [obstacles, pedestrians, combined]
      use_ego_frame: true
      center_on_robot: true

evaluation:
  enabled: false
  every_iterations: 10
  evaluation_episodes: 10

algorithm:
  framework: torch
  env_runners:
    num_env_runners: 24
    num_envs_per_env_runner: 1
    rollout_fragment_length: 64
  resources:
    num_gpus: 1
  learners:
    num_learners: 0
    num_gpus_per_learner: 1
  training:
    model_size: S
    training_ratio: 128
    batch_size_B: 16
    batch_length_T: 32
    horizon_H: 10
    world_model_lr: 0.0001
    actor_lr: 0.00003
    critic_lr: 0.00003