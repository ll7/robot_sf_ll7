repair_hypothesis:
  id: collision_penalty_only_v1
  statement: >
    The smallest interpretable shielded-PPO repair is to keep the BR-06 v3 PPO
    architecture and runtime guard unchanged while increasing only the route-completion
    collision penalty during fine-tuning, testing whether the policy proposes fewer unsafe
    actions without losing its existing progress signal.
  enabled_deltas:
    - type: reward_weight
      parameter: env_factory_kwargs.reward_kwargs.weights.collision
      value: -20.0
      baseline_value: -15.0
  disabled_design_freedom:
    - architecture_sweep
    - guard_disablement
    - multiple_reward_hypotheses
